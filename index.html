      {
        "variant": "default",
         "content": [
        { type: 'section-title', text: 'Supplications After Salam' }, 
        { type: 'text', text: 'After the Tashahhud and Salawat, one should make a supplication such as:' }, 

    { type: 'arabic', text: '1. ٱلْحَمْدُ لِلَّهِ رَبِّ ٱلْعَالَمِينَ' },
    { type: 'text', text: '1. All praise is due to Allah Ta’ala, Creator of all the worlds.' },

    { type: 'arabic', text: '2. وَٱلصَّلَاةُ وَٱلسَّلَامُ عَلَىٰ رَسُولِنَا مُحَمَّدٍ وَآلِهِ وَصَحْبِهِ أَجْمَعِينَ' },
    { type: 'text', text: '2. May peace and blessings be upon Prophet Muhammad ‘alayhis-salam, and on his blessed family and noble companions.' },

    { type: 'arabic', text: '3. بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ انْتَهَيْتُ لِلَّهِ ۞ بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ تُبْتُ إِلَى اللهِ ۞ بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ سَلَّمْتُ نَفْسِي إِلَى اللهِ ۞ بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ رَضِيتُ بِاللهِ ۞ بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ اعْتَصَمْتُ بِاللهِ ۞ بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ فَوَّضْتُ أَمْرِي إِلَى اللهِ ۞ بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ تَوَكَّلْتُ عَلَى اللهِ ۞' },
  

    { type: 'arabic', text: '4. بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ وَبِاللهِ وَعَلَى اللهِ وَمِنَ اللهِ وَإِلَى اللهِ ۞ اعْتَمَدْتُ عَلَى اللهِ وَمَا تَوْفِيقِي إِلَّا بِاللهِ ۞ وَحَسْبِيَ اللهُ وَلَا إِلَهَ إِلَّا اللهُ وَاللهُ أَكْبَرُ ۞' },
    { type: 'text', text: '4. Allah - beginning with the name of - the Most Gracious, the Most Merciful and by Allah, and upon Allah, and from Allah, and to Allah. I have depended on Allah, and my success is only by Allah. Allah is sufficient for me, and there is no god but Allah, and Allah is the Greatest.' },

    { type: 'arabic', text: '5. بِسْمِ اللهِ عَلَى نَفْسِي وَدِينِي وَخَوَاتِمِ عَمَلِي ۞ بِسْمِ اللهِ عَلَى أَهْلِي وَوَلَدِي ۞ بِسْمِ اللهِ عَلَى مَالِي وَبِلَادِي ۞ بِسْمِ اللهِ عَلَى أَحْبَابِي وَجِيرَانِي ۞ بِسْمِ اللهِ عَلَى كُلِّ شَيْءٍ أَعْطَانِيهِ رَبِّي ۞ بِسْمِ اللهِ خَيْرِ الْأَسْمَاءِ فِي الْأَرْضِ وَالسَّمَاءِ ۞ بِسْمِ اللهِ الَّذِي فِي جَمِيعِ أَسْمَائِهِ الشِّفَاءُ ۞' },
    

    { type: 'arabic', text: '6. اللّٰهُ اللّٰهُ اللّٰهُ رَبِّي لَا أُشْرِكُ بِهِ شَيْئًا ۞ اللّٰهُمَّ إِنِّي أَسْأَلُكَ بِاسْمِكَ الْعَظِيمِ ۞ وَرِضْوَانِكَ الْأَكْبَرِ ۞ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ ۞ أَنْ تَفْعَلَ بِي كَذَا (وَيَذْكُرُ حَاجَتَهُ) ۞' },
    { type: 'text', text: '6. Allah, Allah, Allah is my Rabb, I do not associate anything with Him. O Allah, I ask You by Your Great Name and Your Greatest Pleasure. O Owner of Majesty and Honor, that You do for me [such and such] (here, one mentions their specific need).' },

    { type: 'text', style: 'history-note', text: 'This line of the Burdah is known for its powerful meaning and protection. It reminds the believer that whoever has the support, love, and connection of the Messenger of Allah ﷺ, even the greatest dangers become harmless by the permission of Allah. Many scholars and righteous people would recite this verse during travel, fear, or difficulty, trusting in Allah and seeking strength through their love for the Prophet ﷺ..' },

    { type: 'arabic', text: '7. وَمَنْ تَكُنْ بِرَسُولِ اللّٰهِ نُصْرَتُهُ ۞ إِنْ تَلْقَهُ الْأُسْدُ فِي آجَامِهَا تَجِمِ (7)' },
    { type: 'text', text: '7. And whoever has the support of the Messenger of Allah, if the lions encounter him in their thickets, they become silent and speechless out of awe. (Repeat 7 times)' },

    { type: 'arabic', text: '8. يَا خَفِيَّ الْأَلْطَافِ نَجِّنَا مِمَّا نَخَافُ يَا حَيُّ حِينَ لَا حَيَّ فِي دَيْمُومِيَّةِ مُلْكِهِ وَبَقَائِهِ يَا حَيُّ (7)' },
    { type: 'text', text: '8. O You who are hidden in subtle kindness, save us from what we fear. O Ever-Living One, when no living being remains—in the eternity of Your Sovereignty and the everlastingness of Your Existence. O Ever-Living One. (Repeat 7 times)' },

    { type: 'arabic', text: '9. اللَّهُمَّ اغْفِرْلِي وَلِوَالِدَيَّ وَلِمَنْ تَوَالَدَ وَلِجَمِيعِ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ وَالْمُسْلِمِينَ وَالْمُسْلِمَاتِ الْأَحْيَاءِ مِنْهُمْ وَالْأَمْوَاتِ إِنَّكَ مُجِيبُ الدَّعَوَاتِ بِرَحْمَتِكَ يَا أَرْحَمَ الرَّاحِمِينَ' },
    { type: 'text', text: '9. O Allah, forgive me, my parents, and all those who descended from them, and all believing men and believing women, and all Muslim men and Muslim women, those who are alive among them and those who are dead. Indeed, You are the Answerer of prayers, by Your mercy, O Most Merciful of the merciful.' },

    { type: 'arabic', text: '10. اللَّهُمَّ رَبِّ اجْعَلْنِي مُقِيمَ الصَّلَاةِ وَمِنْ ذُرِّيَّتِي رَبَّنَا وَتَقَبَّلْ دُعَاءِي رَبَّنَا اغْفِرْ لِي وَلِوَالِدَيَّ وَلِلْمُؤْمِنِينَ يَوْمَ يَقُومُ الْحِسَابُ' },
    { type: 'text', text: '10. O Allah, my Rab. Make me establish the prayer, and my offspring; O Allah! Accept my prayer. O Allah! Forgive me, and my parents, and all the believers on the Day when Reckoning will take place.' },

    { type: 'arabic', text: '11. ٱللّٰهُمَّ ٱغْفِرْ وَٱرْحَمْ وَأَنْتَ خَيْرُ ٱلرَّاحِمِينَ، تَوَفَّنِي مُسْلِمًا وَأَلْحِقْنِي بِٱلصَّالِحِينَ' },
    { type: 'text', text: '11. "O Allah, forgive and have mercy, for You are the best of those who show mercy. Cause me to die as a Muslim, and join me with the righteous."' },

    { type: 'arabic', text: '12. ٱللّٰهُمَّ إِنِّي أَسْأَلُكَ ٱلصِّحَّةَ وَٱلْعَافِيَةَ وَٱلْأَمَانَةَ وَحُسْنَ ٱلْخُلُقِ وَٱلرِّضَاءَ بِٱلْقَدَرِ بِرَحْمَتِكَ يَا أَرْحَمَ ٱلرَّاحِمِينَ، آمِينَ' },
    { type: 'text', text: '12. O Allah, I ask You for health, well-being, trustworthiness, good character, and contentment with the divine decree, by Your mercy, O Most Merciful of the merciful. Amen' },
{ type: 'text', style: 'dua-style', text: '13. O Allah, Grant truth to our hearts, help in our lives, and sincerity in our intentions. Protect us from sorrow, regret, and worry in every moment and step. Make our circumstances comfortable, joyful, and soothing. Accept our prayers and bring our hearts closer to Your salvation.' },

    { type: 'text', style: 'dua-style', text: '14. O Allah, Let today incline toward Your approval, guide our lives with goodness, and lead our steps on the straight path. Grant us compassion, goodness, and the strength of Your help. Free our hearts from corruption, fill our benefit with goodness, and ease our concerns. Accept our prayers and protect our circumstances.' },

    { type: 'text', style: 'dua-style', text: '15. O Allah, At this time, grant us peace, calm in our hearts, health in our bodies, and relief in our souls. Forgive our sins, overlook our faults, and open doors of goodness for our hearts. Guide our resting limbs with Your mercy, and keep our steps aligned with Your approval. Give us comfort in Your embrace and bring us near to You; protect our families, loved ones, and the Muslim ummah from all harm.' },

    { type: 'text', style: 'dua-style', text: '16. O Allah, Whatever I did today, spoke, or felt—grant us the ability to seek Your approval in all of it. Grant us rest and safety at this time, make my tongue a vessel of worship, and protect my heart from all harm and Satan’s deception. Protect me and my loved ones from all sorrow, grief, illness, and evil. Raise us in the morning with peace and faith, and let our day begin with Your guidance.' },

    { type: 'text', style: 'dua-style', text: '17. O Allah, Today as well, grant peace to our hearts, goodness to our tongues, and the right path to our steps. Do not show us anything we should not see; Do not let us hear anything we should not hear. Engage us only in those actions that earn Your pleasure. You are the One who knows us better than we know ourselves, O Allah.' },

    { type: 'text', style: 'dua-style', text: '18. O Allah Make our hearts the way You love them to be.” Grant us the ability to place Your pleasure above everything, To wait with patience, and to rejoice with gratitude. Give spaciousness to our hearts, peace to our souls, and ease to our tasks. Do not let us walk any path that lacks Your pleasure, O Allah.”' },

    { type: 'text', style: 'dua-style', text: '19. O Allah, In every step we take today, grant us the ability to keep Your pleasure in mind, And in every word we speak, grant us truth and humility. Grant peace to our hearts, patience to our tongues, and light to our faces, O Allah. Bring good people into our lives and place beautiful feelings in our hearts. Provide us sustenance through halal means, and make our happiness come from You. We hand over today to Your forgiveness, and tomorrow to Your mercy.' },

    { type: 'arabic', text: '20. ٱلْحَمْدُ لِلّٰهِ رَبِّ الْعَالَمِينَ، وَٱلصَّلَّاةُ وَٱلسَّلَامُ عَلَىٰ سَيِّدِنَا مُحَمَّدٍ وَعَلَىٰ آلِهِ وَصَحْبِهِ أَجْمَعِينَ' },
   { "type": "text", "text": "20. Closing praise: All praise is due to Allah, Lord of the worlds, and may peace and blessings be upon our master Muhammad, and upon his family and all his companions." }
       ]

        { "type": "section-title", "text": "Salat al-Janazah (Funeral Prayer)" },
        
        { "type": "text", "text": "METHOD OF PRAYER:" },
        { "type": "text", "text": "1. Make intention (Niyyah) of performing Şalāt al-Janāzah for the sake of Allah and as a prayer for the deceased." },
        
        { "type": "text", "text": "FIRST TAKBĪR" },
        { "type": "text", "text": "2. Raise your hands to your ears and recite:" },

        { "type": "text", "text": "3. Fold your hands below your navel and recite the Sana:" },
        { "type": "arabic-indopak", "text": "سُبْحَانَكَ اللّٰهُمَّ وَبِحَمْدِكَ وَتَبَارَكَ اسْمُكَ وَتَعَالٰی جَدُّكَ وَجَلَّ ثَنَاؤُكَ وَلَا اِلٰهَ غَيْرُكَ" },
        { "type": "text", "text": "Subḥānaka-Allāhumma wa-bi-ḥamdika wa-tabāraka-smuka wa-ta‘ālā jadduka wa-jalla thanā’uka wa-lā ilāha ghayruk" },

        { "type": "text", "text": "5. Recite Salawāt Ibrāhīmiyyah:" },
        { "type": "arabic-indopak", "text": "اَللّٰهُمَّ صَلِّ عَلٰی مُحَمَّدٍ وَّعَلٰی اٰلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلٰی اِبْرٰهِيْمَ وَعَلٰی اٰلِ اِبْرٰهِيْمَ اِنَّكَ حَمِيْدٌ مَّجِيْدٌؕ اَللّٰهُمَّ بَارِكْ عَلٰی مُحَمَّدٍ وَّعَلٰی اٰلِ مُحَمَّدٍ كَمَا بَارَكْتَ عَلٰی اِبْرٰهِيْمَ وَعَلٰی اِبْرٰهِيْمَ اِنَّكَ حَمِيْدٌ مَّجِيْدٌ" },
        { "type": "text", "text": "Allāhumma ṣalli ‘alā Muḥammadin wa-‘alā āli Muḥammadin, kamā ṣallayta ‘alā Ibrāhīma wa-‘alā āli Ibrāhīma innaka Ḥamīdun Majīd. Allāhumma bārik ‘alā Muḥammadin wa-‘alā āli Muḥammadin, kamā bārakta ‘alā Ibrāhīma wa-‘alā āli Ibrāhīma innaka Ḥamīdun Majīd." },

        { "type": "text", "text": "THIRD TAKBĪR" },
        { "type": "text", "text": "6. Without raising your hands, recite:" },
        { "type": "arabic-indopak", "text": "اَللّٰهُ اَكْبَرُ" },

        { "type": "text", "text": "7. Recite one of the following three du‘ās:" },
        
        { "type": "text", "text": "FOR ADULTS (MALE AND FEMALE):" },
        { "type": "arabic-indopak", "text": "اَللّٰهُمَّ اغْفِرْ لِحَيِّنَا وَمَيِّتِنَا وَشَاهِدِنَا وَغَائِبِنَا وَصَغِيْرِنَا وَكَبِيْرِنَا وَذَكَرِنَا وَاُنْثَانَاؕ اَللّٰهُمَّ مَنْ اَحْيَيْتَهٗ مِنَّا فَاَحْيِهٖ عَلَی الْاِسْلَامِ وَمَنْ تَوَفَّيْتَهٗ مِنَّا فَتَوَفَّهٗ عَلَی الْاِيْمَانِ" },
        { "type": "text", "text": "Allāhumma-ghfir li-ḥayyinā wa-mayyitinā wa-shāhidinā wa-ghā’ibinā wa-ṣaghīrinā wa-kabīrinā wa-dhakarinā wa-unthānā. Allāhumma man aḥyaytahū minnā fa-aḥyihi ‘alā al-islām, wa-man tawaffaytahū minnā fatawaffahū ‘alā al-īmān." },

        { "type": "text", "text": "FOR A MALE MINOR:" },
        { "type": "arabic-indopak", "text": "اَللّٰهُمَّ اجْعَلْهُ لَنَا فَرَطًا وَّاجْعَلْهُ لَنَا اَجْرًا وَّذُخْرًا وَّاجْعَلْهُ لَنَا شَافِعًا وَّمُشَفَّعًا" },
        { "type": "text", "text": "Allāhumma-j‘alhu lanā faraṭan wa-j‘alhu lanā ajran wa-dhukhran wa-j‘alhu lanā shāfi‘an wa-mushaffa‘an" },

        { "type": "text", "text": "FOR A FEMALE MINOR:" },
        { "type": "arabic-indopak", "text": "اَللّٰهُمَّ اجْعَلْهَا لَنَا فَرَطًا وَّاجْعَلْهَا لَنَا اَجْرًا وَّذُخْرًا وَّاجْعَلْهَا لَنَا شَافِعَةً وَّمُشَفَّعَةً" },

                { type: 'section-title', text: 'Manner and Method of Visiting Graves' },
                { type: 'text', text: '1. One should approach the grave from the feet side and then stand towards the face of the occupant of the grave. One should not approach from the head side, as this is a cause for discomfort to the deceased, as the deceased will have to turn the neck to see who is approaching. [Radd al-Muhtar, Bahar]' },
                { type: 'text', text: '2. Then one should greet with the following words:' },
                { type: 'arabic', text: 'السَّلَامُ عَلَيْكُمْ أَهْلَ دَارِ قَوْمٍ مُؤْمِنِينَ أَنْتُمْ لَنَا سَلَفٌ وَ إِنَّا إِنْ شَاءَ اللهُ بِكُمْ لَاحِقُوْنَ نَسْأَلُ اللهَ لَنَا وَلَكُمُ الْعَفْوَ وَالْعَافِيَةَ يَرْحَمُ اللهُ الْمُسْتَقْدِمِيْنَ مِنَّا وَالْمُسْتَأْخِرِيْنَ اللَّهُمَّ رَبَّ الْأَرْوَاحِ الْفَانِيَةِ وَالْأَجْسَادِ وَالْبَالِيَةِ وَالْعِظَامِ النَّخِرَةِ أَدْخِلْ هَذِهِ الْقُبُورِ مِنْكَ رَوْحًا وَرَيْحَانًا وَمِنَّا تَحِيَّةً وَسَلَامًا' },
                { type: 'text', text: '"Peace be upon you, O dwellers of the homes of the believers, You are our predecessors and Allah-Willing We are to meet with you. We ask Allah for pardon and well-being for us and you. May Allah have Mercy upon those who preceded us (predecessors) and those who will follow (successors). O Allah, the Sustainer of the ending souls, and decomposed bodies and disintegrated bones, from You, fill these graves with freshness and fragrance, and send from us greetings and peace upon them."' }
              ]
            },
            {
              variant: 'default',

<script type="text/babel">

      const IconSettings = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l-.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l-.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l-.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
      const IconBack = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m15 18-6-6 6-6"/></svg>;
      const IconHome = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
      const IconBookmark = () => <svg width="45" height="45" viewBox="0 0 24 24" fill="#C5A059" stroke="#C5A059" strokeWidth="1.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>;
      const IconMenuBookmark = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C5A059" strokeWidth="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>;
      const IconDelete = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
      const IconCalendar = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;

      const THEMES = {
        standard: { id: 'standard', bg: '#051F22', text: '#E2D1A7', card: '#06282d', accent: '#C5A059', name: 'Standard' },
        elegant: { id: 'elegant', bg: '#0D3B33', text: '#E2D1A7', card: '#114D43', accent: '#C5A059', name: 'Elegant' },
        sepia: { id: 'sepia', bg: '#4B3621', text: '#F5E6D3', card: '#5D4329', accent: '#D4AF37', name: 'Sepia' },
        monochrome: { id: 'monochrome', bg: '#1A1A1A', text: '#E0E0E0', card: '#262626', accent: '#FFFFFF', name: 'Monochrome' },
        light: { id: 'light', bg: '#FDFCF7', text: '#222222', card: '#FFFFFF', accent: '#D97706', name: 'Light' }
      };

      const ARABIC_FONTS = {
        indopak: { id: 'indopak', name: 'IndoPak', family: '"IndoPakCustom", "Scheherazade New", "Amiri", serif' },
        kfgqpc: { id: 'kfgqpc', name: 'KFGQPC', family: '"KFGQPCNaskh", "Amiri", serif' }
      };

      const numMap = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9','۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
      const toEnglishDigits = (str) => { if(!str) return ''; return str.replace(/[٠-٩۰-۹]/g, m => numMap[m]); };

      const formatArabicWithEnglishNumbers = (text, extractedNumber) => {
            if (!text) return text;
            const hasDigits = /[٠-٩۰-۹0-9]/.test(text);
            
            if (hasDigits) {
                const regex = /([۝﴿﴾]?\s*[٠-٩۰-۹0-9]+\s*[۝﴿﴾]?)/g;
                const parts = text.split(regex);
                return parts.map((part, i) => {
                    if (part.match(/[٠-٩۰-۹0-9]/)) {
                        const englishNum = toEnglishDigits(part.replace(/[^٠-٩۰-۹0-9]/g, ''));
                        return <span key={i} className="quran-verse-circle">{englishNum}</span>;
                    }
                    return part;
                });
            } else if (extractedNumber) {
                return (
                    <Fragment>
                        {text}
                        <span className="quran-verse-circle">{extractedNumber}</span>
                    </Fragment>
                );
            }
            return text;
      };

      // DETECTS NAMES OF ALLAH AND PROPHET TO GIVE THEM THE BOXES!
      const isCardLayoutPage = (title) => {
          if (!title) return false;
          const t = title.toLowerCase();
          return t.includes('names of allah') || t.includes('names of prophet') || t.includes('asma');
      };

      const App = () => {
        const [activePageId, setActivePageId] = useState(null);
        const [selectedSurahIdx, setSelectedSurahIdx] = useState(null);
        const [isReadingMode, setIsReadingMode] = useState(false);
        const [targetId, setTargetId] = useState(null);
        const [showBookmarkAlert, setShowBookmarkAlert] = useState(false);
        const [actionMenu, setActionMenu] = useState(null);

        const [jumpVerse, setJumpVerse] = useState("");

        const [bookmarks, setBookmarks] = useState(() => {
            const saved = localStorage.getItem('qalb_faves_final_v12');
            return saved ? JSON.parse(saved) : [];
        });

        const [arabicFont, setArabicFont] = useState(() => { return localStorage.getItem('qalb_arabic_font') || 'indopak'; });
        const [showSettings, setShowSettings] = useState(false);
        const [showAbout, setShowAbout] = useState(false);
        const [showBookmarksList, setShowBookmarksList] = useState(false); 

        const [theme, setTheme] = useState(THEMES.standard);
        const [fontScale, setFontScale] = useState(0);
        const [lineHeight, setLineHeight] = useState(1.6); 
        const [showTranslation, setShowTranslation] = useState(true); 
        
        const [isPlaying, setIsPlaying] = useState(false);
        const [activeAudioUrl, setActiveAudioUrl] = useState(null);
        const audioRef = useRef(new Audio());
        const scrollRef = useRef(null);

        useEffect(() => { const splash = document.getElementById('splash-overlay'); if (splash) setTimeout(() => splash.style.display = 'none', 800); }, []);
        useEffect(() => { const audio = audioRef.current; const end = () => { setIsPlaying(false); setActiveAudioUrl(null); }; audio.addEventListener('ended', end); return () => audio.removeEventListener('ended', end); }, []);
        useEffect(() => { localStorage.setItem('qalb_faves_final_v12', JSON.stringify(bookmarks)); }, [bookmarks]);
        useEffect(() => { localStorage.setItem('qalb_arabic_font', arabicFont); }, [arabicFont]);

        useEffect(() => {
          if (isReadingMode && targetId) { 
              const el = document.getElementById(targetId); 
              if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' }); 
          }
        }, [isReadingMode, targetId, selectedSurahIdx, activePageId]);

        const toggleAudio = (url) => {
          if (activeAudioUrl === url && isPlaying) { audioRef.current.pause(); setIsPlaying(false); } 
          else { if (activeAudioUrl !== url) { audioRef.current.src = url; setActiveAudioUrl(url); } audioRef.current.play(); setIsPlaying(true); }
        };

        const closeAllModals = () => { setShowSettings(false); setShowAbout(false); setShowBookmarksList(false); };

        const openBookmarkMenu = (cardOrBlock, fallbackTitle, pageId, targetId) => {
            let title = fallbackTitle; let arabic = '';
            if (cardOrBlock.type) {
                if (cardOrBlock.type.includes('arabic')) arabic = cardOrBlock.text;
                if (cardOrBlock.type.includes('title')) title = cardOrBlock.text;
            } else if (cardOrBlock.content) {
                const tBlock = cardOrBlock.content.find(b => b.type.includes('title'));
                const aBlock = cardOrBlock.content.find(b => b.type.includes('arabic'));
                if (tBlock) title = tBlock.text;
                if (aBlock) arabic = aBlock.text;
            }
            arabic = arabic ? String(arabic).replace(/۞/g, '') : '';
            setActionMenu({ title, pageId, targetId, arabic });
        };

        const handleSave = () => {
            if (!actionMenu) return;
            const { title, pageId, targetId, arabic } = actionMenu;
            const bKey = `${pageId}|${title}|${targetId}`;
            if (!bookmarks.some(b => b.key === bKey)) {
                const dateSaved = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                setBookmarks([...bookmarks, { key: bKey, pageId, title, targetId, arabic, date: dateSaved }]);
                setShowBookmarkAlert(true); setTimeout(() => setShowBookmarkAlert(false), 2000);
            }
            setActionMenu(null);
        };

        const removeBookmark = (key) => { setBookmarks(bookmarks.filter(b => b.key !== key)); };
        const decreaseLineHeight = () => setLineHeight(prev => Number(Math.max(1.0, prev - 0.1).toFixed(1)));
        const increaseLineHeight = () => setLineHeight(prev => Number(Math.min(3.0, prev + 0.1).toFixed(1)));

        const handleJumpToVerse = (e) => {
            e.preventDefault();
            if(!jumpVerse) return;
            const targetVerse = jumpVerse.trim();
            const quranData = typeof PAGES_DATA !== 'undefined' ? PAGES_DATA['pquran'] : null;
            const card = quranData?.cards[selectedSurahIdx];
            if(!card) return;

            let counter = 1;
            let foundIdx = -1;
            
            for(let i=0; i<card.content.length; i++) {
                const block = card.content[i];
                if (block.type.startsWith('arabic')) {
                    let hasHardcoded = false;
                    const parts = block.text.split(/([۝﴿﴾]?\s*[٠-٩۰-۹0-9]+\s*[۝﴿﴾]?)/g);
                    for(let part of parts) {
                        if(/[٠-٩۰-۹0-9]/.test(part)) {
                            hasHardcoded = true;
                            if(toEnglishDigits(part.replace(/[^٠-٩۰-۹0-9]/g, '')) === targetVerse) { foundIdx = i; break; }
                        }
                    }
                    if(foundIdx !== -1) break;
                    
                    if(!hasHardcoded) {
                        let foundEng = false;
                        for(let j=i+1; j<=i+2 && j<card.content.length; j++) {
                            if(card.content[j].type === 'text') {
                                const match = card.content[j].text.match(/^\[?(\d+)\]?[\s.-]+/);
                                if(match) {
                                    counter = parseInt(match[1]) + 1;
                                    if(match[1] === targetVerse) foundIdx = i;
                                    foundEng = true;
                                    break;
                                }
                            }
                        }
                        if(foundIdx !== -1) break;
                        
                        if(!foundEng) {
                            const isBismillah = block.text.includes('بِسْمِ') && block.text.includes('رَّحْمَـٰنِ');
                            if(!isBismillah && block.text.trim().length > 0) {
                                if(counter.toString() === targetVerse) { foundIdx = i; break; }
                                counter++;
                            }
                        }
                    }
                }
            }
            
            if(foundIdx !== -1) {
                const el = document.getElementById(`q-${foundIdx}`);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                alert("Verse " + targetVerse + " not found.");
            }
            setJumpVerse("");
        };

        const renderBlock = (block, idx, blockId, isCleanLayout, isMushafMode, extractedNum) => {
          if (!block) return null;
          const aSize = 28 + (fontScale * 2); 
          const eSize = 16 + (fontScale * 1);
          const activeFontFamily = ARABIC_FONTS[arabicFont]?.family || '"Amiri", serif';

          const clean = (t) => t ? String(t).replace(/۞/g, '') : '';

          switch (block.type) {
            case 'title':
            case 'section-title': 
            case 'title-green': 
              // NO BOLD FONT! SMALLER TEXT! (Applies to all pages)
              if (isCleanLayout) {
                 return <div id={blockId} key={idx} className="block w-full text-center text-[15px] mb-2 mt-4 uppercase tracking-widest font-normal" style={{color: theme.accent}}>{clean(block.text)}</div>;
              }
              return <h3 id={blockId} key={idx} className="text-center font-normal text-[14px] mb-4 uppercase tracking-widest" style={{color: theme.accent}}>{block.text}</h3>;
            
            case 'flower-icon':
              return <div key={idx} className="block w-full text-center my-3 text-xl opacity-60" style={{color: theme.accent}}>{block.text}</div>;

            case 'count-badge':
              return (
                <div key={idx} className="flex justify-center mb-6 mt-2 w-full">
                    <span className="px-5 py-2 rounded-full text-[11px] font-bold uppercase tracking-widest border shadow-sm" style={{color: theme.accent, borderColor: theme.accent, backgroundColor: `${theme.accent}15`}}>
                        {block.text}
                    </span>
                </div>
              );

            case 'arabic': 
            case 'arabic-indopak': 
            case 'arabic-green':
              if (isCleanLayout) {
                  const arColor = block.type === 'arabic-green' ? '#4ADE80' : theme.text;
                  if (isMushafMode) {
                      return (
                          <span className="inline px-1 leading-[2.5]" style={{ fontFamily: activeFontFamily, fontSize: `${aSize}px`, color: arColor }}>
                              {formatArabicWithEnglishNumbers(clean(block.text), extractedNum)}
                          </span>
                      );
                  }
                  return (
                    <p key={idx} dir="rtl" className="text-center mb-1 px-3" style={{ fontFamily: activeFontFamily, fontSize: `${aSize}px`, color: arColor, lineHeight: lineHeight }}>
                        {formatArabicWithEnglishNumbers(clean(block.text), extractedNum)}
                    </p>
                  );
              }
              const origArColor = block.type === 'arabic-green' ? '#4ADE80' : theme.text;
              return <p key={idx} dir="rtl" className="text-center mb-4 px-4" style={{ fontFamily: activeFontFamily, fontSize: `${aSize}px`, color: origArColor, lineHeight: lineHeight }}>{clean(block.text)}</p>;
            
            case 'text': 
              if (!showTranslation) return null; 
              if (isCleanLayout) {
                  let englishText = clean(block.text);
                  let engVerseNum = null;
                  const match = englishText.match(/^\[?(\d+)\]?[\s.-]+(.*)/);
                  if (match) { engVerseNum = match[1]; englishText = match[2]; }

                  return (
                    <Fragment key={idx}>
                      <p className="text-center mt-2 mb-3 px-6" style={{ fontSize: `${eSize}px`, color: theme.text, lineHeight: lineHeight, fontFamily: '"Georgia", serif', opacity: 0.85 }}>
                        {engVerseNum && <span className="inline-flex items-center justify-center w-[22px] h-[22px] border rounded-full text-[10px] mr-2 mb-0.5" style={{borderColor: theme.text, opacity: 0.5}}>{engVerseNum}</span>}
                        {englishText}
                      </p>
                      <div className="w-1/3 mx-auto h-[1px] my-5" style={{ backgroundColor: theme.text, opacity: 0.1 }} />
                    </Fragment>
                  );
              }
              return <p key={idx} className="text-center mb-8 opacity-80 px-0 font-medium" style={{ fontSize: `${eSize}px`, color: theme.text, lineHeight: lineHeight }}>{block.text}</p>;
            
            case 'allah-name': 
              return (<div key={idx} className="text-center mb-6 border-b border-white/5 pb-4 w-full"><p className="text-3xl" style={{fontFamily: activeFontFamily, color: theme.text, lineHeight: lineHeight}}>{clean(block.arabic)}</p><p className="text-sm opacity-60 uppercase mt-2" style={{color: theme.accent}}>{block.english}</p></div>);
            
            case 'hr': 
              return <div key={idx} className="h-[0.5px] w-full my-8 block" style={{backgroundColor: theme.accent, opacity: 0.2}} />;
            
            default: return null;
          }
        };

        const renderQuranIndex = () => (
          <div className="flex flex-col h-full overflow-hidden" style={{backgroundColor: theme.bg}}>
            <div className="app-header" style={{borderBottom: `1px solid ${theme.text}15`}}><div className="header-content" style={{color: theme.text}}><button onClick={() => setActivePageId(null)} className="absolute left-5 p-1"><IconBack /></button><h1 className="font-bold text-[12px] uppercase tracking-widest">Quran Kareem</h1><button onClick={() => setShowSettings(true)} className="absolute right-5 p-1"><IconSettings /></button></div></div>
            <main className="main-content py-4"><div className="max-w-md mx-auto">{SURAHS_LIST.map((surah, i) => (<div key={i} onClick={() => setSelectedSurahIdx(i)} className="surah-card cursor-pointer active:opacity-70 border" style={{backgroundColor: theme.card, borderColor: `${theme.text}20`}}><div className="surah-num-box" style={{color: theme.accent, borderColor: theme.accent}}>{surah.id}</div><div className="surah-info"><span className="surah-en-name" style={{color: theme.text}}>{surah.name}</span><span className="surah-v-count" style={{color: theme.text, opacity: 0.6}}>{surah.verses} Verses</span></div><div className="surah-ar-name" style={{color: theme.text}}>{surah.ar}</div></div>))}</div></main>
          </div>
        );

        const renderQuranReading = () => {
          const quranData = typeof PAGES_DATA !== 'undefined' ? PAGES_DATA['pquran'] : null; 
          const card = quranData?.cards[selectedSurahIdx]; 
          const surahMeta = SURAHS_LIST[selectedSurahIdx];
          const isMushafMode = !showTranslation;
          
          let autoVerseCounter = 1;

          return (
            <div className="flex flex-col h-full overflow-hidden" style={{backgroundColor: theme.bg}}>
              <div className="app-header" style={{borderBottom: `1px solid ${theme.text}15`}}>
                <div className="header-content" style={{color: theme.text}}>
                    <button onClick={() => {setSelectedSurahIdx(null); audioRef.current.pause(); setIsPlaying(false);}} className="absolute left-5 p-1"><IconBack /></button>
                    <h1 className="font-bold text-[12px] uppercase tracking-widest">{surahMeta?.name}</h1>
                    <button onClick={() => setShowSettings(true)} className="absolute right-5 p-1"><IconSettings /></button>
                </div>
              </div>
              
              <main ref={scrollRef} className="main-content clean-layout-mode"><div className="max-w-2xl mx-auto py-4">
                
                <form onSubmit={handleJumpToVerse} className="flex gap-2 px-4 mb-4 justify-center items-center">
                    <input type="number" value={jumpVerse} onChange={(e) => setJumpVerse(e.target.value)} placeholder="Verse #" className="bg-transparent border border-opacity-30 rounded-lg text-sm px-4 py-2 text-center w-24 focus:outline-none" style={{borderColor: theme.accent, color: theme.text}} />
                    <button type="submit" className="px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-widest" style={{backgroundColor: `${theme.accent}20`, color: theme.accent, border: `1px solid ${theme.accent}`}}>Jump</button>
                </form>

                {(card?.audio1 || card?.audio2) && (<div className="flex gap-3 px-4 pb-6 mb-2 border-b" style={{borderColor: `${theme.text}10`}}>
                  {card.audio1 && (<button onClick={() => toggleAudio(card.audio1)} className="flex-1 p-3 border rounded-xl text-[10px] font-bold uppercase tracking-widest" style={{backgroundColor: `${theme.accent}10`, borderColor: theme.accent, color: theme.accent}}>{activeAudioUrl === card.audio1 && isPlaying ? 'Alafasy ❚❚' : 'Alafasy ▶'}</button>)}
                  {card.audio2 && (<button onClick={() => toggleAudio(card.audio2)} className="flex-1 p-3 border rounded-xl text-[10px] font-bold uppercase tracking-widest" style={{backgroundColor: `${theme.accent}10`, borderColor: theme.accent, color: theme.accent}}>{activeAudioUrl === card.audio2 && isPlaying ? 'Minshawi ❚❚' : 'Minshawi ▶'}</button>)}
                </div>)}
              
                <div className={isMushafMode ? "mushaf-container" : ""}>
                    {card?.content.map((block, bIdx, arr) => {
                        let extractedNum = null;
                        if (block.type.startsWith('arabic')) {
                            if (/[٠-٩۰-۹0-9]/.test(block.text)) { extractedNum = null; } 
                            else {
                                let foundEng = false;
                                for (let j = bIdx + 1; j <= bIdx + 2 && j < arr.length; j++) {
                                    if (arr[j].type === 'text') {
                                        const match = arr[j].text.match(/^\[?(\d+)\]?[\s.-]+/);
                                        if (match) { extractedNum = match[1]; autoVerseCounter = parseInt(match[1]) + 1; foundEng = true; break; }
                                    }
                                }
                                if (!foundEng) {
                                    const isBismillah = block.text.includes('بِسْمِ') && block.text.includes('رَّحْمَـٰنِ');
                                    if (!isBismillah && block.text.trim().length > 0) { extractedNum = autoVerseCounter.toString(); autoVerseCounter++; }
                                }
                            }
                        }

                        const isTitleOrBlock = block.type.includes('title') || block.type === 'hr' || block.type === 'flower-icon' || block.type === 'count-badge';
                        const wrapperClass = isMushafMode 
                            ? (isTitleOrBlock ? "mushaf-item block-force" : "mushaf-item cursor-pointer transition-opacity")
                            : "verse-row cursor-pointer active:opacity-70 transition-opacity";

                        return (
                            <div key={bIdx} id={`q-${bIdx}`} className={wrapperClass} onClick={() => openBookmarkMenu(block, surahMeta?.name, 'pquran', block._jId || `q-${bIdx}`)}>
                                {renderBlock(block, bIdx, block._jId, true, isMushafMode, extractedNum)}
                            </div>
                        );
                    })}
                </div>
                
                <div className="flex justify-between px-4 mt-8 pt-6 border-t" style={{borderColor: `${theme.text}15`}}>
                    {selectedSurahIdx > 0 ? (
                        <button type="button" onClick={() => { setSelectedSurahIdx(selectedSurahIdx - 1); setTimeout(() => { if(scrollRef.current) scrollRef.current.scrollTop = 0; }, 50); }} className="px-4 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest border transition-all" style={{borderColor: theme.accent, color: theme.accent}}>
                            ← Previous
                        </button>
                    ) : <div />}

                    {selectedSurahIdx < SURAHS_LIST.length - 1 ? (
                        <button type="button" onClick={() => { setSelectedSurahIdx(selectedSurahIdx + 1); setTimeout(() => { if(scrollRef.current) scrollRef.current.scrollTop = 0; }, 50); }} className="px-4 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest border transition-all" style={{backgroundColor: `${theme.accent}15`, borderColor: theme.accent, color: theme.accent}}>
                            Next Surah →
                        </button>
                    ) : <div />}
                </div>

                <div className="h-48" />
              </div></main>
              
              <div className="floating-controls">
                <button type="button" onClick={() => {setSelectedSurahIdx(null); setActivePageId(null);}} className="f-btn"><IconHome /></button>
                <button type="button" onClick={() => setShowSettings(true)} className="f-btn"><span className="font-bold text-[18px]">S</span></button>
              </div>
            </div>
          );
        };

        const renderStandardPage = () => {
          const page = typeof PAGES_DATA !== 'undefined' ? PAGES_DATA[activePageId] : null;
          
          // TRUE for Waking Up, Graves, etc. (No boxes). FALSE for Allah/Prophet Names (Keeps boxes).
          const cleanLayout = !isCardLayoutPage(page?.title); 

          return (
            <div className="flex flex-col h-full overflow-hidden" style={{backgroundColor: theme.bg}}>
              {showBookmarkAlert && (<div className="fixed inset-0 flex items-center justify-center z-[999] pointer-events-none"><div className="bg-black/70 p-10 rounded-full animate-bounce"><IconBookmark /></div></div>)}
              <div className="app-header" style={{borderBottom: `1px solid ${theme.text}15`}}><div className="header-content" style={{color: theme.text}}><button onClick={() => setActivePageId(null)} className="absolute left-5 p-1"><IconBack /></button><h1 className="font-bold text-[12px] uppercase tracking-widest">{page?.title || 'Loading'}</h1><button onClick={() => setShowSettings(true)} className="absolute right-5 p-1"><IconSettings /></button></div></div>
              
              {/* Applies clean layout (removes verse-row borders) if cleanLayout is true */}
              <main ref={scrollRef} className={`main-content px-4 py-6 ${cleanLayout ? 'clean-layout-mode' : ''}`}>
                  <div className="max-w-md mx-auto">
                  {page?.cards?.map((card, idx) => {
                      return (
                        <div key={idx} id={`dua-${idx}`} onClick={() => openBookmarkMenu(card, page.title, activePageId, `dua-${idx}`)} 
                             className={cleanLayout ? “mb-2 py-2 cursor-pointer active:opacity-90 transition-all" : "mb-8 p-6 border rounded-[32px] shadow-xl cursor-pointer active:opacity-90 transition-all"} 
                             style={cleanLayout ? {} : {backgroundColor: theme.card, borderColor: `${theme.accent}33`}}>
                            
                            {card.audio1 && (<div className="mb-6"><button type="button" onClick={(e) => { e.stopPropagation(); toggleAudio(card.audio1); }} className="w-full p-2 bg-black/10 border rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all" style={{borderColor: theme.accent, color: theme.accent}}>{activeAudioUrl === card.audio1 && isPlaying ? 'Playing ❚❚' : 'Listen ▶'}</button></div>)}

                            {card.content.map((block, bIdx, arr) => {
                                let extractedNum = null;
                                if (cleanLayout && block.type.startsWith('arabic') && !/[٠-٩۰-۹0-9]/.test(block.text)) {
                                    for (let j = bIdx + 1; j <= bIdx + 2 && j < arr.length; j++) {
                                        if (arr[j].type === 'text') {
                                            const match = arr[j].text.match(/^\[?(\d+)\]?[\s.-]+/);
                                            if (match) { extractedNum = match[1]; break; }
                                        }
                                    }
                                }
                                return (
                                    <div key={bIdx} className={cleanLayout ? "verse-row cursor-pointer active:opacity-70 transition-opacity" : ""}>
                                        {renderBlock(block, bIdx, null, cleanLayout, false, extractedNum)}
                                    </div>
                                );
                            })}
                        </div>
                      );
                  })}
                  <div className="h-48" /></div>
              </main>
              
              <div className="floating-controls">
                <button type="button" onClick={() => setActivePageId(null)} className="f-btn"><IconHome /></button>
                <button type="button" onClick={() => setShowSettings(true)} className="f-btn"><span className="font-bold text-[18px]">S</span></button>
              </div>
            </div>
          );
        };

        const renderIndexedPage = () => {
          const page = typeof PAGES_DATA !== 'undefined' ? PAGES_DATA[activePageId] : null; 
          
          // TRUE for Waking Up, Graves, etc. (No boxes). FALSE for Allah/Prophet Names (Keeps boxes).
          const cleanLayout = !isCardLayoutPage(page?.title);
          const allTitles = [];
          
          page?.cards?.forEach((card, cardIdx) => { 
            card.content.forEach((block, blockIdx) => { const uid = `dua-${cardIdx}-${blockIdx}`; if (block.type.includes('title')) { block._jId = uid; allTitles.push({ id: uid, text: block.text, cIdx: cardIdx, bIdx: blockIdx }); } }); 
            if (card.content.length > 0 && !card.content.some(b => b.type.includes('title'))) { const id = `dua-${cardIdx}-0`; card.content[0]._jId = id; allTitles.push({ id: id, text: `Part ${cardIdx + 1}`, cIdx: cardIdx, bIdx: 0 }); }
          });

          if (!isReadingMode) {
            return (
              <div className="flex flex-col h-full overflow-hidden" style={{backgroundColor: theme.bg}}>
                <div className="app-header" style={{borderBottom: `1px solid ${theme.text}15`}}><div className="header-content" style={{color: theme.text}}><button onClick={() => setActivePageId(null)} className="absolute left-5 p-1"><IconBack /></button><h1 className="font-bold text-[12px] uppercase tracking-widest">{page?.title || 'Loading'}</h1><button onClick={() => setShowSettings(true)} className="absolute right-5 p-1"><IconSettings /></button></div></div>
                <main className="main-content py-4"><div className="max-w-md mx-auto px-4">{allTitles.map((item, i) => (<div key={i} onClick={() => { setTargetId(item.id); setIsReadingMode(true); }} className="surah-card cursor-pointer mb-3 border" style={{backgroundColor: theme.card, borderColor: `${theme.text}20`}}><div className="surah-num-box" style={{color: theme.accent, borderColor: theme.accent}}>{i+1}</div><div className="surah-info"><span className="surah-en-name" style={{color: theme.text}}>{item.text}</span><span className="surah-v-count" style={{color: theme.text, opacity: 0.6}}>Tap to Read</span></div><div className="surah-ar-name text-xl opacity-20" style={{color: theme.text}}>◈</div></div>))}</div></main>
              </div>
            );
          }
          return (
            <div className="flex flex-col h-full overflow-hidden" style={{backgroundColor: theme.bg}}>
              {showBookmarkAlert && (<div className="fixed inset-0 flex items-center justify-center z-[999] pointer-events-none"><div className="bg-black/70 p-10 rounded-full animate-bounce"><IconBookmark /></div></div>)}
              <div className="app-header" style={{borderBottom: `1px solid ${theme.text}15`}}><div className="header-content" style={{color: theme.text}}><button onClick={() => setIsReadingMode(false)} className="absolute left-5 p-1"><IconBack /></button><h1 className="font-bold text-[12px] uppercase tracking-widest">{page?.title || 'Loading'}</h1><button onClick={() => setShowSettings(true)} className="absolute right-5 p-1"><IconSettings /></button></div></div>
              
              {/* Applies clean layout (removes verse-row borders) if cleanLayout is true */}
              <main ref={scrollRef} className={`main-content px-2 py-6 ${cleanLayout ? 'clean-layout-mode' : ''}`}>
                  <div className="max-w-2xl mx-auto">
                  {page?.cards?.map((card, idx) => {
                      return (
                        <div key={idx} id={`dua-${idx}`} onClick={() => openBookmarkMenu(card, page.title, activePageId, card.content[0]?._jId || `dua-${idx}`)} 
                             className={cleanLayout ? “mb-2 py-2 cursor-pointer active:opacity-90 transition-all" : "mb-8 p-6 border rounded-[32px] shadow-xl cursor-pointer active:opacity-90 transition-all"} 
                             style={cleanLayout ? {} : {backgroundColor: theme.card, borderColor: `${theme.accent}33`}}>
                          
                          {card.audio1 && (<div className="mb-6"><button type="button" onClick={(e) => { e.stopPropagation(); toggleAudio(card.audio1); }} className="w-full p-2 bg-black/10 border rounded-xl text-[9px] font-bold uppercase tracking-widest transition-all" style={{borderColor: theme.accent, color: theme.accent}}>{activeAudioUrl === card.audio1 && isPlaying ? 'Playing ❚❚' : 'Listen ▶'}</button></div>)}
                          
                          {card.content.map((block, bIdx, arr) => {
                              let extractedNum = null;
                              if (cleanLayout && block.type.startsWith('arabic') && !/[٠-٩۰-۹0-9]/.test(block.text)) {
                                  for (let j = bIdx + 1; j <= bIdx + 2 && j < arr.length; j++) {
                                      if (arr[j].type === 'text') {
                                          const match = arr[j].text.match(/^\[?(\d+)\]?[\s.-]+/);
                                          if (match) { extractedNum = match[1]; break; }
                                      }
                                  }
                              }
                              return (
                                  <div key={bIdx} className={cleanLayout ? "verse-row cursor-pointer active:opacity-70 transition-opacity" : ""}>
                                      {renderBlock(block, bIdx, block._jId, cleanLayout, false, extractedNum)}
                                  </div>
                              );
                          })}
                        </div>
                      )
                  })}
                  <div className="h-48" /></div>
              </main>
              
              <div className="floating-controls">
                <button type="button" onClick={() => setIsReadingMode(false)} className="f-btn"><IconHome /></button>
                <button type="button" onClick={() => setShowSettings(true)} className="f-btn"><span className="font-bold text-[18px]">S</span></button>
              </div>
            </div>
          );
        };

        const renderMenu = () => {
          return (
            <div className="flex flex-col h-full overflow-hidden" style={{backgroundColor: '#051F22'}}>
              <div className="app-header" style={{borderBottom: '1px solid rgba(197, 160, 89, 0.3)'}}><div className="header-content"><h1 className="font-bold text-[22px] text-[#C5A059] uppercase tracking-widest">Qalb-e-Dua</h1><button onClick={() => setShowSettings(true)} className="absolute right-6 p-1" style={{color: '#C5A059'}}><IconSettings /></button></div></div>
              <main className="main-content">
                  <div className="mihrab-container">
                      <div className="max-w-md mx-auto mt-2">
                          {MENU_ITEMS.map(item => <button key={item.id} onClick={() => { setActivePageId(item.pageId); setIsReadingMode(false); setTargetId(null); }} className="dua-btn">{item.label}</button>)}
                      </div>
                  </div>
              </main>
            </div>
          );
        };

        const renderPage = () => {
          if (activePageId === 'pquran') return selectedSurahIdx !== null ? renderQuranReading() : renderQuranIndex();
          const standardPages = ['p1', 'p2', 'p3', 'p12', 'p13']; 
          const indexedPages = ['p4', 'p5', 'p6', 'p7', 'p8', 'p9', 'p10', 'p11'];

          if (standardPages.includes(activePageId)) return renderStandardPage();
          else if (indexedPages.includes(activePageId)) return renderIndexedPage();
          return renderStandardPage(); 
        };

        return (
          <div id="root" style={{backgroundColor: activePageId ? theme.bg : '#051F22'}}>
            {activePageId ? renderPage() : renderMenu()}
            
            {actionMenu && (
                <div className="fixed inset-0 z-[1000] flex items-end justify-center bg-black/60 backdrop-blur-sm" onClick={() => setActionMenu(null)}>
                    <div className="w-full max-w-md bg-[#18181b] rounded-t-3xl p-6 shadow-2xl" style={{ borderTop: `1px solid ${theme.accent}40` }} onClick={e => e.stopPropagation()}>
                        <h4 className="text-white/50 text-[10px] uppercase tracking-widest mb-4 px-2 text-center">{actionMenu.title}</h4>
                        <button type="button" onClick={() => handleSave()} className="w-full flex items-center gap-4 p-4 rounded-2xl bg-white/5 active:bg-white/10 transition-colors border border-white/5 mb-3">
                            <IconMenuBookmark />
                            <span className="text-white text-[15px] font-medium tracking-wide">Bookmark Verse</span>
                        </button>
                        <button type="button" onClick={() => setActionMenu(null)} className="w-full flex items-center justify-center p-4 rounded-2xl active:bg-white/5 transition-colors">
                            <span className="text-white/40 text-[13px] font-bold uppercase tracking-widest">Cancel</span>
                        </button>
                    </div>
                </div>
            )}

            {showSettings && (
              <div className="modal-overlay" onClick={closeAllModals}>
                <div className="settings-modal mx-auto max-h-[90vh] overflow-y-auto pb-8 w-full max-w-md bg-[#0A0A0A] rounded-t-[40px] p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                  
                  {showBookmarksList ? (
                     <Fragment>
                        <div className="flex items-center mb-6">
                            <button type="button" onClick={() => setShowBookmarksList(false)} className="p-1 text-[#C5A059]"><IconBack /></button>
                            <h3 className="flex-1 text-center font-bold text-[#C5A059] pr-8 uppercase tracking-widest">Saved Bookmarks</h3>
                        </div>
                        
                        <div className="max-h-[60vh] overflow-y-auto space-y-4 px-2 pb-2">
                            {bookmarks.length === 0 ? <p className="text-white/30 text-[12px] text-center italic mt-10">No bookmarks saved yet.</p> : bookmarks.map((b) => (
                                <div key={b.key} className="w-full rounded-2xl border mb-2 overflow-hidden shadow-lg relative cursor-pointer active:scale-[0.98] transition-transform" style={{ backgroundColor: theme.card, borderColor: `${theme.accent}30` }} onClick={() => { setActivePageId(b.pageId); setIsReadingMode(true); setTargetId(b.targetId); closeAllModals(); }}>
                                    <div className="flex justify-between items-start p-4 pb-3">
                                        <div className="flex items-center gap-3 pr-2">
                                            <div className="font-bold text-xs px-3 py-2 rounded-xl" style={{ backgroundColor: theme.accent, color: theme.bg }}>{b.title.substring(0,3).toUpperCase()}</div>
                                            <h4 className="font-bold text-sm leading-tight line-clamp-2" style={{ color: theme.text }}>{b.title}</h4>
                                        </div>
                                        <button type="button" onClick={(e) => { e.stopPropagation(); removeBookmark(b.key); }} className="p-2.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-xl transition-colors">
                                            <IconDelete />
                                        </button>
                                    </div>
                                    {b.arabic && (
                                        <div className="px-4 py-4 mx-3 mb-3 rounded-xl border" style={{ backgroundColor: theme.bg, borderColor: `${theme.accent}15` }}>
                                            <p className="font-arabic text-right text-[22px] leading-relaxed line-clamp-2" dir="rtl" style={{ fontFamily: ARABIC_FONTS[arabicFont]?.family, color: theme.text }}>{b.arabic}</p>
                                        </div>
                                    )}
                                    <div className="px-5 pb-4 flex items-center gap-2 text-[11px] opacity-60" style={{ color: theme.text }}>
                                        <IconCalendar />
                                        <span>{b.date || 'Saved Bookmark'}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button type="button" onClick={() => setShowBookmarksList(false)} className="dua-btn mt-6">Back to Settings</button>
                     </Fragment>
                  
                  ) : showAbout ? (
                    <Fragment>
                      <div className="flex items-center mb-6"><button type="button" onClick={(e) => { e.stopPropagation(); setShowAbout(false); }} className="p-1 text-[#C5A059]"><IconBack /></button><h3 className="flex-1 text-center font-bold text-[#C5A059] pr-8 uppercase tracking-widest">About</h3></div>
                      <div className="mb-8 p-4 bg-black/20 rounded-2xl border border-[#C5A059]/10 max-h-[350px] overflow-y-auto text-center text-white/90 text-sm leading-relaxed"><p className="mb-4">Thank you for using this app. A collection of important du a's and dhikr gathered in one place to support daily worship and remembrance of Allah.</p><p className="italic text-[#C5A059] mb-6">May Allah forgive any mistakes, accept this effort, and grant its reward to my family who have passed away and to all Muslims, through the wasilah of Prophet Muhammad (ﷺ) and as sadaqah in the name of Shaykh Abdul Qadir Jilani (rahimahullah))</p><div className="pt-4 border-t border-[#C5A059]/20 text-center"><p className="text-[10px] text-[#C5A059] uppercase tracking-widest">Created By</p><p className="text-white font-bold">Imran Nazamul Hussain Doctor</p></div></div>
                      <button type="button" onClick={(e) => { e.stopPropagation(); setShowAbout(false); }} className="dua-btn">Back</button>
                    </Fragment>
                  
                  ) : (
                    <Fragment>
                      <h3 className="text-center font-bold text-[#C5A059] mb-8 uppercase tracking-widest">Settings</h3>
                      
                      <div className="flex items-center justify-between mb-8 px-4"><span className="text-white text-sm font-bold uppercase">English Translation</span><div onClick={() => setShowTranslation(!showTranslation)} className={`w-14 h-7 rounded-full relative transition-colors cursor-pointer ${showTranslation?'bg-[#C5A059]':'bg-gray-600'}`}><div className={`absolute top-1 w-5 h-5 bg-white rounded-full transition-all ${showTranslation?'right-1':'left-1'}`} /></div></div>
                      
                      <div className="mb-8 px-4">
                        <p className="text-[10px] font-bold text-[#C5A059] uppercase mb-4 tracking-widest text-center">Arabic Script / Font</p>
                        <div className="grid grid-cols-2 gap-3">
                            {Object.values(ARABIC_FONTS).map(font => (
                                <button type="button" key={font.id} onClick={() => setArabicFont(font.id)} className={`p-3 rounded-xl border flex items-center justify-center gap-2 transition-colors ${arabicFont === font.id ? 'border-[#C5A059] bg-[#C5A059]/10' : 'border-white/10 bg-black/20'}`}>
                                    <span className={`text-white text-[10px] font-bold uppercase ${arabicFont === font.id ? 'opacity-100 text-[#C5A059]' : 'opacity-60'}`}>{font.name}</span>
                                </button>
                            ))}
                        </div>
                      </div>

                      <div className="mb-6 px-4">
                        <p className="text-[10px] text-[#C5A059] uppercase mb-4 tracking-widest text-center">Font Size</p>
                        <div className="flex items-center justify-between bg-black/30 rounded-2xl p-2 border border-white/5">
                            <button type="button" onClick={() => setFontScale(s => Math.max(s-2, -6))} className="w-12 h-12 text-white text-2xl">-</button>
                            <span className="text-white text-xl" style={{fontFamily: ARABIC_FONTS[arabicFont]?.family}}>بِسْمِ</span>
                            <button type="button" onClick={() => setFontScale(s => Math.min(s+2, 14))} className="w-12 h-12 text-white text-2xl">+</button>
                        </div>
                      </div>

                      <div className="mb-8 px-4">
                        <p className="text-[10px] text-[#C5A059] uppercase mb-4 tracking-widest text-center">Line Height</p>
                        <div className="flex items-center justify-between bg-black/30 rounded-2xl p-2 border border-white/5">
                            <button type="button" onClick={decreaseLineHeight} className="w-12 h-12 text-white text-2xl">-</button>
                            <span className="text-[#C5A059] font-bold text-lg">{lineHeight}</span>
                            <button type="button" onClick={increaseLineHeight} className="w-12 h-12 text-white text-2xl">+</button>
                        </div>
                      </div>
                      
                      <div className="mb-8 px-4">
                        <p className="text-[10px] font-bold text-[#C5A059] uppercase mb-4 tracking-widest text-center">Saved Duas</p>
                        <button type="button" onClick={() => setShowBookmarksList(true)} className="w-full flex items-center justify-between p-4 bg-black/20 rounded-2xl border transition-colors hover:bg-black/40" style={{ borderColor: `${theme.accent}40` }}>
                            <span className="text-white text-sm font-bold uppercase tracking-wide">Saved Bookmarks</span>
                            <div className="flex items-center gap-3">
                                <span className="px-3 py-1 rounded-full text-xs font-bold" style={{ backgroundColor: theme.accent, color: theme.bg }}>{bookmarks.length}</span>
                                <span style={{ color: theme.accent }}>→</span>
                            </div>
                        </button>
                      </div>

                      <div className="mb-8 px-4"><p className="text-[10px] font-bold text-[#C5A059] uppercase mb-4 tracking-widest text-center">Theme Mode</p>
                        <div className="grid grid-cols-2 gap-3">
                            {Object.values(THEMES).map(t => (
                                <button type="button" key={t.id} onClick={() => setTheme(t)} className={`p-3 rounded-xl border flex items-center gap-3 ${theme.id===t.id?'border-[#C5A059] bg-[#C5A059]/10':'border-white/10 bg-black/20'}`}>
                                    <span className="text-white text-[10px] font-bold uppercase">{t.name}</span>
                                    <div className="ml-auto w-4 h-4 rounded" style={{backgroundColor: t.bg, border: '1px solid rgba(255,255,255,0.2)'}} />
                                </button>
                            ))}
                        </div>
                      </div>

                      <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowAbout(true); }} className="dua-btn mb-6 uppercase text-[12px]">About →</button>
                      <button type="button" onClick={closeAllModals} className="dua-btn font-bold">CLOSE</button>
                    </Fragment>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
