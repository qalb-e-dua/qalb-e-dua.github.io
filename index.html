        { type: 'arabic', text: 'وَمَا أَنفَقْتُم مِّن نَّفَقَةٍ أَوْ نَذَرْتُم مِّن نَّذْرٍ فَإِنَّ اللَّهَ يَعْلَمُهُ ۗ وَمَا لِلظَّالِمِينَ مِنْ أَنصَارٍ' },
        { type: 'text', text: '[270] And whatever you spend or pledge to do, Allah is aware of it; and the unjust do not have supporters.' },

        { type: 'arabic', text: 'إِن تُبْدُوا الصَّدَقَاتِ فَنِعِمَّا هِيَ ۖ وَإِن تُخْفُوهَا وَتُؤْتُوهَا الْفُقَرَاءَ فَهُوَ خَيْرٌ لَّكُمْ ۚ وَيُكَفِّرُ عَنكُم مِّن سَيِّئَاتِكُمْ ۗ وَاللَّهُ بِمَا تَعْمَلُونَ خَبِيرٌ' },
        { type: 'text', text: '[271] If you give charity openly, what an excellent deed it is! And if you secretly give it to the poor, it is the best for you; and it will redeem some of your sins; and Allah is Aware of your deeds.' },

        { type: 'arabic', text: 'لَّيْسَ عَلَيْكَ هُدَاهُمْ وَلَٰكِنَّ اللَّهَ يَهْدِي مَن يَشَاءُ ۗ وَمَا تُنفِقُوا مِنْ خَيْرٍ فَلِأَنفُسِكُمْ ۚ وَمَا تُنفِقُونَ إِلَّا ابْتِغَاءَ وَجْهِ اللَّهِ ۚ وَمَا تُنفِقُوا مِنْ خَيْرٍ يُوَفَّ إِلَيْكُمْ وَأَنتُمْ لَا تُظْلَمُونَ' },
        { type: 'text', text: '[272] It is not your duty (O dear Prophet Mohammed - peace and blessings be upon him) to make them accept guidance - but Allah guides whomever He wills; and whatever good thing you spend is beneficial for yourselves; and it is not right for you to spend except to seek Allah\'s pleasure; and whatever you spend will be repaid to you in full, and you will not be wronged. -' },

        { type: 'arabic', text: 'لِلْفُقَرَاءِ الَّذِينَ أُحْصِرُوا فِي سَبِيلِ اللَّهِ لَا يَسْتَطِيعُونَ ضَرْبًا فِي الْأَرْضِ يَحْسَبُهُمُ الْجَاهِلُ أَغْنِيَاءَ مِنَ التَّعَفُّفِ تَعْرِفُهُم بِسِيمَاهُمْ لَا يَسْأَلُونَ النَّاسَ إِلْحَافًا ۗ وَمَا تُنفِقُوا مِنْ خَيْرٍ فَإِنَّ اللَّهَ بِهِ عَلِيمٌ' },
        { type: 'text', text: '[273] (Spend) For the poor who are restricted while in Allah\'s cause, who cannot travel in the land (for earning) - the unwise think they are wealthy because of their restraint; you will recognise them by their faces; they do not seek from people in order to avoid grovelling; and Allah knows whatever you spend in charity.' },

        { type: 'arabic', text: 'الَّذِينَ يُنفِقُونَ أَمْوَالَهُم بِاللَّيْلِ وَالنَّهَارِ سِرًّا وَعَلَانِيَةً فَلَهُمْ أَجْرُهُمْ عِندَ رَبِّهِمْ وَلَا خَوْفٌ عَلَيْهِمْ وَلَا هُمْ يَحْزَنُونَ' },
        { type: 'text', text: '[274] Those who spend their wealth by night and day, secretly and openly - their reward is with their Lord; and there shall be no fear upon them nor shall they grieve.' },

        { type: 'arabic', text: 'الَّذِينَ يَأْكُلُونَ الرِّبَا لَا يَقُومُونَ إِلَّا كَمَا يَقُومُ الَّذِي يَتَخَبَّطُهُ الشَّيْطَانُ مِنَ الْمَسِّ ۚ ذَٰلِكَ بِأَنَّهُمْ قَالُوا إِنَّمَا الْبَيْعُ مِثْلُ الرِّبَا ۗ وَأَحَلَّ اللَّهُ الْبَيْعَ وَحَرَّمَ الرِّبَا ۚ فَمَن جَاءَهُ مَوْعِظَةٌ مِّن رَّبِّهِ فَانتَهَىٰ فَلَهُ مَا سَلَفَ وَأَمْرُهُ إِلَى اللَّهِ ۖ وَمَنْ عَادَ فَأُولَٰئِكَ أَصْحَابُ النَّارِ ۖ هُمْ فِيهَا خَالِدُونَ' },
        { type: 'text', text: '[275] Those who devour usury will not stand up on the Day of Judgement, except like the one whom an evil jinn has deranged by his touch; that is because they said, “Trade is also like usury!”; whereas Allah has made trading lawful and forbidden usury; for one to whom the guidance has come from his Lord, and he refrained therefrom, is lawful what he has taken in the past; and his affair is with Allah; and whoever continues earning it henceforth, is of the people of fire; they will remain in it for ages.' },

        { type: 'arabic', text: 'يَمْحَقُ اللَّهُ الرِّبَا وَيُرْبِي الصَّدَقَاتِ ۗ وَاللَّهُ لَا يُحِبُّ كُلَّ كَفَّارٍ أَثِيمٍ' },
        { type: 'text', text: '[276] Allah destroys usury and increases charity; and Allah does not like any ungrateful, excessive sinner.' },

        { type: 'arabic', text: 'إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ وَأَقَامُوا الصَّلَاةَ وَآتَوُا الزَّكَاةَ لَهُمْ أَجْرُهُمْ عِندَ رَبِّهِمْ وَلَا خَوْفٌ عَلَيْهِمْ وَلَا هُمْ يَحْزَنُونَ' },
        { type: 'text', text: '[277] Indeed those who believed and did good deeds and kept the prayer established and paid the charity - their reward is with their Lord; and there shall be no fear upon them nor shall they grieve.' },

        { type: 'arabic', text: 'يَا أَيُّهَا الَّذِينَ آمَنُوا اتَّقُوا اللَّهَ وَذَرُوا مَا بَقِيَ مِنَ الرِّبَا إِن كُنتُم مُّؤْمِنِينَ' },
        { type: 'text', text: '[278] O People who Believe! Fear Allah and forego the remaining usury, if you are Muslims.' },

        { type: 'arabic', text: 'فَإِن لَّمْ تَفْعَلُوا فَأْذَنُوا بِحَرْبٍ مِّنَ اللَّهِ وَرَسُولِهِ ۖ وَإِن تُبْتُمْ فَلَكُمْ رُءُوسُ أَمْوَالِكُمْ لَا تَظْلِمُونَ وَلَا تُظْلَمُونَ' },
        { type: 'text', text: '[279] And if you do not, then be certain of a war with Allah and His Noble Messenger; and if you repent, take back your principal amount; neither you cause harm to someone, nor you be harmed.' },

        { type: 'arabic', text: 'وَإِن كَانَ ذُو عُسْرَةٍ فَنَظِرَةٌ إِلَىٰ مَيْسَرَةٍ ۚ وَأَن تَصَدَّقُوا خَيْرٌ لَّكُمْ ۖ إِن كُنتُمْ تَعْلَمُونَ' },
        { type: 'text', text: '[280] And if the debtor is in difficulty, give him respite till the time of ease; and your foregoing the entire debt from him is still better for you, if only you realise.' },

        { type: 'arabic', text: 'وَاتَّقُوا يَوْمًا تُرْجَعُونَ فِيهِ إِلَى اللَّهِ ۖ ثُمَّ تُوَفَّىٰ كُلُّ نَفْسٍ مَّا كَسَبَتْ وَهُمْ لَا يُظْلَمُونَ' },
        { type: 'text', text: '[281] And fear the day in which you will be returned to Allah; and every soul will be paid back in full what it had earned, and they will not be wronged.' },

  {
    "type": "text",

  {

  {
    "type": "text",

  {
    "type": "text",

        { type: 'arabic', text: 'وَ لَا تُؤْتُوا السُّفَهَآءَ اَمْوَالَكُمُ الَّتِیْ جَعَلَ اللّٰهُ لَكُمْ قِیٰمًا وَّ ارْزُقُوْهُمْ فِیْهَا وَ اكْسُوْهُمْ وَ قُوْلُوْا لَهُمْ قَوْلًا مَّعْرُوْفًا' },
        { type: 'text', text: '5] And do not give the foolish their wealth which is in your custody - those for whom Allah has put you in charge to maintain (look after) - and feed and clothe them from it, and speak kindly to them.' },
        { type: 'arabic', text: 'وَ ابْتَلُوا الْیَتٰمٰى حَتّٰۤى اِذَا بَلَغُوا النِّكَاحَ ۚ فَاِنْ اٰنَسْتُمْ مِّنْهُمْ رُشْدًا فَادْفَعُوْۤا اِلَیْهِمْ اَمْوَالَهُمْ ۚ وَ لَا تَاْكُلُوْهَاۤ اِسْرَافًا وَّ بِدَارًا اَنْ یَّكْبَرُوْا ؕ وَ مَنْ كَانَ غَنِیًّا فَلْیَسْتَعْفِفْ ۚ وَ مَنْ كَانَ فَقِیْرًا فَلْیَاْكُلْ بِالْمَعْرُوْفِ ؕ فَاِذَا دَفَعْتُمْ اِلَیْهِمْ اَمْوَالَهُمْ فَاَشْهِدُوْا عَلَیْهِمْ ؕ وَ كَفٰى بِاللّٰهِ حَسِیْبًا' },
        { type: 'text', text: '6] And test the orphans till they are fit to get married (reach full age); then if you find them of proper judgement, hand over their wealth to them; and do not devour it by spending excessively and hastily, fearing that they will grow up; and whoever is not in need must abstain; and whoever is needy may use from it in a reasonable measure; and when you hand over their wealth to them, get witnesses over them; and Allah is Sufficient to take account.' },
        { type: 'arabic', text: 'لِلرِّجَالِ نَصِیْبٌ مِّمَّا تَرَكَ الْوَالِدٰنِ وَ الْاَقْرَبُوْنَ ۪ وَ لِلنِّسَآءِ نَصِیْبٌ مِّمَّا تَرَكَ الْوَالِدٰنِ وَ الْاَقْرَبُوْنَ مِمَّا قَلَّ مِنْهُ اَوْ كَثُرَ ؕ نَصِیْبًا مَّفْرُوْضًا' },
        { type: 'text', text: '7] For men is a share from what the parents and near relatives leave behind, and for women is a share from what the parents and near relatives leave behind, whether the wealth (inheritance) is small or large; the share is a fixed one.' },
        { type: 'arabic', text: 'وَ اِذَا حَضَرَ الْقِسْمَةَ اُولُوا الْقُرْبٰى وَ الْیَتٰمٰى وَ الْمَسٰكِیْنُ فَارْزُقُوْهُمْ مِّنْهُ وَ قُوْلُوْا لَهُمْ قَوْلًا مَّعْرُوْفًا' },
        { type: 'text', text: '8] And if relatives and orphans and the needy are present at the time of disbursement, give them something from it and speak to them with kindness.' },
        { type: 'arabic', text: 'وَ لْیَخْشَ الَّذِیْنَ لَوْ تَرَكُوْا مِنْ خَلْفِهِمْ ذُرِّیَّةً ضِعٰفًا خَافُوْا عَلَیْهِمْ ۪ فَلْیَتَّقُوا اللّٰهَ وَ لْیَقُوْلُوْا قَوْلًا سَدِیْدًا' },
        { type: 'text', text: '9] And those people must fear, who if they die leaving behind them young children would be afraid for them; so they must fear Allah and speak with fairness.' },
        { type: 'arabic', text: 'اِنَّ الَّذِیْنَ یَاْكُلُوْنَ اَمْوَالَ الْیَتٰمٰى ظُلْمًا اِنَّمَا یَاْكُلُوْنَ فِیْ بُطُوْنِهِمْ نَارًا ؕ وَ سَیَصْلَوْنَ سَعِیْرًا' },
        { type: 'text', text: '10] Indeed those who unjustly devour the wealth of orphans only fill their bellies with fire; and soon they will go into a blazing pit.' },
        { type: 'arabic', text: 'یُوْصِیْكُمُ اللّٰهُ فِیْۤ اَوْلَادِكُمْ ٭ لِلذَّكَرِ مِثْلُ حَظِّ الْاُنْثَیَیْنِ ۚ فَاِنْ كُنَّ نِسَآءً فَوْقَ اثْنَتَیْنِ فَلَهُنَّ ثُلُثَا مَا تَرَكَ ۚ وَ اِنْ كَانَتْ وَاحِدَةً فَلَهَا النِّصْفُ ؕ وَ لِاَبَوَیْهِ لِكُلِّ وَاحِدٍ مِّنْهُمَا السُّدُسُ مِمَّا تَرَكَ اِنْ كَانَ لَهٗ وَلَدٌ ۚ فَاِنْ لَّمْ یَكُنْ لَّهٗ وَلَدٌ وَّ وَرِثَهٗۤ اَبَوٰهُ فَلِاُمِّهِ الثُّلُثُ ۚ فَاِنْ كَانَ لَهٗۤ اِخْوَةٌ فَلِاُمِّهِ السُّدُسُ مِنْۢ بَعْدِ وَصِیَّةٍ یُّوْصِیْ بِهَاۤ اَوْ دَیْنٍ ؕ اٰبَآؤُكُمْ وَ اَبْنَآؤُكُمْ ۚ لَا تَدْرُوْنَ اَیُّهُمْ اَقْرَبُ لَكُمْ نَفْعًا ؕ فَرِیْضَةً مِّنَ اللّٰهِ ؕ اِنَّ اللّٰهَ كَانَ عَلِیْمًا حَكِیْمًا' },
        { type: 'text', text: '11] Allah commands you concerning your children; the son’s share is equal to that of two daughters; and if there are only daughters, for them is two-thirds of the inheritance, even if they are more than two; and if there is only one daughter, for her is half; and to each of the deceased’s parents a sixth of the inheritance, if he has children; and if the deceased has no children but leaves behind parents, then one third for the mother; and if he has several brothers and sisters, a sixth for the mother, after any will he may have made and payment of debt; your fathers and your sons - you do not know which of them will be more useful to you; this is the share fixed byAllah; indeed Allah is All Knowing, Wise.' },
        { type: 'arabic', text: 'وَ لَكُمْ نِصْفُ مَا تَرَكَ اَزْوَاجُكُمْ اِنْ لَّمْ یَكُنْ لَّهُنَّ وَلَدٌ ۚ فَاِنْ كَانَ لَهُنَّ وَلَدٌ فَلَكُمُ الرُّبُعُ مِمَّا تَرَكْنَ مِنْۢ بَعْدِ وَصِیَّةٍ یُّوْصِیْنَ بِهَاۤ اَوْ دَیْنٍ ؕ وَ لَهُنَّ الرُّبُعُ مِمَّا تَرَكْتُمْ اِنْ لَّمْ یَكُنْ لَّكُمْ وَلَدٌ ۚ فَاِنْ كَانَ لَكُمْ وَلَدٌ فَلَهُنَّ الثُّمُنُ مِمَّا تَرَكْتُمْ مِّنْۢ بَعْدِ وَصِیَّةٍ تُوْصُوْنَ بِهَاۤ اَوْ دَیْنٍ ؕ وَ اِنْ كَانَ رَجُلٌ یُّوْرَثُ كَلٰلَةً اَوِ امْرَاَةٌ وَّ لَهٗۤ اَخٌ اَوْ اُخْتٌ فَلِكُلِّ وَاحِدٍ مِّنْهُمَا السُّدُسُ ۚ فَاِنْ كَانُوْۤا اَكْثَرَ مِنْ ذٰلِكَ فَهُمْ شُرَكَآءُ فِی الثُّلُثِ مِنْۢ بَعْدِ وَصِیَّةٍ یُّوْصٰى بِهَاۤ اَوْ دَیْنٍ ۙ غَیْرَ مُضَآرٍّ ۚ وَصِیَّةً مِّنَ اللّٰهِ ؕ وَ اللّٰهُ عَلِیْمٌ حَلِیْمٌ' },
        { type: 'text', text: '12] And from what your wives leave, half is for you if they do not have any child; or if they have a child for you is a fourth of what they leave, after any will they may have made or debt to be paid; and to the women is a fourth of what you leave behind, if you do not have any child; or if you have a child then an eighth of what you leave behind, after any will you may have made, or debt to be paid; and if a deceased does not leave behind a mother, father or children but has a brother or a sister through a common mother, then to each of them a sixth; and if they (brothers and sisters) are more than two, then they shall all share in a third, after any will that may have been made or debt to be paid, in which the deceased has not caused a loss (to the heirs); this is the decree of Allah; and Allah is All Knowing, Most Forbearing.' },
        { type: 'arabic', text: 'تِلْكَ حُدُوْدُ اللّٰهِ ؕ وَ مَنْ یُّطِعِ اللّٰهَ وَ رَسُوْلَهٗ یُدْخِلْهُ جَنّٰتٍ تَجْرِیْ مِنْ تَحْتِهَا الْاَنْهٰرُ خٰلِدِیْنَ فِیْهَا ؕ وَ ذٰلِكَ الْفَوْزُ الْعَظِیْمُ' },
        { type: 'text', text: '13] These are the limits of Allah; and whoever obeys Allah and His Noble Messenger - Allah will admit him into Gardens beneath which rivers flow - abiding in it forever; and this is the great success.' },
        { type: 'arabic', text: 'وَ مَنْ یَّعْصِ اللّٰهَ وَ رَسُوْلَهٗ وَ یَتَعَدَّ حُدُوْدَهٗ یُدْخِلْهُ نَارًا خَالِدًا فِیْهَا ۪ وَ لَهٗ عَذَابٌ مُّهِیْنٌ' },
        { type: 'text', text: '14] And whoever disobeys Allah and His Noble Messenger and crosses all His limits - Allah will put him in the fire (of hell), in which he will remain forever; and for him is a disgraceful punishment.' },
        { type: 'arabic', text: 'وَ الّٰتِیْ یَاْتِیْنَ الْفَاحِشَةَ مِنْ نِّسَآىِٕكُمْ فَاسْتَشْهِدُوْا عَلَیْهِنَّ اَرْبَعَةً مِّنْكُمْ ۚ فَاِنْ شَهِدُوْا فَاَمْسِكُوْهُنَّ فِی الْبُیُوْتِ حَتّٰى یَتَوَفّٰىهُنَّ الْمَوْتُ اَوْ یَجْعَلَ اللّٰهُ لَهُنَّ سَبِیْلًا' },
        { type: 'text', text: '15] And take testimony from four chosen men amongst you, against the women among you who commit adultery; and if they testify, confine those women in the houses until death takes them away or Allah creates a solution for them.' },
        { type: 'arabic', text: 'وَ الَّذٰنِ یَاْتِیٰنِهَا مِنْكُمْ فَاٰذُوْهُمَا ۚ فَاِنْ تَابَا وَ اَصْلَحَا فَاَعْرِضُوْا عَنْهُمَا ؕ اِنَّ اللّٰهَ كَانَ تَوَّابًا رَّحِیْمًا' },
        { type: 'text', text: '16] And punish them both, the man and the woman, whoever are guilty of it (adultery); then if they repent and become pious, leave them; indeed Allah is the Most Acceptor Of Repentance, Most Merciful.' },
        { type: 'arabic', text: 'اِنَّمَا التَّوْبَةُ عَلَى اللّٰهِ لِلَّذِیْنَ یَعْمَلُوْنَ السُّوْٓءَ بِجَهَالَةٍ ثُمَّ یَتُوْبُوْنَ مِنْ قَرِیْبٍ فَاُولٰٓىِٕكَ یَتُوْبُ اللّٰهُ عَلَیْهِمْ ؕ وَ كَانَ اللّٰهُ عَلِیْمًا حَكِیْمًا' },
        { type: 'text', text: '17] Undoubtedly the repentance which Allah has by His grace made obligatory upon Himself to accept, is only the repentance of those who commit sin in folly and then soon repent - towards them does Allah incline in mercy; and Allah is the All Knowing, the Wise.' },
        { type: 'arabic', text: 'وَ لَیْسَتِ التَّوْبَةُ لِلَّذِیْنَ یَعْمَلُوْنَ السَّیِّاٰتِ ۚ حَتّٰۤى اِذَا حَضَرَ اَحَدَهُمُ الْمَوْتُ قَالَ اِنِّیْ تُبْتُ الْـٰٔنَ وَ لَا الَّذِیْنَ یَمُوْتُوْنَ وَ هُمْ كُفَّارٌ ؕ اُولٰٓىِٕكَ اَعْتَدْنَا لَهُمْ عَذَابًا اَلِیْمًا' },
        { type: 'text', text: '18] And that repentance is not of those who constantly commit sins, and when death approaches one of them, he says, “I repent now”, nor of those who die as disbelievers; for them, We have kept prepared a painful punishment.' },
        { type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْا لَا یَحِلُّ لَكُمْ اَنْ تَرِثُوا النِّسَآءَ كَرْهًا ؕ وَ لَا تَعْضُلُوْهُنَّ لِتَذْهَبُوْا بِبَعْضِ مَاۤ اٰتَیْتُمُوْهُنَّ اِلَّاۤ اَنْ یَّاْتِیْنَ بِفَاحِشَةٍ مُّبَیِّنَةٍ ۚ وَ عَاشِرُوْهُنَّ بِالْمَعْرُوْفِ ۚ فَاِنْ كَرِهْتُمُوْهُنَّ فَعَسٰۤى اَنْ تَكْرَهُوْا شَیْئًا وَّ یَجْعَلَ اللّٰهُ فِیْهِ خَیْرًا كَثِیْرًا' },
        { type: 'text', text: '19] O People who Believe! It is not lawful for you to forcibly become the women’s heirs; and do not restrain women with the intention of taking away a part of bridal money you gave them, unless they openly commit the shameful; and deal kindly with them; and if you do not like them, so it is possible that you dislike a thing in which Allah has placed abundant good.' },
        { type: 'arabic', text: 'وَ اِنْ اَرَدْتُّمُ اسْتِبْدَالَ زَوْجٍ مَّكَانَ زَوْجٍ ۙ وَّ اٰتَیْتُمْ اِحْدٰىهُنَّ قِنْطَارًا فَلَا تَاْخُذُوْا مِنْهُ شَیْئًا ؕ اَتَاْخُذُوْنَهٗ بُهْتَانًا وَّ اِثْمًا مُّبِیْنًا' },
        { type: 'text', text: '20] And if you wish to change one wife for another and you have given her heaps of treasure, do not take back anything from it; will you take it back by slander and open sin?' },
        { type: 'arabic', text: 'وَ كَیْفَ تَاْخُذُوْنَهٗ وَ قَدْ اَفْضٰى بَعْضُكُمْ اِلٰى بَعْضٍ وَّ اَخَذْنَ مِنْكُمْ مِّیْثَاقًا غَلِیْظًا' },
        { type: 'text', text: '21] And how will you take it back whereas you have become unveiled before each other, and they have taken a strong pledge from you?' },
        { type: 'arabic', text: 'وَ لَا تَنْكِحُوْا مَا نَكَحَ اٰبَآؤُكُمْ مِّنَ النِّسَآءِ اِلَّا مَا قَدْ سَلَفَ ؕ اِنَّهٗ كَانَ فَاحِشَةً وَّ مَقْتًا ؕ وَ سَآءَ سَبِیْلًا' },
        { type: 'text', text: '22] And do not marry the women who were wedded to your fathers (and grand fathers), except what has already passed; that is indeed an act of shame and great wrong; and an evil way.' },
        { type: 'arabic', text: 'حُرِّمَتْ عَلَیْكُمْ اُمَّهٰتُكُمْ وَ بَنٰتُكُمْ وَ اَخَوٰتُكُمْ وَ عَمّٰتُكُمْ وَ خٰلٰتُكُمْ وَ بَنٰتُ الْاَخِ وَ بَنٰتُ الْاُخْتِ وَ اُمَّهٰتُكُمُ الّٰتِیْۤ اَرْضَعْنَكُمْ وَ اَخَوٰتُكُمْ مِّنَ الرَّضَاعَةِ وَ اُمَّهٰتُ نِسَآىِٕكُمْ وَ رَبَآىِٕبُكُمُ الَّتِیْ فِیْ حُجُوْرِكُمْ مِّنْ نِّسَآىِٕكُمُ الّٰتِیْ دَخَلْتُمْ بِهِنَّ ؗ فَاِنْ لَّمْ تَكُوْنُوْا دَخَلْتُمْ بِهِنَّ فَلَا جُنَاحَ عَلَیْكُمْ ؗ وَ حَلَآىِٕلُ اَبْنَآىِٕكُمُ الَّذِیْنَ مِنْ اَصْلَابِكُمْ ۙ وَ اَنْ تَجْمَعُوْا بَیْنَ الْاُخْتَیْنِ اِلَّا مَا قَدْ سَلَفَ ؕ اِنَّ اللّٰهَ كَانَ غَفُوْرًا رَّحِیْمًا' },
        { type: 'text', text: '23] Forbidden for you are your mothers, and your daughters, and your sisters, and your father’s sisters, and your mother’s sisters, and your brothers’ daughters and your sisters’ daughters, and your foster-mothers (who breast-fed you), and their daughters (your foster-sisters), and your wives’ mothers (mothers-in-law), and your wives’ daughters who are under your protection - born of the women with whom you have cohabited; and if you have not cohabited with them, then it is no sin for you to marry their daughters; and (forbidden are) the wives of your own sons (and foster-sons and grandsons) and the keeping of two sisters together in marriage, except what has already passed; indeed Allah is Oft Forgiving, Most Merciful.' },
        { type: 'arabic', text: 'وَّ الْمُحْصَنٰتُ مِنَ النِّسَآءِ اِلَّا مَا مَلَكَتْ اَیْمَانُكُمْ ۚ كِتٰبَ اللّٰهِ عَلَیْكُمْ ۚ وَ اُحِلَّ لَكُمْ مَّا وَرَآءَ ذٰلِكُمْ اَنْ تَبْتَغُوْا بِاَمْوَالِكُمْ مُّحْصِنِیْنَ غَیْرَ مُسَافِحِیْنَ ؕ فَمَا اسْتَمْتَعْتُمْ بِهٖ مِنْهُنَّ فَاٰتُوْهُنَّ اُجُوْرَهُنَّ فَرِیْضَةً ؕ وَ لَا جُنَاحَ عَلَیْكُمْ فِیْمَا تَرَاضَیْتُمْ بِهٖ مِنْۢ بَعْدِ الْفَرِیْضَةِ ؕ اِنَّ اللّٰهَ كَانَ عَلِیْمًا حَكِیْمًا' },
        { type: 'text', text: '24] And all married women are forbidden for you except the wives of disbelievers who come into your possession as bondwomen; this is Allah’s decree for you; and other than these, all women are lawful for you so that you seek them in exchange of your wealth in proper wedlock, not adultery; therefore give the women you wish to marry, their appointed bridal money; and after the appointment (of bridal money) there is no sin on you if you come to a mutual agreement; indeed Allah is All Knowing, Wise.' },
        { type: 'arabic', text: 'وَ مَنْ لَّمْ یَسْتَطِعْ مِنْكُمْ طَوْلًا اَنْ یَّنْكِحَ الْمُحْصَنٰتِ الْمُؤْمِنٰتِ فَمِنْ مَّا مَلَكَتْ اَیْمَانُكُمْ مِّنْ فَتَیٰتِكُمُ الْمُؤْمِنٰتِ ؕ وَ اللّٰهُ اَعْلَمُ بِاِیْمَانِكُمْ ؕ بَعْضُكُمْ مِّنْۢ بَعْضٍ ۚ فَانْكِحُوْهُنَّ بِاِذْنِ اَهْلِهِنَّ وَ اٰتُوْهُنَّ اُجُوْرَهُنَّ بِالْمَعْرُوْفِ مُحْصَنٰتٍ غَیْرَ مُسَافِحٰتٍ وَّ لَا مُتَّخِذٰتِ اَخْدَانٍ ۚ فَاِذَاۤ اُحْصِنَّ فَاِنْ اَتَیْنَ بِفَاحِشَةٍ فَعَلَیْهِنَّ نِصْفُ مَا عَلَى الْمُحْصَنٰتِ مِنَ الْعَذَابِ ؕ ذٰلِكَ لِمَنْ خَشِیَ الْعَنَتَ مِنْكُمْ ؕ وَ اَنْ تَصْبِرُوْا خَیْرٌ لَّكُمْ ؕ وَ اللّٰهُ غَفُوْرٌ رَّحِیْمٌ' },
        { type: 'text', text: '25] And whoever among you does not have in marriage free, believing women due to poverty, should marry from the believing bondwomen you own; and Allah knows well your faith; you are from one another; therefore marry them with the permission of their masters, and give them their bridal money according to custom, they becoming (faithful) wives, not committing mischief or secretly making friends; so when they are married and commit the shameful, for them is half the punishment prescribed for free women; this is for one among you who fears falling into adultery; and to practice patience is better for you; and Allah is Oft Forgiving, Most Merciful.' },
        { type: 'arabic', text: 'یُرِیْدُ اللّٰهُ لِیُبَیِّنَ لَكُمْ وَ یَهْدِیَكُمْ سُنَنَ الَّذِیْنَ مِنْ قَبْلِكُمْ وَ یَتُوْبَ عَلَیْكُمْ ؕ وَ اللّٰهُ عَلِیْمٌ حَكِیْمٌ' },
        { type: 'text', text: '26] Allah wills to explain His commands to you and show you the ways of those before you, and to incline towards you with His mercy; and Allah is All Knowing, Wise.' },
        { type: 'arabic', text: 'وَ اللّٰهُ یُرِیْدُ اَنْ یَّتُوْبَ عَلَیْكُمْ ٭ۖ وَ یُرِیْدُ الَّذِیْنَ یَتَّبِعُوْنَ الشَّهَوٰتِ اَنْ تَمِیْلُوْا مَیْلًا عَظِیْمًا' },
        { type: 'text', text: '27] And Allah wills to incline towards you with His mercy; and those who pursue their own pleasures wish that you be far separated from the Straight Path.' },
        { type: 'arabic', text: 'یُرِیْدُ اللّٰهُ اَنْ یُّخَفِّفَ عَنْكُمْ ۚ وَ خُلِقَ الْاِنْسَانُ ضَعِیْفًا' },
        { type: 'text', text: '28] Allah wills to lessen your burden; and man was created weak.' },
        { type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْا لَا تَاْكُلُوْۤا اَمْوَالَكُمْ بَیْنَكُمْ بِالْبَاطِلِ اِلَّاۤ اَنْ تَكُوْنَ تِجَارَةً عَنْ تَرَاضٍ مِّنْكُمْ ۟ وَ لَا تَقْتُلُوْۤا اَنْفُسَكُمْ ؕ اِنَّ اللّٰهَ كَانَ بِكُمْ رَحِیْمًا' },
        { type: 'text', text: '29] O People who Believe! Do not unjustly devour the property of each other, except through trade by mutual agreement; and do not kill yourselves; indeed Allah is Most Merciful upon you.' },
        { type: 'arabic', text: 'وَ مَنْ یَّفْعَلْ ذٰلِكَ عُدْوَانًا وَّ ظُلْمًا فَسَوْفَ نُصْلِیْهِ نَارًا ؕ وَ كَانَ ذٰلِكَ عَلَى اللّٰهِ یَسِیْرًا' },
        { type: 'text', text: '30] And whoever does that through injustice and oppression, We shall soon put him in the fire; and this is easy for Allah.' },
        { type: 'arabic', text: 'اِنْ تَجْتَنِبُوْا كَبَآىِٕرَ مَا تُنْهَوْنَ عَنْهُ نُكَفِّرْ عَنْكُمْ سَیِّاٰتِكُمْ وَ نُدْخِلْكُمْ مُّدْخَلًا كَرِیْمًا' },
        { type: 'text', text: '31] If you keep avoiding the cardinal sins that are forbidden to you, We will forgive you your other (lesser) sins and admit you into a noble place.' },
        { type: 'arabic', text: 'وَ لَا تَتَمَنَّوْا مَا فَضَّلَ اللّٰهُ بِهٖ بَعْضَكُمْ عَلٰى بَعْضٍ ؕ لِلرِّجَالِ نَصِیْبٌ مِّمَّا اكْتَسَبُوْا ؕ وَ لِلنِّسَآءِ نَصِیْبٌ مِّمَّا اكْتَسَبْنَ ؕ وَ سْـَٔلُوا اللّٰهَ مِنْ فَضْلِهٖ ؕ اِنَّ اللّٰهَ كَانَ بِكُلِّ شَیْءٍ عَلِیْمًا' },
        { type: 'text', text: '32] And do not long for things by which Allah has given superiority to some of you over others; for men is the share of what they earn; and for women the share from what they earn; and seek from Allah His munificence; indeed Allah knows everything.' },
        { type: 'arabic', text: 'وَ لِكُلٍّ جَعَلْنَا مَوَالِیَ مِمَّا تَرَكَ الْوَالِدٰنِ وَ الْاَقْرَبُوْنَ ؕ وَ الَّذِیْنَ عَقَدَتْ اَیْمَانُكُمْ فَاٰتُوْهُمْ نَصِیْبَهُمْ ؕ اِنَّ اللّٰهَ كَانَ عَلٰى كُلِّ شَیْءٍ شَهِیْدًا' },
        { type: 'text', text: '33] And for all, We have appointed heirs - from whatever the parents and near relatives leave behind; and to those with whom you have made an agreement, give them their dues; indeed all things are present before Allah.' },
        { type: 'arabic', text: 'اَلرِّجَالُ قَوّٰمُوْنَ عَلَى النِّسَآءِ بِمَا فَضَّلَ اللّٰهُ بَعْضَهُمْ عَلٰى بَعْضٍ وَّ بِمَاۤ اَنْفَقُوْا مِنْ اَمْوَالِهِمْ ؕ فَالصّٰلِحٰتُ قٰنِتٰتٌ حٰفِظٰتٌ لِّلْغَیْبِ بِمَا حَفِظَ اللّٰهُ ؕ وَ الّٰتِیْ تَخَافُوْنَ نُشُوْزَهُنَّ فَعِظُوْهُنَّ وَ اهْجُرُوْهُنَّ فِی الْمَضَاجِعِ وَ اضْرِبُوْهُنَّ ۚ فَاِنْ اَطَعْنَكُمْ فَلَا تَبْغُوْا عَلَیْهِنَّ سَبِیْلًا ؕ اِنَّ اللّٰهَ كَانَ عَلِیًّا كَبِیْرًا' },
        { type: 'text', text: '34] Men are in charge of women, as Allah has made one of them superior to the other, and because men spend their wealth for the women; so virtuous women are the reverent ones, guarding behind their husbands the way Allah has decreed guarding; and the women from whom you fear disobedience, (at first) advise them and (then) do not cohabit with them, and (lastly) beat them; then if they obey you, do not seek to do injustice to them; indeed Allah is Supreme, Great.' },
        { type: 'arabic', text: 'وَ اِنْ خِفْتُمْ شِقَاقَ بَیْنِهِمَا فَابْعَثُوْا حَكَمًا مِّنْ اَهْلِهٖ وَ حَكَمًا مِّنْ اَهْلِهَا ۚ اِنْ یُّرِیْدَاۤ اِصْلَاحًا یُّوَفِّقِ اللّٰهُ بَیْنَهُمَا ؕ اِنَّ اللّٰهَ كَانَ عَلِیْمًا خَبِیْرًا' },
        { type: 'text', text: '35] And if you fear a dispute between husband and wife, send an arbitrator from the man’s family and an arbitrator from the woman’s family; if these two wish conciliation, Allah will unite them; indeed Allah is All Knowing, Well Aware.' },
        { type: 'arabic', text: 'وَ اعْبُدُوا اللّٰهَ وَ لَا تُشْرِكُوْا بِهٖ شَیْئًا وَّ بِالْوَالِدَیْنِ اِحْسَانًا وَّ بِذِی الْقُرْبٰى وَ الْیَتٰمٰى وَ الْمَسٰكِیْنِ وَ الْجَارِ ذِی الْقُرْبٰى وَ الْجَارِ الْجُنُبِ وَ الصَّاحِبِ بِالْجَنْۢبِ وَ ابْنِ السَّبِیْلِ ۙ وَ مَا مَلَكَتْ اَیْمَانُكُمْ ؕ اِنَّ اللّٰهَ لَا یُحِبُّ مَنْ كَانَ مُخْتَالًا فَخُوْرًا' },
        { type: 'text', text: '36] And worship Allah and do not ascribe any partner to Him, and be good to parents, and to relatives, and orphans, and the needy, and the related neighbour and the unrelated neighbour, and the close companion and the traveller; and your bondwomen; indeed Allah does not like any boastful, proud person. -' },
        { type: 'arabic', text: 'اۨلَّذِیْنَ یَبْخَلُوْنَ وَ یَاْمُرُوْنَ النَّاسَ بِالْبُخْلِ وَ یَكْتُمُوْنَ مَاۤ اٰتٰىهُمُ اللّٰهُ مِنْ فَضْلِهٖ ؕ وَ اَعْتَدْنَا لِلْكٰفِرِیْنَ عَذَابًا مُّهِیْنًا' },
        { type: 'text', text: '37] Those who are misers and preach miserliness to others, and hide what Allah has bestowed upon them from His munificence; and We have kept ready a disgraceful punishment for the disbelievers.' },
        { type: 'arabic', text: 'وَ الَّذِیْنَ یُنْفِقُوْنَ اَمْوَالَهُمْ رِئَآءَ النَّاسِ وَ لَا یُؤْمِنُوْنَ بِاللّٰهِ وَ لَا بِالْیَوْمِ الْاٰخِرِ ؕ وَ مَنْ یَّكُنِ الشَّیْطٰنُ لَهٗ قَرِیْنًا فَسَآءَ قَرِیْنًا' },
        { type: 'text', text: '38] And those who spend their wealth in order for people to see, and do not accept faith in Allah nor the Last Day; and whoever has Satan (the devil) as a companion - so what an evil companion is he!' },
        { type: 'arabic', text: 'وَ مَا ذَا عَلَیْهِمْ لَوْ اٰمَنُوْا بِاللّٰهِ وَ الْیَوْمِ الْاٰخِرِ وَ اَنْفَقُوْا مِمَّا رَزَقَهُمُ اللّٰهُ ؕ وَ كَانَ اللّٰهُ بِهِمْ عَلِیْمًا' },
        { type: 'text', text: '39] And what would they lose, if they had believed in Allah and the Last Day and spent from what Allah has bestowed upon them? And Allah knows them very well.' },
        { type: 'arabic', text: 'اِنَّ اللّٰهَ لَا یَظْلِمُ مِثْقَالَ ذَرَّةٍ ۚ وَ اِنْ تَكُ حَسَنَةً یُّضَاعِفْهَا وَ یُؤْتِ مِنْ لَّدُنْهُ اَجْرًا عَظِیْمًا' },
        { type: 'text', text: '40] Allah does not commit even the least injustice; and if there is a good deed, He doubles it and gives from Himself a great reward.' },
        { type: 'arabic', text: 'فَكَیْفَ اِذَا جِئْنَا مِنْ كُلِّ اُمَّةٍۭ بِشَهِیْدٍ وَّ جِئْنَا بِكَ عَلٰى هٰۤؤُلَآءِ شَهِیْدًا' },
        { type: 'text', text: '41] So how will it be when We bring a witness from each nation (religion), and We bring you (O dear Prophet Mohammed - peace and blessings be upon him) as a witness and a watcher over them? (The Holy Prophet is a witness from Allah.)' },
        { type: 'arabic', text: 'یَوْمَىِٕذٍ یَّوَدُّ الَّذِیْنَ كَفَرُوْا وَ عَصَوُا الرَّسُوْلَ لَوْ تُسَوّٰى بِهِمُ الْاَرْضُ ؕ وَ لَا یَكْتُمُوْنَ اللّٰهَ حَدِیْثًا' },
        { type: 'text', text: '42] On that day, those who disbelieved and disobeyed the Noble Messenger will wish that they be buried and the ground levelled above them; and they will not be able to hide anything from Allah.' },
        { type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْا لَا تَقْرَبُوا الصَّلٰوةَ وَ اَنْتُمْ سُكٰرٰى حَتّٰى تَعْلَمُوْا مَا تَقُوْلُوْنَ وَ لَا جُنُبًا اِلَّا عَابِرِیْ سَبِیْلٍ حَتّٰى تَغْتَسِلُوْا ؕ وَ اِنْ كُنْتُمْ مَّرْضٰۤى اَوْ عَلٰى سَفَرٍ اَوْ جَآءَ اَحَدٌ مِّنْكُمْ مِّنَ الْغَآىِٕطِ اَوْ لٰمَسْتُمُ النِّسَآءَ فَلَمْ تَجِدُوْا مَآءً فَتَیَمَّمُوْا صَعِیْدًا طَیِّبًا فَامْسَحُوْا بِوُجُوْهِكُمْ وَ اَیْدِیْكُمْ ؕ اِنَّ اللّٰهَ كَانَ عَفُوًّا غَفُوْرًا' },
        { type: 'text', text: '43] O People who Believe! Do not approach the prayer when you are intoxicated until you have the sense to understand what you say, nor in the state of impurity until you have bathed except while travelling; and if you are ill or on a journey or one of you returns from answering the call of nature or you have cohabited with women, and you do not find water, then cleanse (yourself) with clean soil - therefore stroke your faces and your hands with it; indeed Allah is Most Pardoning, Oft Forgiving.' },
        { type: 'arabic', text: 'اَلَمْ تَرَ اِلَى الَّذِیْنَ اُوْتُوْا نَصِیْبًا مِّنَ الْكِتٰبِ یَشْتَرُوْنَ الضَّلٰلَةَ وَ یُرِیْدُوْنَ اَنْ تَضِلُّوا السَّبِیْلَ' },
        { type: 'text', text: '44] Did you not see those who received a portion of the Book, that they purchase error and wish that you too go astray from the right path?' },
        { type: 'arabic', text: 'وَ اللّٰهُ اَعْلَمُ بِاَعْدَآىِٕكُمْ ؕ وَ كَفٰى بِاللّٰهِ وَلِیًّا ٭ۖ وَّ كَفٰى بِاللّٰهِ نَصِیْرًا' },
        { type: 'text', text: '45] Allah well knows your enemies; Allah is Sufficient as a Guardian, and Allah is Sufficient as a Supporter.' },
        { type: 'arabic', text: 'مِنَ الَّذِیْنَ هَادُوْا یُحَرِّفُوْنَ الْكَلِمَ عَنْ مَّوَاضِعِهٖ وَ یَقُوْلُوْنَ سَمِعْنَا وَ عَصَیْنَا وَ اسْمَعْ غَیْرَ مُسْمَعٍ وَّ رَاعِنَا لَیًّاۢ بِاَلْسِنَتِهِمْ وَ طَعْنًا فِی الدِّیْنِ ؕ وَ لَوْ اَنَّهُمْ قَالُوْا سَمِعْنَا وَ اَطَعْنَا وَ اسْمَعْ وَ انْظُرْنَا لَكَانَ خَیْرًا لَّهُمْ وَ اَقْوَمَ ۙ وَ لٰكِنْ لَّعَنَهُمُ اللّٰهُ بِكُفْرِهِمْ فَلَا یُؤْمِنُوْنَ اِلَّا قَلِیْلًا' },
        { type: 'text', text: '46] Some of the Jews interchange the words from their places and say, “We hear and disobey” - and they say “Hear- may you not be able to hear” - and they say “Raena (Be considerate towards us)” distorting it with their tongues and in order to slander religion; had they said, “We hear and we obey” and “Kindly listen to us, O dear Prophet,” and “Look mercifully upon us, O dear Prophet”, it would have been much better for them and more just - but Allah has cursed them for their disbelief; so they do not believe except a little.' },
        { type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اُوْتُوا الْكِتٰبَ اٰمِنُوْا بِمَا نَزَّلْنَا مُصَدِّقًا لِّمَا مَعَكُمْ مِّنْ قَبْلِ اَنْ نَّطْمِسَ وُجُوْهًا فَنَرُدَّهَا عَلٰۤى اَدْبَارِهَاۤ اَوْ نَلْعَنَهُمْ كَمَا لَعَنَّاۤ اَصْحٰبَ السَّبْتِ ؕ وَ كَانَ اَمْرُ اللّٰهِ مَفْعُوْلًا' },
        { type: 'text', text: '47] O People given the Book(s)! Believe in what We have sent down confirming the Book which you possess, before We transform some faces so turning them towards their backs, or curse them like We had cursed the people of Sabth; and (know that) the Allah’s command is always carried out!' },
        { type: 'arabic', text: 'اِنَّ اللّٰهَ لَا یَغْفِرُ اَنْ یُّشْرَكَ بِهٖ وَ یَغْفِرُ مَا دُوْنَ ذٰلِكَ لِمَنْ یَّشَآءُ ۚ وَ مَنْ یُّشْرِكْ بِاللّٰهِ فَقَدِ افْتَرٰۤى اِثْمًا عَظِیْمًا' },
        { type: 'text', text: '48] Undoubtedly Allah does not forgive (the sin of ) of disbelieving in Him and forgives anything lower than it to whomever He wills; and whoever ascribes partners to Allah has invented a tremendous sin.' },
        { type: 'arabic', text: 'اَلَمْ تَرَ اِلَى الَّذِیْنَ یُزَكُّوْنَ اَنْفُسَهُمْ ؕ بَلِ اللّٰهُ یُزَكِّیْ مَنْ یَّشَآءُ وَ لَا یُظْلَمُوْنَ فَتِیْلًا' },
        { type: 'text', text: '49] Did you not see those who proclaim their piety (cleanliness of deeds)? In fact Allah purifies whomever He wills, and no injustice, even equal to the hair upon a date seed will be done to them.' },
        { type: 'arabic', text: 'اُنْظُرْ كَیْفَ یَفْتَرُوْنَ عَلَى اللّٰهِ الْكَذِبَ ؕ وَ كَفٰى بِهٖۤ اِثْمًا مُّبِیْنًا' },
        { type: 'text', text: '50] See how they fabricate lies against Allah! And this is a sufficient manifest sin.' },
        { type: 'arabic', text: 'اَلَمْ تَرَ اِلَى الَّذِیْنَ اُوْتُوْا نَصِیْبًا مِّنَ الْكِتٰبِ یُؤْمِنُوْنَ بِالْجِبْتِ وَ الطَّاغُوْتِ وَ یَقُوْلُوْنَ لِلَّذِیْنَ كَفَرُوْا هٰۤؤُلَآءِ اَهْدٰى مِنَ الَّذِیْنَ اٰمَنُوْا سَبِیْلًا' },
        { type: 'text', text: '51] Did you not see those who received a portion of the Book, that they believe in idols and the devil, and say regarding the disbelievers that they are more rightly guided than the Muslims?' },
        { type: 'arabic', text: 'اُولٰٓىِٕكَ الَّذِیْنَ لَعَنَهُمُ اللّٰهُ ؕ وَ مَنْ یَّلْعَنِ اللّٰهُ فَلَنْ تَجِدَ لَهٗ نَصِیْرًا' },
        { type: 'text', text: '52] It is they whom Allah has cursed; and for those whom Allah has cursed, you (Prophet Mohammed - peace and blessings be upon him) will never find any supporter.' },
        { type: 'arabic', text: 'اَمْ لَهُمْ نَصِیْبٌ مِّنَ الْمُلْكِ فَاِذًا لَّا یُؤْتُوْنَ النَّاسَ نَقِیْرًا' },
        { type: 'text', text: '53] Do they have some share in the kingship?- if it were, they would not give to mankind even a single sesame.' },
        { type: 'arabic', text: 'اَمْ یَحْسُدُوْنَ النَّاسَ عَلٰى مَاۤ اٰتٰىهُمُ اللّٰهُ مِنْ فَضْلِهٖ ۚ فَقَدْ اٰتَیْنَاۤ اٰلَ اِبْرٰهِیْمَ الْكِتٰبَ وَ الْحِكْمَةَ وَ اٰتَیْنٰهُمْ مُّلْكًا عَظِیْمًا' },
        { type: 'text', text: '54] Or do they envy people due to what Allah has given them from His grace? In that case, We bestowed the Book and the wisdom upon the family of Ibrahim (Abraham), and We gave them a great kingdom.' },
        { type: 'arabic', text: 'فَمِنْهُمْ مَّنْ اٰمَنَ بِهٖ وَ مِنْهُمْ مَّنْ صَدَّ عَنْهُ ؕ وَ كَفٰى بِجَهَنَّمَ سَعِیْرًا' },
        { type: 'text', text: '55] So some of them believed in it and some of them turned away from it; and sufficient is hell, a blazing fire!' },
        { type: 'arabic', text: 'اِنَّ الَّذِیْنَ كَفَرُوْا بِاٰیٰتِنَا سَوْفَ نُصْلِیْهِمْ نَارًا ؕ كُلَّمَا نَضِجَتْ جُلُوْدُهُمْ بَدَّلْنٰهُمْ جُلُوْدًا غَیْرَهَا لِیَذُوْقُوا الْعَذَابَ ؕ اِنَّ اللّٰهَ كَانَ عَزِیْزًا حَكِیْمًا' },
        { type: 'text', text: '56] We shall soon put those who disbelieve in Our signs into the fire; whenever their skins are cooked (fully burnt) We shall change them for new skins so they may taste the punishment (again and again); indeed Allah is Almighty, Wise.' },
        { type: 'arabic', text: 'وَ الَّذِیْنَ اٰمَنُوْا وَ عَمِلُوا الصّٰلِحٰتِ سَنُدْخِلُهُمْ جَنّٰتٍ تَجْرِیْ مِنْ تَحْتِهَا الْاَنْهٰرُ خٰلِدِیْنَ فِیْهَاۤ اَبَدًا ؕ لَهُمْ فِیْهَاۤ اَزْوَاجٌ مُّطَهَّرَةٌ ۙ وَّ نُدْخِلُهُمْ ظِلًّا ظَلِیْلًا' },
        { type: 'text', text: '57] And those who believed and did good deeds, We shall soon admit them into Gardens beneath which rivers flow - abiding in it forever; in it for them are pure wives - and We shall admit them into places of plentiful shade.' },
        { type: 'arabic', text: 'اِنَّ اللّٰهَ یَاْمُرُكُمْ اَنْ تُؤَدُّوا الْاَمٰنٰتِ اِلٰۤى اَهْلِهَا ۙ وَ اِذَا حَكَمْتُمْ بَیْنَ النَّاسِ اَنْ تَحْكُمُوْا بِالْعَدْلِ ؕ اِنَّ اللّٰهَ نِعِمَّا یَعِظُكُمْ بِهٖ ؕ اِنَّ اللّٰهَ كَانَ سَمِیْعًاۢ بَصِیْرًا' },
        { type: 'text', text: '58] Indeed Allah commands you to hand over whatever you hold in trust, to their owners - and that whenever you judge between people, judge with fairness; undoubtedly Allah gives you an excellent advice; indeed Allah is All Hearing, All Seeing.' },
        { type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْۤا اَطِیْعُوا اللّٰهَ وَ اَطِیْعُوا الرَّسُوْلَ وَ اُولِی الْاَمْرِ مِنْكُمْ ۚ فَاِنْ تَنَازَعْتُمْ فِیْ شَیْءٍ فَرُدُّوْهُ اِلَى اللّٰهِ وَ الرَّسُوْلِ اِنْ كُنْتُمْ تُؤْمِنُوْنَ بِاللّٰهِ وَ الْیَوْمِ الْاٰخِرِ ؕ ذٰلِكَ خَیْرٌ وَّ اَحْسَنُ تَاْوِیْلًا' },
        { type: 'text', text: '59] O People who Believe! Obey Allah and the Noble Messenger and those amongst you who are in authority; so if there is a dispute amongst you concerning any matter, refer it to Allah and the Noble Messenger (for judgement) if you believe in Allah and the Last Day; this is better and has the best outcome.' },
        { type: 'arabic', text: 'اَلَمْ تَرَ اِلَى الَّذِیْنَ یَزْعُمُوْنَ اَنَّهُمْ اٰمَنُوْا بِمَاۤ اُنْزِلَ اِلَیْكَ وَ مَاۤ اُنْزِلَ مِنْ قَبْلِكَ یُرِیْدُوْنَ اَنْ یَّتَحَاكَمُوْۤا اِلَى الطَّاغُوْتِ وَ قَدْ اُمِرُوْۤا اَنْ یَّكْفُرُوْا بِهٖ ؕ وَ یُرِیْدُ الشَّیْطٰنُ اَنْ یُّضِلَّهُمْ ضَلٰلًۢا بَعِیْدًا' },
        { type: 'text', text: '60] Did you not see those whose claim is that they believe in what has been sent down on you and what was sent down before you, and they then wish to make the devil their judge, whereas they were ordered to completely reject him? And the devil wishes to mislead them far astray.' },
        { type: 'arabic', text: 'وَ اِذَا قِیْلَ لَهُمْ تَعَالَوْا اِلٰى مَاۤ اَنْزَلَ اللّٰهُ وَ اِلَى الرَّسُوْلِ رَاَیْتَ الْمُنٰفِقِیْنَ یَصُدُّوْنَ عَنْكَ صُدُوْدًا' },
        { type: 'text', text: '61] And when they are told, “Come towards the Book sent down by Allah and to the Noble Messenger,” you will see that the hypocrites turn their faces away from you.' },
        { type: 'arabic', text: 'فَكَیْفَ اِذَاۤ اَصَابَتْهُمْ مُّصِیْبَةٌۢ بِمَا قَدَّمَتْ اَیْدِیْهِمْ ثُمَّ جَآءُوْكَ یَحْلِفُوْنَ بِاللّٰهِ ٭ۖ اِنْ اَرَدْنَاۤ اِلَّاۤ اِحْسَانًا وَّ تَوْفِیْقًا' },
        { type: 'text', text: '62] What will be their state, if some calamity befalls them as a result of what their own hands have sent before them - and then they come to you (O dear Prophet Mohammed - peace and blessings be upon him), swearing by Allah that, “Our goal was only to do good and create harmony"?' },
        { type: 'arabic', text: 'اُولٰٓىِٕكَ الَّذِیْنَ یَعْلَمُ اللّٰهُ مَا فِیْ قُلُوْبِهِمْ فَاَعْرِضْ عَنْهُمْ وَ عِظْهُمْ وَ قُلْ لَّهُمْ فِیْۤ اَنْفُسِهِمْ قَوْلًاۢ بَلِیْغًا' },
        { type: 'text', text: '63] The secrets of their hearts are well known to Allah; so avoid them and explain to them, and speak to them clearly in their affairs.' },
        { type: 'arabic', text: 'وَ مَاۤ اَرْسَلْنَا مِنْ رَّسُوْلٍ اِلَّا لِیُطَاعَ بِاِذْنِ اللّٰهِ ؕ وَ لَوْ اَنَّهُمْ اِذْ ظَّلَمُوْۤا اَنْفُسَهُمْ جَآءُوْكَ فَاسْتَغْفَرُوا اللّٰهَ وَ اسْتَغْفَرَ لَهُمُ الرَّسُوْلُ لَوَجَدُوا اللّٰهَ تَوَّابًا رَّحِیْمًا' },
        { type: 'text', text: '64] And We did not send any Noble Messenger except that he be obeyed by Allah’s command; and if they, when they have wronged their own souls, come humbly to you (O dear Prophet Mohammed - peace and blessings be upon him) and seek forgiveness from Allah, and the Noble Messenger intercedes for them, they will certainly find Allah as the Most Acceptor Of Repentance, the Most Merciful.' },
        { type: 'arabic', text: 'فَلَا وَ رَبِّكَ لَا یُؤْمِنُوْنَ حَتّٰى یُحَكِّمُوْكَ فِیْمَا شَجَرَ بَیْنَهُمْ ثُمَّ لَا یَجِدُوْا فِیْۤ اَنْفُسِهِمْ حَرَجًا مِّمَّا قَضَیْتَ وَ یُسَلِّمُوْا تَسْلِیْمًا' },
        { type: 'text', text: '65] So O dear Prophet (Mohammed - peace and blessings be upon him), by oath of your Lord, they will not be Muslims until they appoint you a judge for the disputes between them - and then whatever you have decided, they should not find opposition to it within their hearts, and they must accept it wholeheartedly.' },
        { type: 'arabic', text: 'وَ لَوْ اَنَّا كَتَبْنَا عَلَیْهِمْ اَنِ اقْتُلُوْۤا اَنْفُسَكُمْ اَوِ اخْرُجُوْا مِنْ دِیَارِكُمْ مَّا فَعَلُوْهُ اِلَّا قَلِیْلٌ مِّنْهُمْ ؕ وَ لَوْ اَنَّهُمْ فَعَلُوْا مَا یُوْعَظُوْنَ بِهٖ لَكَانَ خَیْرًا لَّهُمْ وَ اَشَدَّ تَثْبِیْتًا' },
        { type: 'text', text: '66] And had We decreed for them to slay themselves or to leave their homes and families, only a few of them would have done it; and if they did what they are advised to, it would be good for them, and would have strengthened faith.' },
        { type: 'arabic', text: 'وَّ اِذًا لَّاٰتَیْنٰهُمْ مِّنْ لَّدُنَّاۤ اَجْرًا عَظِیْمًا' },
        { type: 'text', text: '67] And were it so, We would bestow upon them a great reward from Ourselves.' },
        { type: 'arabic', text: 'وَّ لَهَدَیْنٰهُمْ صِرَاطًا مُّسْتَقِیْمًا' },
        { type: 'text', text: '68] And would certainly guide them to the Straight Path.' },
        { type: 'arabic', text: 'وَ مَنْ یُّطِعِ اللّٰهَ وَ الرَّسُوْلَ فَاُولٰٓىِٕكَ مَعَ الَّذِیْنَ اَنْعَمَ اللّٰهُ عَلَیْهِمْ مِّنَ النَّبِیّٖنَ وَ الصِّدِّیْقِیْنَ وَ الشُّهَدَآءِ وَ الصّٰلِحِیْنَ ۚ وَ حَسُنَ اُولٰٓىِٕكَ رَفِیْقًا' },
        { type: 'text', text: '69] And whoever obeys Allah and His Noble Messenger, will be with those upon whom Allah has bestowed grace - that is, the Prophets and the truthful and the martyrs and the virtuous; and what excellent companions they are!' },
        { type: 'arabic', text: 'ذٰلِكَ الْفَضْلُ مِنَ اللّٰهِ ؕ وَ كَفٰى بِاللّٰهِ عَلِیْمًا' },
        { type: 'text', text: '70] This is Allah’s munificence; and Allah is Sufficient, the All Knowing.' },
        { type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْا خُذُوْا حِذْرَكُمْ فَانْفِرُوْا ثُبَاتٍ اَوِ انْفِرُوْا جَمِیْعًا' },
        { type: 'text', text: '71] O People who Believe! Be cautious, then advance towards the enemy in small numbers or all together.' },
{ type: 'arabic', text: 'وَ اِنَّ مِنْكُمْ لَمَنْ لَّیُبَطِّئَنَّ ۚ فَاِنْ اَصَابَتْكُمْ مُّصِیْبَةٌ قَالَ قَدْ اَنْعَمَ اللّٰهُ عَلَیَّ اِذْ لَمْ اَكُنْ مَّعَهُمْ شَهِیْدًا' },
{ type: 'text', text: '72] Indeed among you is one who will certainly loiter behind; then if some disaster were to befall you, he would say, “It was Allah’s grace upon me that I was not present with them!”' },
{ type: 'arabic', text: 'وَ لَىِٕنْ اَصَابَكُمْ فَضْلٌ مِّنَ اللّٰهِ لَیَقُوْلَنَّ كَاَنْ لَّمْ تَكُنْۢ بَیْنَكُمْ وَ بَیْنَهٗ مَوَدَّةٌ یّٰلَیْتَنِیْ كُنْتُ مَعَهُمْ فَاَفُوْزَ فَوْزًا عَظِیْمًا' },
{ type: 'text', text: '73] And were you to receive Allah’s munificence (a bounty), he would surely say - as if there had been no friendship between you and him - “Alas - if only I had been with them, I would have achieved a great success!”' },
{ type: 'arabic', text: 'فَلْیُقَاتِلْ فِیْ سَبِیْلِ اللّٰهِ الَّذِیْنَ یَشْرُوْنَ الْحَیٰوةَ الدُّنْیَا بِالْاٰخِرَةِ ؕ وَ مَنْ یُّقَاتِلْ فِیْ سَبِیْلِ اللّٰهِ فَیُقْتَلْ اَوْ یَغْلِبْ فَسَوْفَ نُؤْتِیْهِ اَجْرًا عَظِیْمًا' },
{ type: 'text', text: '74] So those who sell the life of this world for the Hereafter, must fight in Allah\'s cause; and We shall bestow a great reward upon whoever fights in Allah\'s cause, whether he is martyred or is victorious.' },
{ type: 'arabic', text: 'وَ مَا لَكُمْ لَا تُقَاتِلُوْنَ فِیْ سَبِیْلِ اللّٰهِ وَ الْمُسْتَضْعَفِیْنَ مِنَ الرِّجَالِ وَ النِّسَآءِ وَ الْوِلْدَانِ الَّذِیْنَ یَقُوْلُوْنَ رَبَّنَاۤ اَخْرِجْنَا مِنْ هٰذِهِ الْقَرْیَةِ الظَّالِمِ اَهْلُهَا ۚ وَ اجْعَلْ لَّنَا مِنْ لَّدُنْكَ وَلِیًّا ۚۙ وَّ اجْعَلْ لَّنَا مِنْ لَّدُنْكَ نَصِیْرًا' },
{ type: 'text', text: '75] And what is the matter with you, that you should not fight in Allah’s cause and for the feeble men, and women, and children, who invoke, “Our Lord! Liberate us from this town, the people of which are unjust; and give us a protector from Yourself; and give us a supporter from Yourself.” (Allah has created many supporters for the believers.)' },
{ type: 'arabic', text: 'اَلَّذِیْنَ اٰمَنُوْا یُقَاتِلُوْنَ فِیْ سَبِیْلِ اللّٰهِ ۚ وَ الَّذِیْنَ كَفَرُوْا یُقَاتِلُوْنَ فِیْ سَبِیْلِ الطَّاغُوْتِ فَقَاتِلُوْۤا اَوْلِیَآءَ الشَّیْطٰنِ ۚ اِنَّ كَیْدَ الشَّیْطٰنِ كَانَ ضَعِیْفًا' },
{ type: 'text', text: '76] The believers fight for Allah’s cause; and the disbelievers fight for the devil’s cause - so fight against the friends of the devil; undoubtedly the devil’s conspiracy is weak.' },
{ type: 'arabic', text: 'اَلَمْ تَرَ اِلَى الَّذِیْنَ قِیْلَ لَهُمْ كُفُّوْۤا اَیْدِیَكُمْ وَ اَقِیْمُوا الصَّلٰوةَ وَ اٰتُوا الزَّكٰوةَ ۚ فَلَمَّا كُتِبَ عَلَیْهِمُ الْقِتَالُ اِذَا فَرِیْقٌ مِّنْهُمْ یَخْشَوْنَ النَّاسَ كَخَشْیَةِ اللّٰهِ اَوْ اَشَدَّ خَشْیَةً ۚ وَ قَالُوْا رَبَّنَا لِمَ كَتَبْتَ عَلَیْنَا الْقِتَالَ ۚ لَوْ لَاۤ اَخَّرْتَنَاۤ اِلٰۤى اَجَلٍ قَرِیْبٍ ؕ قُلْ مَتَاعُ الدُّنْیَا قَلِیْلٌ ۚ وَ الْاٰخِرَةُ خَیْرٌ لِّمَنِ اتَّقٰى ۟ وَ لَا تُظْلَمُوْنَ فَتِیْلًا' },
{ type: 'text', text: '77] Did you not see those to whom it was said, “Restrain your hands, keep the prayer established and pay the charity”; but when fighting was ordained for them, some of them started fearing people, the way they feared Allah - or even greater! And they said, “Our Lord! Why have You ordained fighting for us? If only You would have let us live some more!” Say (O dear Prophet Mohammed - peace and blessings be upon him), “The usage of this world is meagre; and the Hereafter is better for the pious; and you will not be wronged even (the weight of) a single thread.”' },
{ type: 'arabic', text: 'اَیْنَمَا تَكُوْنُوْا یُدْرِكْكُّمُ الْمَوْتُ وَ لَوْ كُنْتُمْ فِیْ بُرُوْجٍ مُّشَیَّدَةٍ ؕ وَ اِنْ تُصِبْهُمْ حَسَنَةٌ یَّقُوْلُوْا هٰذِهٖ مِنْ عِنْدِ اللّٰهِ ۚ وَ اِنْ تُصِبْهُمْ سَیِّئَةٌ یَّقُوْلُوْا هٰذِهٖ مِنْ عِنْدِكَ ؕ قُلْ كُلٌّ مِّنْ عِنْدِ اللّٰهِ ؕ فَمَالِ هٰۤؤُلَآءِ الْقَوْمِ لَا یَكَادُوْنَ یَفْقَهُوْنَ حَدِیْثًا' },
{ type: 'text', text: '78] Death will come to you wherever you may be, even if you were in strong fortresses; if some good reaches them they say, “This is from Allah”; and if any misfortune reaches them, they say, “This is from you”; say, “Everything is from Allah”; what is wrong with these people, that they do not seem to understand anything?' },
{ type: 'arabic', text: 'مَاۤ اَصَابَكَ مِنْ حَسَنَةٍ فَمِنَ اللّٰهِ ۫ وَ مَاۤ اَصَابَكَ مِنْ سَیِّئَةٍ فَمِنْ نَّفْسِكَ ؕ وَ اَرْسَلْنٰكَ لِلنَّاسِ رَسُوْلًا ؕ وَ كَفٰى بِاللّٰهِ شَهِیْدًا' },
{ type: 'text', text: '79] Whatever good reaches you, O listeners, is from Allah, and whatever ill reaches you is from yourselves; and We have sent you (O dear Prophet Mohammed - peace and blessings be upon him) as a Noble Messenger towards all mankind; and Allah is Sufficient, as a Witness.' },
{ type: 'arabic', text: 'مَنْ یُّطِعِ الرَّسُوْلَ فَقَدْ اَطَاعَ اللّٰهَ ۚ وَ مَنْ تَوَلّٰى فَمَاۤ اَرْسَلْنٰكَ عَلَیْهِمْ حَفِیْظًا' },
{ type: 'text', text: '80] Whoever obeys the Noble Messenger has indeed obeyed Allah; and for those who turn away - We have not sent you as their saviour.' },
{ type: 'arabic', text: 'وَ یَقُوْلُوْنَ طَاعَةٌ ٭ فَاِذَا بَرَزُوْا مِنْ عِنْدِكَ بَیَّتَ طَآىِٕفَةٌ مِّنْهُمْ غَیْرَ الَّذِیْ تَقُوْلُ ؕ وَ اللّٰهُ یَكْتُبُ مَا یُبَیِّتُوْنَ ۚ فَاَعْرِضْ عَنْهُمْ وَ تَوَكَّلْ عَلَى اللّٰهِ ؕ وَ كَفٰى بِاللّٰهِ وَكِیْلًا' },
{ type: 'text', text: '81] And they say, “We have obeyed”; and when they go away from you, a group of them spend the night conspiring against what they had said; and Allah records what they conspired by night; therefore O dear Prophet (Mohammed - peace and blessings be upon him) avoid them and rely upon Allah; and Allah is Sufficient as a Trustee (of affairs).' },
{ type: 'arabic', text: 'اَفَلَا یَتَدَبَّرُوْنَ الْقُرْاٰنَ ؕ وَ لَوْ كَانَ مِنْ عِنْدِ غَیْرِ اللّٰهِ لَوَجَدُوْا فِیْهِ اخْتِلَافًا كَثِیْرًا' },
{ type: 'text', text: '82] So do they not ponder about the Qur’an? And had it been from anyone besides Allah, they would certainly find much contradiction in it.' },
{ type: 'arabic', text: 'وَ اِذَا جَآءَهُمْ اَمْرٌ مِّنَ الْاَمْنِ اَوِ الْخَوْفِ اَذَاعُوْا بِهٖ ؕ وَ لَوْ رَدُّوْهُ اِلَى الرَّسُوْلِ وَ اِلٰۤى اُولِی الْاَمْرِ مِنْهُمْ لَعَلِمَهُ الَّذِیْنَ یَسْتَنْۢبِطُوْنَهٗ مِنْهُمْ ؕ وَ لَوْ لَا فَضْلُ اللّٰهِ عَلَیْكُمْ وَ رَحْمَتُهٗ لَاتَّبَعْتُمُ الشَّیْطٰنَ اِلَّا قَلِیْلًا' },
{ type: 'text', text: '83] And when any news of safety or fear comes to them, they speak of it publicly; and had they referred it to the Noble Messenger and to those among them having authority, those among them who are able to infer would certainly learn the truth of the matter from them; and were it not for Allah’s munificence upon you, and His mercy, all of you would have certainly followed Satan - except a few.' },
{ type: 'arabic', text: 'فَقَاتِلْ فِیْ سَبِیْلِ اللّٰهِ ۚ لَا تُكَلَّفُ اِلَّا نَفْسَكَ وَ حَرِّضِ الْمُؤْمِنِیْنَ ۚ عَسَى اللّٰهُ اَنْ یَّكُفَّ بَاْسَ الَّذِیْنَ كَفَرُوْا ؕ وَ اللّٰهُ اَشَدُّ بَاْسًا وَّ اَشَدُّ تَنْكِیْلًا' },
{ type: 'text', text: '84] Therefore O dear Prophet, fight in Allah\'s cause; you will not be burdened except for yourself, and urge the believers (to fight); it is likely that Allah will curb the strength of the disbelievers; and Allah\'s strike is most stinging and His punishment the most severe.' },
{ type: 'arabic', text: 'مَنْ یَّشْفَعْ شَفَاعَةً حَسَنَةً یَّكُنْ لَّهٗ نَصِیْبٌ مِّنْهَا ۚ وَ مَنْ یَّشْفَعْ شَفَاعَةً سَیِّئَةً یَّكُنْ لَّهٗ كِفْلٌ مِّنْهَا ؕ وَ كَانَ اللّٰهُ عَلٰى كُلِّ شَیْءٍ مُّقِیْتًا' },
{ type: 'text', text: '85] Whoever makes a noble intercession will have a share of it, and whoever makes an evil intercession will have a share of it; and Allah is Able to do all things.' },
{ type: 'arabic', text: 'وَ اِذَا حُیِّیْتُمْ بِتَحِیَّةٍ فَحَیُّوْا بِاَحْسَنَ مِنْهَاۤ اَوْ رُدُّوْهَا ؕ اِنَّ اللّٰهَ كَانَ عَلٰى كُلِّ شَیْءٍ حَسِیْبًا' },
{ type: 'text', text: '86] And when you are greeted with some words, greet back with words better than it or with the same; indeed Allah will take account of everything.' },
{ type: 'arabic', text: 'اَللّٰهُ لَاۤ اِلٰهَ اِلَّا هُوَ ؕ لَیَجْمَعَنَّكُمْ اِلٰى یَوْمِ الْقِیٰمَةِ لَا رَیْبَ فِیْهِ ؕ وَ مَنْ اَصْدَقُ مِنَ اللّٰهِ حَدِیْثًا' },
{ type: 'text', text: '87] Allah! There is none worthy of worship except Him; He will surely gather you all on the Day of Resurrection in which there is no doubt; and whose Words are more true than those of Allah? (Allah does not lie.)' },
{ type: 'arabic', text: 'فَمَا لَكُمْ فِی الْمُنٰفِقِیْنَ فِئَتَیْنِ وَ اللّٰهُ اَرْكَسَهُمْ بِمَا كَسَبُوْا ؕ اَتُرِیْدُوْنَ اَنْ تَهْدُوْا مَنْ اَضَلَّ اللّٰهُ ؕ وَ مَنْ یُّضْلِلِ اللّٰهُ فَلَنْ تَجِدَ لَهٗ سَبِیْلًا' },
{ type: 'text', text: '88] So what is the matter with you that you got divided into two groups concerning the hypocrites, whereas Allah has inverted them because of their misdeeds? Do you wish to guide one whom Allah has sent astray? And for one whom Allah sends astray, you will not find a way.' },
{ type: 'arabic', text: 'وَدُّوْا لَوْ تَكْفُرُوْنَ كَمَا كَفَرُوْا فَتَكُوْنُوْنَ سَوَآءً فَلَا تَتَّخِذُوْا مِنْهُمْ اَوْلِیَآءَ حَتّٰى یُهَاجِرُوْا فِیْ سَبِیْلِ اللّٰهِ ؕ فَاِنْ تَوَلَّوْا فَخُذُوْهُمْ وَ اقْتُلُوْهُمْ حَیْثُ وَجَدْتُّمُوْهُمْ ۪ وَ لَا تَتَّخِذُوْا مِنْهُمْ وَلِیًّا وَّ لَا نَصِیْرًا' },
{ type: 'text', text: '89] They wish that you too should turn disbelievers the way they did, so that you all may become equal - so do not befriend any of them until they forsake their homes and families in Allah’s cause; then if they turn back, seize them and kill them wherever you find them; and do not take any of them as a friend nor as a supporter.' },
{ type: 'arabic', text: 'اِلَّا الَّذِیْنَ یَصِلُوْنَ اِلٰى قَوْمٍۭ بَیْنَكُمْ وَ بَیْنَهُمْ مِّیْثَاقٌ اَوْ جَآءُوْكُمْ حَصِرَتْ صُدُوْرُهُمْ اَنْ یُّقَاتِلُوْكُمْ اَوْ یُقَاتِلُوْا قَوْمَهُمْ ؕ وَ لَوْ شَآءَ اللّٰهُ لَسَلَّطَهُمْ عَلَیْكُمْ فَلَقٰتَلُوْكُمْ ۚ فَاِنِ اعْتَزَلُوْكُمْ فَلَمْ یُقَاتِلُوْكُمْ وَ اَلْقَوْا اِلَیْكُمُ السَّلَمَ ۙ فَمَا جَعَلَ اللّٰهُ لَكُمْ عَلَیْهِمْ سَبِیْلًا' },
{ type: 'text', text: '90] Except those who are related to the people between whom and you is a treaty, or who come to you with their hearts no longer having the will to fight you or to fight their own people; had Allah willed, He would certainly have given them power over you so that they would have surely fought you; then if they avoid you and do not wage war against you and make an offer of peace - then Allah has not kept for you a way against them.' },
{ type: 'arabic', text: 'سَتَجِدُوْنَ اٰخَرِیْنَ یُرِیْدُوْنَ اَنْ یَّاْمَنُوْكُمْ وَ یَاْمَنُوْا قَوْمَهُمْ ؕ كُلَّمَا رُدُّوْۤا اِلَى الْفِتْنَةِ اُرْكِسُوْا فِیْهَا ۚ فَاِنْ لَّمْ یَعْتَزِلُوْكُمْ وَ یُلْقُوْۤا اِلَیْكُمُ السَّلَمَ وَ یَكُفُّوْۤا اَیْدِیَهُمْ فَخُذُوْهُمْ وَ اقْتُلُوْهُمْ حَیْثُ ثَقِفْتُمُوْهُمْ ؕ وَ اُولٰٓىِٕكُمْ جَعَلْنَا لَكُمْ عَلَیْهِمْ سُلْطٰنًا مُّبِیْنًا' },
{ type: 'text', text: '91] You will now find others who desire that they should be safe from you and also safe from their own people; whenever their people turn them towards war, they fall headlong into it; so if they do not avoid (confronting) you nor submit an offer of peace nor restrain their hands, seize them and kill them wherever you find them; and they are the ones against whom We have given you clear authority.' },
{ type: 'arabic', text: 'وَ مَا كَانَ لِمُؤْمِنٍ اَنْ یَّقْتُلَ مُؤْمِنًا اِلَّا خَطَـًٔا ۚ وَ مَنْ قَتَلَ مُؤْمِنًا خَطَـًٔا فَتَحْرِیْرُ رَقَبَةٍ مُّؤْمِنَةٍ وَّ دِیَةٌ مُّسَلَّمَةٌ اِلٰۤى اَهْلِهٖۤ اِلَّاۤ اَنْ یَّصَّدَّقُوْا ؕ فَاِنْ كَانَ مِنْ قَوْمٍ عَدُوٍّ لَّكُمْ وَ هُوَ مُؤْمِنٌ فَتَحْرِیْرُ رَقَبَةٍ مُّؤْمِنَةٍ ؕ وَ اِنْ كَانَ مِنْ قَوْمٍۭ بَیْنَكُمْ وَ بَیْنَهُمْ مِّیْثَاقٌ فَدِیَةٌ مُّسَلَّمَةٌ اِلٰۤى اَهْلِهٖ وَ تَحْرِیْرُ رَقَبَةٍ مُّؤْمِنَةٍ ۚ فَمَنْ لَّمْ یَجِدْ فَصِیَامُ شَهْرَیْنِ مُتَتَابِعَیْنِ ٭ تَوْبَةً مِّنَ اللّٰهِ ؕ وَ كَانَ اللّٰهُ عَلِیْمًا حَكِیْمًا' },
{ type: 'text', text: '92] It is not rightful for a Muslim to kill another Muslim, unless it occurs by mistake; and the one who mistakenly kills a Muslim must set free a Muslim slave and pay blood-money to the family of the slain, except if they forego it; and if the victim is of a people who are hostile to you, and the killer is a Muslim, then only the setting free of a Muslim slave (is obligatory); and if the victim is from a people between whom and you there is a treaty, then blood-money must be paid to his family and the setting free of a Muslim slave; therefore one who has no means must fast for two consecutive months; this is his penance before Allah; and Allah is All Knowing, Wise.' },
{ type: 'arabic', text: 'وَ مَنْ یَّقْتُلْ مُؤْمِنًا مُّتَعَمِّدًا فَجَزَآؤُهٗ جَهَنَّمُ خَالِدًا فِیْهَا وَ غَضِبَ اللّٰهُ عَلَیْهِ وَ لَعَنَهٗ وَ اَعَدَّ لَهٗ عَذَابًا عَظِیْمًا' },
{ type: 'text', text: '93] And whoever slays a Muslim on purpose, his reward will be hell - to remain in it for ages - and Allah has wreaked wrath upon him and has cursed him and kept prepared a terrible punishment for him.' },
{ type: 'arabic', text: 'یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْۤا اِذَا ضَرَبْتُمْ فِیْ سَبِیْلِ اللّٰهِ فَتَبَیَّنُوْا وَ لَا تَقُوْلُوْا لِمَنْ اَلْقٰى اِلَیْكُمُ السَّلٰمَ لَسْتَ مُؤْمِنًا ۚ تَبْتَغُوْنَ عَرَضَ الْحَیٰوةِ الدُّنْیَا ۖ فَعِنْدَ اللّٰهِ مَغَانِمُ كَثِیْرَةٌ ؕ كَذٰلِكَ كُنْتُمْ مِّنْ قَبْلُ فَمَنَّ اللّٰهُ عَلَیْكُمْ فَتَبَیَّنُوْا ؕ اِنَّ اللّٰهَ كَانَ بِمَا تَعْمَلُوْنَ خَبِیْرًا' },
{ type: 'text', text: '94] O People who Believe! When you go forth to fight in holy war, make a proper study, and do not say to the one who greets you, “You are not a Muslim,” - you seek the means of this worldly life; so with Allah are the bounties in plenty; you too were like this before, then Allah bestowed His favour on you, therefore you must make a proper study; indeed Allah knows whatever you do.' },
{ type: 'arabic', text: 'لَا یَسْتَوِی الْقَاعِدُوْنَ مِنَ الْمُؤْمِنِیْنَ غَیْرُ اُولِی الضَّرَرِ وَ الْمُجٰهِدُوْنَ فِیْ سَبِیْلِ اللّٰهِ بِاَمْوَالِهِمْ وَ اَنْفُسِهِمْ ؕ فَضَّلَ اللّٰهُ الْمُجٰهِدِیْنَ بِاَمْوَالِهِمْ وَ اَنْفُسِهِمْ عَلَى الْقَاعِدِیْنَ دَرَجَةً ؕ وَ كُلًّا وَّعَدَ اللّٰهُ الْحُسْنٰى ؕ وَ فَضَّلَ اللّٰهُ الْمُجٰهِدِیْنَ عَلَى الْقَاعِدِیْنَ اَجْرًا عَظِیْمًا' },
{ type: 'text', text: '95] The Muslims who stay back from holy war without proper excuse, are not equal to the Muslims who fight in Allah\'s cause with their wealth and lives; Allah has bestowed higher ranks to the warriors who strive with their wealth and lives, than those who stay back; and Allah has promised good to all; and Allah has favoured the warriors upon those who stay back, with a great reward.' },
{ type: 'arabic', text: 'دَرَجٰتٍ مِّنْهُ وَ مَغْفِرَةً وَّ رَحْمَةً ؕ وَ كَانَ اللّٰهُ غَفُوْرًا رَّحِیْمًا' },
{ type: 'text', text: '96] Ranks (of honour) from Him, and forgiveness, and mercy; and Allah is Oft Forgiving, Most Merciful.' },
{ type: 'arabic', text: 'اِنَّ الَّذِیْنَ تَوَفّٰىهُمُ الْمَلٰٓىِٕكَةُ ظَالِمِیْۤ اَنْفُسِهِمْ قَالُوْا فِیْمَ كُنْتُمْ ؕ قَالُوْا كُنَّا مُسْتَضْعَفِیْنَ فِی الْاَرْضِ ؕ قَالُوْا اَلَمْ تَكُنْ اَرْضُ اللّٰهِ وَاسِعَةً فَتُهَاجِرُوْا فِیْهَا ؕ فَاُولٰٓىِٕكَ مَاْوٰىهُمْ جَهَنَّمُ ؕ وَ سَآءَتْ مَصِیْرًا' },
{ type: 'text', text: '97] The angels ask the people whose souls they remove while they were wronging themselves, “What were you engaged in?” They reply, “We were powerless in the land”; the angels say, “Was Allah’s earth not spacious enough for you to have migrated in it?” The destination for such is hell; and a very wretched place to return.' },
{ type: 'arabic', text: 'اِلَّا الْمُسْتَضْعَفِیْنَ مِنَ الرِّجَالِ وَ النِّسَآءِ وَ الْوِلْدَانِ لَا یَسْتَطِیْعُوْنَ حِیْلَةً وَّ لَا یَهْتَدُوْنَ سَبِیْلًا' },
{ type: 'text', text: '98] Except those who were forcibly subdued among men, and the women and children, unable to devise a plan and unaware of the way.' },
{ type: 'arabic', text: 'فَاُولٰٓىِٕكَ عَسَى اللّٰهُ اَنْ یَّعْفُوَ عَنْهُمْ ؕ وَ كَانَ اللّٰهُ عَفُوًّا غَفُوْرًا' },
{ type: 'text', text: '99] So for such, it is likely that Allah will pardon them; and Allah is Most Pardoning, Oft Forgiving.' },
{ type: "arabic", text: "فَاُولٰٓىِٕكَ عَسَى اللّٰهُ اَنْ یَّعْفُوَ عَنْهُمْ ؕ وَ كَانَ اللّٰهُ عَفُوًّا غَفُوْرًا" },
{ type: "text", text: "99] So for such, it is likely that Allah will pardon them; and Allah is Most Pardoning, Oft Forgiving." },
{ type: "arabic", text: "وَ مَنْ یُّهَاجِرْ فِیْ سَبِیْلِ اللّٰهِ یَجِدْ فِی الْاَرْضِ مُرَاغَمًا كَثِیْرًا وَّ سَعَةً ؕ وَ مَنْ یَّخْرُجْ مِنْۢ بَیْتِهٖ مُهَاجِرًا اِلَى اللّٰهِ وَ رَسُوْلِهٖ ثُمَّ یُدْرِكْهُ الْمَوْتُ فَقَدْ وَقَعَ اَجْرُهٗ عَلَى اللّٰهِ ؕ وَ كَانَ اللّٰهُ غَفُوْرًا رَّحِیْمًا" },
{ type: "text", text: "100] Whoever migrates for Allah's cause will find much shelter and abundant capacity in the earth; and whoever leaves his home, migrating towards Allah and His Noble Messenger, and death seizes him, his reward then lies entrusted with Allah; and Allah is Oft Forgiving, Most Merciful." },
{ type: "arabic", text: "وَ اِذَا ضَرَبْتُمْ فِی الْاَرْضِ فَلَیْسَ عَلَیْكُمْ جُنَاحٌ اَنْ تَقْصُرُوْا مِنَ الصَّلٰوةِ ٭ۖ اِنْ خِفْتُمْ اَنْ یَّفْتِنَكُمُ الَّذِیْنَ كَفَرُوْا ؕ اِنَّ الْكٰفِرِیْنَ كَانُوْا لَكُمْ عَدُوًّا مُّبِیْنًا" },
{ type: "text", text: "101] And when you travel in the land, it is no sin for you to curtail some of your obligatory prayers; if you fear that disbelievers may cause you harm; undoubtedly the disbelievers are open enemies to you." },
{ type: "arabic", text: "وَ اِذَا كُنْتَ فِیْهِمْ فَاَقَمْتَ لَهُمُ الصَّلٰوةَ فَلْتَقُمْ طَآىِٕفَةٌ مِّنْهُمْ مَّعَكَ وَ لْیَاْخُذُوْۤا اَسْلِحَتَهُمْ ۟ فَاِذَا سَجَدُوْا فَلْیَكُوْنُوْا مِنْ وَّرَآىِٕكُمْ ۖ وَ لْتَاْتِ طَآىِٕفَةٌ اُخْرٰى لَمْ یُصَلُوْا فَلْیُصَلُوْا مَعَكَ وَ لْیَاْخُذُوْا حِذْرَهُمْ وَ اَسْلِحَتَهُمْ ۚ وَدَّ الَّذِیْنَ كَفَرُوْا لَوْ تَغْفُلُوْنَ عَنْ اَسْلِحَتِكُمْ وَ اَمْتِعَتِكُمْ فَیَمِیْلُوْنَ عَلَیْكُمْ مَّیْلَةً وَّاحِدَةً ؕ وَ لَا جُنَاحَ عَلَیْكُمْ اِنْ كَانَ بِكُمْ اَذًى مِّنْ مَّطَرٍ اَوْ كُنْتُمْ مَّرْضٰۤى اَنْ تَضَعُوْۤا اَسْلِحَتَكُمْ ۚ وَ خُذُوْا حِذْرَكُمْ ؕ اِنَّ اللّٰهَ اَعَدَّ لِلْكٰفِرِیْنَ عَذَابًا مُّهِیْنًا" },
{ type: "text", text: "102] And when you (O dear Prophet Mohammed - peace and blessings be upon him) are among them and lead them in prayer, only a group of them should be with you, and they must keep their weapons with them; so when they have performed their prostrations they should move away behind you; and the other group that had not prayed, must come and offer prayers in your leadership, keeping their guard and weapons with them; the disbelievers wish that you neglect your arms and your means so they may overpower you with a single attack; it is no sin for you to lay aside your arms due to rain or if you are sick; and keep your guard; undoubtedly Allah has kept prepared a disgraceful punishment for the disbelievers." },
{ type: "arabic", text: "فَاِذَا قَضَیْتُمُ الصَّلٰوةَ فَاذْكُرُوا اللّٰهَ قِیَامًا وَّ قُعُوْدًا وَّ عَلٰى جُنُوْبِكُمْ ۚ فَاِذَا اطْمَاْنَنْتُمْ فَاَقِیْمُوا الصَّلٰوةَ ۚ اِنَّ الصَّلٰوةَ كَانَتْ عَلَى الْمُؤْمِنِیْنَ كِتٰبًا مَّوْقُوْتًا" },
{ type: "text", text: "103] So when you have offered your prayers remember Allah while standing, sitting and reclining; and when you feel secure, offer prayers in the usual manner; indeed prayers are a time bound obligatory duty upon the Muslims." },
{ type: "arabic", text: "وَ لَا تَهِنُوْا فِی ابْتِغَآءِ الْقَوْمِ ؕ اِنْ تَكُوْنُوْا تَاْلَمُوْنَ فَاِنَّهُمْ یَاْلَمُوْنَ كَمَا تَاْلَمُوْنَ ۚ وَ تَرْجُوْنَ مِنَ اللّٰهِ مَا لَا یَرْجُوْنَ ؕ وَ كَانَ اللّٰهُ عَلِیْمًا حَكِیْمًا" },
{ type: "text", text: "104] Do not relax in pursuit of the disbelievers; if you are suffering, they also suffer as you do; and you expect from Allah what they do not; and Allah is All Knowing, Wise." },
{ type: "arabic", text: "اِنَّاۤ اَنْزَلْنَاۤ اِلَیْكَ الْكِتٰبَ بِالْحَقِّ لِتَحْكُمَ بَیْنَ النَّاسِ بِمَاۤ اَرٰىكَ اللّٰهُ ؕ وَ لَا تَكُنْ لِّلْخَآىِٕنِیْنَ خَصِیْمًا" },
{ type: "text", text: "105] We have indeed sent down the true Book towards you (O dear Prophet Mohammed - peace and blessings be upon him), so that you may judge between men, in the way Allah may show you; and do not plead on behalf of the treacherous." },
{ type: "arabic", text: "وَّ اسْتَغْفِرِ اللّٰهَ ؕ اِنَّ اللّٰهَ كَانَ غَفُوْرًا رَّحِیْمًا" },
{ type: "text", text: "106] And seek forgiveness from Allah; indeed Allah is Oft Forgiving, Most Merciful." },
{ type: "arabic", text: "وَ لَا تُجَادِلْ عَنِ الَّذِیْنَ یَخْتَانُوْنَ اَنْفُسَهُمْ ؕ اِنَّ اللّٰهَ لَا یُحِبُّ مَنْ كَانَ خَوَّانًا اَثِیْمًا" },
{ type: "text", text: "107] And do not plead on behalf of those who deceive themselves; indeed Allah does not like any treacherous, excessive sinner." },
{ type: "arabic", text: "یَسْتَخْفُوْنَ مِنَ النَّاسِ وَ لَا یَسْتَخْفُوْنَ مِنَ اللّٰهِ وَ هُوَ مَعَهُمْ اِذْ یُبَیِّتُوْنَ مَا لَا یَرْضٰى مِنَ الْقَوْلِ ؕ وَ كَانَ اللّٰهُ بِمَا یَعْمَلُوْنَ مُحِیْطًا" },
{ type: "text", text: "108] They hide from men and do not hide from Allah, whereas Allah is with them when they plan in their hearts that which displeases Him; and Allah has their deeds encompassed." },
{ type: "arabic", text: "هٰۤاَنْتُمْ هٰۤؤُلَآءِ جٰدَلْتُمْ عَنْهُمْ فِی الْحَیٰوةِ الدُّنْیَا ٭ فَمَنْ یُّجَادِلُ اللّٰهَ عَنْهُمْ یَوْمَ الْقِیٰمَةِ اَمْ مَّنْ یَّكُوْنُ عَلَیْهِمْ وَكِیْلًا" },
{ type: "text", text: "109] Pay heed! It is you people who argued on their behalf in the life of this world; so who will fight on their behalf with Allah on the Day of Resurrection, or who will be their pleader?" },
{ type: "arabic", text: "وَ مَنْ یَّعْمَلْ سُوْٓءًا اَوْ یَظْلِمْ نَفْسَهٗ ثُمَّ یَسْتَغْفِرِ اللّٰهَ یَجِدِ اللّٰهَ غَفُوْرًا رَّحِیْمًا" },
{ type: "text", text: "110] And whoever does evil or wrongs his own soul and then seeks forgiveness from Allah, will find Allah Oft Forgiving, Most Merciful." },
{ type: "arabic", text: "وَ مَنْ یَّكْسِبْ اِثْمًا فَاِنَّمَا یَكْسِبُهٗ عَلٰى نَفْسِهٖ ؕ وَ كَانَ اللّٰهُ عَلِیْمًا حَكِیْمًا" },
{ type: "text", text: "111] And whoever earns sin, his earnings will only be against himself; and Allah is the Knowing, Wise." },
{ type: "arabic", text: "وَ مَنْ یَّكْسِبْ خَطِیْٓـَٔةً اَوْ اِثْمًا ثُمَّ یَرْمِ بِهٖ بَرِیْٓـًٔا فَقَدِ احْتَمَلَ بُهْتَانًا وَّ اِثْمًا مُّبِیْنًا" },
{ type: "text", text: "112] And whoever commits a mistake or a sin, then blames it on someone innocent has indeed burdened himself with infamy and a manifest crime." },
{ type: "arabic", text: "وَ لَوْ لَا فَضْلُ اللّٰهِ عَلَیْكَ وَ رَحْمَتُهٗ لَهَمَّتْ طَّآىِٕفَةٌ مِّنْهُمْ اَنْ یُّضِلُّوْكَ ؕ وَ مَا یُضِلُّوْنَ اِلَّاۤ اَنْفُسَهُمْ وَ مَا یَضُرُّوْنَكَ مِنْ شَیْءٍ ؕ وَ اَنْزَلَ اللّٰهُ عَلَیْكَ الْكِتٰبَ وَ الْحِكْمَةَ وَ عَلَّمَكَ مَا لَمْ تَكُنْ تَعْلَمُ ؕ وَ كَانَ فَضْلُ اللّٰهِ عَلَیْكَ عَظِیْمًا" },
{ type: "text", text: "113] And O dear Prophet, were it not for Allah’s munificence and His mercy upon you, a group among them would have wished to deceive you; and they only mislead themselves and will not harm you at all; and Allah has sent down upon you the Book and wisdom, and taught you all what you did not know*; and upon you is Allah’s great munificence. (Allah gave the knowledge of the hidden to the Holy Prophet – peace and blessings be upon him.)" },
{ type: "arabic", text: "لَا خَیْرَ فِیْ كَثِیْرٍ مِّنْ نَّجْوٰىهُمْ اِلَّا مَنْ اَمَرَ بِصَدَقَةٍ اَوْ مَعْرُوْفٍ اَوْ اِصْلَاحٍۭ بَیْنَ النَّاسِ ؕ وَ مَنْ یَّفْعَلْ ذٰلِكَ ابْتِغَآءَ مَرْضَاتِ اللّٰهِ فَسَوْفَ نُؤْتِیْهِ اَجْرًا عَظِیْمًا" },
{ type: "text", text: "114] Most of their discussions do not contain any good, except of the one who enjoins charity or goodness or peace-making among people; whoever does that to seek the pleasure of Allah - We shall soon give him a great reward." },
{ type: "arabic", text: "وَ مَنْ یُّشَاقِقِ الرَّسُوْلَ مِنْۢ بَعْدِ مَا تَبَیَّنَ لَهُ الْهُدٰى وَ یَتَّبِعْ غَیْرَ سَبِیْلِ الْمُؤْمِنِیْنَ نُوَلِّهٖ مَا تَوَلّٰى وَ نُصْلِهٖ جَهَنَّمَ ؕ وَ سَآءَتْ مَصِیْرًا" },
{ type: "text", text: "115] And whoever opposes the Noble Messenger after the right path has been made clear to him, and follows a way other than that of the Muslims, We shall leave him as he is, and put him in hell; and what a wretched place to return!" },
{ type: "arabic", text: "اِنَّ اللّٰهَ لَا یَغْفِرُ اَنْ یُّشْرَكَ بِهٖ وَ یَغْفِرُ مَا دُوْنَ ذٰلِكَ لِمَنْ یَّشَآءُ ؕ وَ مَنْ یُّشْرِكْ بِاللّٰهِ فَقَدْ ضَلَّ ضَلٰلًۢا بَعِیْدًا" },
{ type: "text", text: "116] Allah does not forgive (the greatest sin) that partners be ascribed with Him - and He forgives all that is below (lesser sins) it, to whomever He wills; and whoever ascribes partners with Allah has indeed wandered far astray." },
{ type: "arabic", text: "اِنْ یَّدْعُوْنَ مِنْ دُوْنِهٖۤ اِلَّاۤ اِنٰثًا ۚ وَ اِنْ یَّدْعُوْنَ اِلَّا شَیْطٰنًا مَّرِیْدًا" },
{ type: "text", text: "117] The polytheists do not worship Allah, except some females; and they do not worship anyone except the rebellious Satan." },
{ type: "arabic", text: "لَّعَنَهُ اللّٰهُ ۘ وَ قَالَ لَاَتَّخِذَنَّ مِنْ عِبَادِكَ نَصِیْبًا مَّفْرُوْضًا" },
{ type: "text", text: "118] The one whom Allah has cursed; and the devil said, “I swear, I will certainly take an appointed portion of Your bondmen,” -" },
{ type: "arabic", text: "وَّ لَاُضِلَّنَّهُمْ وَ لَاُمَنِّیَنَّهُمْ وَ لَاٰمُرَنَّهُمْ فَلَیُبَتِّكُنَّ اٰذَانَ الْاَنْعَامِ وَ لَاٰمُرَنَّهُمْ فَلَیُغَیِّرُنَّ خَلْقَ اللّٰهِ ؕ وَ مَنْ یَّتَّخِذِ الشَّیْطٰنَ وَلِیًّا مِّنْ دُوْنِ اللّٰهِ فَقَدْ خَسِرَ خُسْرَانًا مُّبِیْنًا" },
{ type: "text", text: "119] “And I will surely lead them astray, and I will certainly arouse desires in them, and I will definitely order them so they will pierce animals’ ears, and I will definitely order them so they will alter Allah’s creation”; and whoever chooses the devil for a friend instead of Allah, has indeed suffered a manifest loss." },
{ type: "arabic", text: "یَعِدُهُمْ وَ یُمَنِّیْهِمْ ؕ وَ مَا یَعِدُهُمُ الشَّیْطٰنُ اِلَّا غُرُوْرًا" },
{ type: "text", text: "120] The devil promises them and arouses desires in them; and the devil does not give them promises except of deceit." },
{ type: "arabic", text: "اُولٰٓىِٕكَ مَاْوٰىهُمْ جَهَنَّمُ وَ لَا یَجِدُوْنَ عَنْهَا مَحِیْصًا" },
{ type: "text", text: "121] The destination for such is hell; they will not find any refuge from it." },
{ type: "arabic", text: "وَ الَّذِیْنَ اٰمَنُوْا وَ عَمِلُوا الصّٰلِحٰتِ سَنُدْخِلُهُمْ جَنّٰتٍ تَجْرِیْ مِنْ تَحْتِهَا الْاَنْهٰرُ خٰلِدِیْنَ فِیْهَاۤ اَبَدًا ؕ وَعْدَ اللّٰهِ حَقًّا ؕ وَ مَنْ اَصْدَقُ مِنَ اللّٰهِ قِیْلًا" },
{ type: "text", text: "122] And those who believed and did good deeds - We shall soon admit them into Gardens beneath which rivers flow, abiding in them for ever and ever; a true promise from Allah; and whose Words are more true than those of Allah? (Allah does not lie.)" },
{ type: "arabic", text: "لَیْسَ بِاَمَانِیِّكُمْ وَ لَاۤ اَمَانِیِّ اَهْلِ الْكِتٰبِ ؕ مَنْ یَّعْمَلْ سُوْٓءًا یُّجْزَ بِهٖ ۙ وَ لَا یَجِدْ لَهٗ مِنْ دُوْنِ اللّٰهِ وَلِیًّا وَّ لَا نَصِیْرًا" },
{ type: "text", text: "123] The affair does not rest on your thoughts, nor the cravings of the People given the Book(s); whoever does wrong will get the recompense of it - and will not find, other than Allah, any friend or any supporter." },
{ type: "arabic", text: "وَ مَنْ یَّعْمَلْ مِنَ الصّٰلِحٰتِ مِنْ ذَكَرٍ اَوْ اُنْثٰى وَ هُوَ مُؤْمِنٌ فَاُولٰٓىِٕكَ یَدْخُلُوْنَ الْجَنَّةَ وَ لَا یُظْلَمُوْنَ نَقِیْرًا" },
{ type: "text", text: "124] And whoever does some good deeds, be it a man or woman, and is a Muslim, will be admitted to Paradise and they will not be wronged even to the extent of one sesame." },
{ type: "arabic", text: "وَ مَنْ اَحْسَنُ دِیْنًا مِّمَّنْ اَسْلَمَ وَجْهَهٗ لِلّٰهِ وَ هُوَ مُحْسِنٌ وَّ اتَّبَعَ مِلَّةَ اِبْرٰهِیْمَ حَنِیْفًا ؕ وَ اتَّخَذَ اللّٰهُ اِبْرٰهِیْمَ خَلِیْلًا" },
{ type: "text", text: "125] And whose religion is better than one who submits his self to Allah and is virtuous and follows the religion of Ibrahim, who was far removed from all falsehood? And Allah made Ibrahim His close friend." },
{ type: "arabic", text: "وَ لِلّٰهِ مَا فِی السَّمٰوٰتِ وَ مَا فِی الْاَرْضِ ؕ وَ كَانَ اللّٰهُ بِكُلِّ شَیْءٍ مُّحِیْطًا" },
{ type: "text", text: "126] And to Allah only belongs all whatever is in the heavens and all whatever is in the earth; and Allah has control over all things." },
{ type: "arabic", text: "وَ یَسْتَفْتُوْنَكَ فِی النِّسَآءِ ؕ قُلِ اللّٰهُ یُفْتِیْكُمْ فِیْهِنَّ ۙ وَ مَا یُتْلٰى عَلَیْكُمْ فِی الْكِتٰبِ فِیْ یَتٰمَى النِّسَآءِ الّٰتِیْ لَا تُؤْتُوْنَهُنَّ مَا كُتِبَ لَهُنَّ وَ تَرْغَبُوْنَ اَنْ تَنْكِحُوْهُنَّ وَ الْمُسْتَضْعَفِیْنَ مِنَ الْوِلْدَانِ ۙ وَ اَنْ تَقُوْمُوْا لِلْیَتٰمٰى بِالْقِسْطِ ؕ وَ مَا تَفْعَلُوْا مِنْ خَیْرٍ فَاِنَّ اللّٰهَ كَانَ بِهٖ عَلِیْمًا" },
{ type: "text", text: "127] And they ask you the decree concerning women; say, “Allah gives you a decree concerning them - and what is recited to you from the Qur’an concerning orphan girls, that you are not giving them which is ordained for them, and you are avoiding marrying them - and concerning the weak children, and that you must firmly establish justice in dealing with the orphans’ rights; and whatever good deeds you do, then Allah is Well Aware of it.”" },
{ type: "arabic", text: "وَ اِنِ امْرَاَةٌ خَافَتْ مِنْۢ بَعْلِهَا نُشُوْزًا اَوْ اِعْرَاضًا فَلَا جُنَاحَ عَلَیْهِمَاۤ اَنْ یُّصْلِحَا بَیْنَهُمَا صُلْحًا ؕ وَ الصُّلْحُ خَیْرٌ ؕ وَ اُحْضِرَتِ الْاَنْفُسُ الشُّحَّ ؕ وَ اِنْ تُحْسِنُوْا وَ تَتَّقُوْا فَاِنَّ اللّٰهَ كَانَ بِمَا تَعْمَلُوْنَ خَبِیْرًا" },
{ type: "text", text: "128] And if a woman fears ill treatment from her husband or disinterest, so it is no sin for them if they reach an agreement of peace between themselves; and peace is better; and the heart is trapped in greed; and if you do good and practice piety, then Allah is Well Aware of it." },
{ type: "arabic", text: "وَ لَنْ تَسْتَطِیْعُوْۤا اَنْ تَعْدِلُوْا بَیْنَ النِّسَآءِ وَ لَوْ حَرَصْتُمْ فَلَا تَمِیْلُوْا كُلَّ الْمَیْلِ فَتَذَرُوْهَا كَالْمُعَلَّقَةِ ؕ وَ اِنْ تُصْلِحُوْا وَ تَتَّقُوْا فَاِنَّ اللّٰهَ كَانَ غَفُوْرًا رَّحِیْمًا" },
{ type: "text", text: "129] And you will never be able to deal equally between women however much you may desire - therefore do not be totally inclined towards one leaving the other in uncertainty; and if you do good and practice piety, then (know that) Allah is Oft Forgiving, Most Merciful." },
{ type: "arabic", text: "وَ اِنْ یَّتَفَرَّقَا یُغْنِ اللّٰهُ كُلًّا مِّنْ سَعَتِهٖ ؕ وَ كَانَ اللّٰهُ وَاسِعًا حَكِیْمًا" },
{ type: "text", text: "130] And if the two separate, Allah will make each one independent of the other, with His Capability; and Allah is Most Capable, Wise." },
{ type: "arabic", text: "وَ لِلّٰهِ مَا فِی السَّمٰوٰتِ وَ مَا فِی الْاَرْضِ ؕ وَ لَقَدْ وَصَّیْنَا الَّذِیْنَ اُوْتُوا الْكِتٰبَ مِنْ قَبْلِكُمْ وَ اِیَّاكُمْ اَنِ اتَّقُوا اللّٰهَ ؕ وَ اِنْ تَكْفُرُوْا فَاِنَّ لِلّٰهِ مَا فِی السَّمٰوٰتِ وَ مَا فِی الْاَرْضِ ؕ وَ كَانَ اللّٰهُ غَنِیًّا حَمِیْدًا" },
{ type: "text", text: "131] And to Allah only belongs all whatever is in the heavens and all whatever is in the earth; and indeed We have commanded those who received the Books before you, and commanded you, that keep fearing Allah; and if you disbelieve, undoubtedly to Allah only belongs all whatever is in the heavens and all whatever is in the earth; and Allah is Independent, Worthy Of All Praise." },
{ type: "arabic", text: "وَ لِلّٰهِ مَا فِی السَّمٰوٰتِ وَ مَا فِی الْاَرْضِ ؕ وَ كَفٰى بِاللّٰهِ وَكِیْلًا" },
{ type: "text", text: "132] And to Allah only belongs all whatever is in the heavens and all whatever is in the earth; and Allah is Sufficient as a Trustee (of affairs)." },
{ type: "arabic", text: "اِنْ یَّشَاْ یُذْهِبْكُمْ اَیُّهَا النَّاسُ وَ یَاْتِ بِاٰخَرِیْنَ ؕ وَ كَانَ اللّٰهُ عَلٰى ذٰلِكَ قَدِیْرًا" },
{ type: "text", text: "133] O people! He can remove you and bring others, if He wills; and Allah is Able to do that." },
{ type: "arabic", text: "مَنْ كَانَ یُرِیْدُ ثَوَابَ الدُّنْیَا فَعِنْدَ اللّٰهِ ثَوَابُ الدُّنْیَا وَ الْاٰخِرَةِ ؕ وَ كَانَ اللّٰهُ سَمِیْعًاۢ بَصِیْرًا" },
{ type: "text", text: "134] Whoever desires the reward of this world, then with Allah only lie both - the rewards of this world and of the Hereafter; and Allah is All Hearing, All Seeing." },
{ type: "arabic", text: "یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْا كُوْنُوْا قَوّٰمِیْنَ بِالْقِسْطِ شُهَدَآءَ لِلّٰهِ وَ لَوْ عَلٰۤى اَنْفُسِكُمْ اَوِ الْوَالِدَیْنِ وَ الْاَقْرَبِیْنَ ۚ اِنْ یَّكُنْ غَنِیًّا اَوْ فَقِیْرًا فَاللّٰهُ اَوْلٰى بِهِمَا ۟ فَلَا تَتَّبِعُوا الْهَوٰۤى اَنْ تَعْدِلُوْا ۚ وَ اِنْ تَلْوٗۤا اَوْ تُعْرِضُوْا فَاِنَّ اللّٰهَ كَانَ بِمَا تَعْمَلُوْنَ خَبِیْرًا" },
{ type: "text", text: "135] O People who Believe! Be firm in establishing justice, giving witness for Allah, even if it is harmful to yourselves or parents or relatives; whether the one you testify against is wealthy or poor, for in any case Allah has the greater right over it; then do not follow your wishes for you may stray from the truth; and if you distort testimony or turn away, then Allah is Well Aware of your deeds." },
{ type: "arabic", text: "یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْۤا اٰمِنُوْا بِاللّٰهِ وَ رَسُوْلِهٖ وَ الْكِتٰبِ الَّذِیْ نَزَّلَ عَلٰى رَسُوْلِهٖ وَ الْكِتٰبِ الَّذِیْۤ اَنْزَلَ مِنْ قَبْلُ ؕ وَ مَنْ یَّكْفُرْ بِاللّٰهِ وَ مَلٰٓىِٕكَتِهٖ وَ كُتُبِهٖ وَ رُسُلِهٖ وَ الْیَوْمِ الْاٰخِرِ فَقَدْ ضَلَّ ضَلٰلًۢا بَعِیْدًا" },
{ type: "text", text: "136] O People who Believe! Have faith in Allah and His Noble Messenger and the Book He has sent down upon this Noble Messenger of His, and the Book He sent down before; and whoever does not accept faith in Allah and His angels and His Books and His Noble Messengers and the Last Day, has undoubtedly wandered far astray." },
{ type: "arabic", text: "اِنَّ الَّذِیْنَ اٰمَنُوْا ثُمَّ كَفَرُوْا ثُمَّ اٰمَنُوْا ثُمَّ كَفَرُوْا ثُمَّ ازْدَادُوْا كُفْرًا لَّمْ یَكُنِ اللّٰهُ لِیَغْفِرَ لَهُمْ وَ لَا لِیَهْدِیَهُمْ سَبِیْلًا" },
{ type: "text", text: "137] Indeed those who believe, then disbelieve and then again believe, then again disbelieve, and go further in their disbelief - Allah will never forgive them, nor ever guide them to the path." },
{ type: "arabic", text: "بَشِّرِ الْمُنٰفِقِیْنَ بِاَنَّ لَهُمْ عَذَابًا اَلِیْمًا" },
{ type: "text", text: "138] Give glad tidings to the hypocrites, that for them is a painful punishment." },
{ type: "arabic", text: "اۨلَّذِیْنَ یَتَّخِذُوْنَ الْكٰفِرِیْنَ اَوْلِیَآءَ مِنْ دُوْنِ الْمُؤْمِنِیْنَ ؕ اَیَبْتَغُوْنَ عِنْدَهُمُ الْعِزَّةَ فَاِنَّ الْعِزَّةَ لِلّٰهِ جَمِیْعًا" },
{ type: "text", text: "139] Those who leave the Muslims to befriend the disbelievers; do they seek honour from them? Then (know that) undoubtedly all honour is for Allah." },
{ type: "arabic", text: "وَ قَدْ نَزَّلَ عَلَیْكُمْ فِی الْكِتٰبِ اَنْ اِذَا سَمِعْتُمْ اٰیٰتِ اللّٰهِ یُكْفَرُ بِهَا وَ یُسْتَهْزَاُ بِهَا فَلَا تَقْعُدُوْا مَعَهُمْ حَتّٰى یَخُوْضُوْا فِیْ حَدِیْثٍ غَیْرِهٖۤ ۖ اِنَّكُمْ اِذًا مِّثْلُهُمْ ؕ اِنَّ اللّٰهَ جَامِعُ الْمُنٰفِقِیْنَ وَ الْكٰفِرِیْنَ فِیْ جَهَنَّمَ جَمِیْعًا" },
{ type: "text", text: "140] And indeed Allah has sent down to you in the Book that whenever you hear the signs of Allah being rejected or being made fun of, do not sit with those people, until they engage in some other conversation; or else you too are like them; undoubtedly Allah will gather the hypocrites and the disbelievers, all together, into hell." },
{ type: "arabic", text: "اۨلَّذِیْنَ یَتَرَبَّصُوْنَ بِكُمْ ۚ فَاِنْ كَانَ لَكُمْ فَتْحٌ مِّنَ اللّٰهِ قَالُوْۤا اَلَمْ نَكُنْ مَّعَكُمْ ٭ۖ وَ اِنْ كَانَ لِلْكٰفِرِیْنَ نَصِیْبٌ ۙ قَالُوْۤا اَلَمْ نَسْتَحْوِذْ عَلَیْكُمْ وَ نَمْنَعْكُمْ مِّنَ الْمُؤْمِنِیْنَ ؕ فَاللّٰهُ یَحْكُمُ بَیْنَكُمْ یَوْمَ الْقِیٰمَةِ ؕ وَ لَنْ یَّجْعَلَ اللّٰهُ لِلْكٰفِرِیْنَ عَلَى الْمُؤْمِنِیْنَ سَبِیْلًا" },
{ type: "text", text: "141] Those who keep watching your circumstances; so if a victory comes to you from Allah, they say, “Were we not with you?”; and if victory is for disbelievers, they say, “Did we not have control over you, and protect you from the Muslims?” Allah will judge between you all on the Day of Resurrection; and Allah will not provide the disbelievers any way over the Muslims." },
{ type: "arabic", text: "اِنَّ الْمُنٰفِقِیْنَ یُخٰدِعُوْنَ اللّٰهَ وَ هُوَ خَادِعُهُمْ ۚ وَ اِذَا قَامُوْۤا اِلَى الصَّلٰوةِ قَامُوْا كُسَالٰى ۙ یُرَآءُوْنَ النَّاسَ وَ لَا یَذْكُرُوْنَ اللّٰهَ اِلَّا قَلِیْلًا" },
{ type: "text", text: "142] Undoubtedly the hypocrites, in their fancy, seek to deceive Allah whereas He will extinguish them while making them oblivious; and when they stand up for prayer, they do it unwillingly and for others to see, and they do not remember Allah except a little." },
{ type: "arabic", text: "مُّذَبْذَبِیْنَ بَیْنَ ذٰلِكَ ٭ۖ لَاۤ اِلٰى هٰۤؤُلَآءِ وَ لَاۤ اِلٰى هٰۤؤُلَآءِ ؕ وَ مَنْ یُّضْلِلِ اللّٰهُ فَلَنْ تَجِدَ لَهٗ سَبِیْلًا" },
{ type: "text", text: "143] Fluctuating in the middle; neither here (in faith) nor there (in disbelief); and for one whom Allah sends astray, you will not find a way." },
{ type: "arabic", text: "یٰۤاَیُّهَا الَّذِیْنَ اٰمَنُوْا لَا تَتَّخِذُوا الْكٰفِرِیْنَ اَوْلِیَآءَ مِنْ دُوْنِ الْمُؤْمِنِیْنَ ؕ اَتُرِیْدُوْنَ اَنْ تَجْعَلُوْا لِلّٰهِ عَلَیْكُمْ سُلْطٰنًا مُّبِیْنًا" },
{ type: "text", text: "144] O People who Believe! Do not befriend disbelievers in place of Muslims; do you wish to give Allah a clear proof against you?" },
{ type: "arabic", text: "اِنَّ الْمُنٰفِقِیْنَ فِی الدَّرْكِ الْاَسْفَلِ مِنَ النَّارِ ۚ وَ لَنْ تَجِدَ لَهُمْ نَصِیْرًا" },
{ type: "text", text: "145] Undoubtedly the hypocrites are in the deepest segment of hell; and you will never find any supporter for them." },
{ type: "arabic", text: "اِلَّا الَّذِیْنَ تَابُوْا وَ اَصْلَحُوْا وَ اعْتَصَمُوْا بِاللّٰهِ وَ اَخْلَصُوْا دِیْنَهُمْ لِلّٰهِ فَاُولٰٓىِٕكَ مَعَ الْمُؤْمِنِیْنَ ؕ وَ سَوْفَ یُؤْتِ اللّٰهُ الْمُؤْمِنِیْنَ اَجْرًا عَظِیْمًا" },
{ type: "text", text: "146] Except those who repented and reformed themselves and held fast to Allah’s rope and made their religion sincerely only for Allah - so they are with the Muslims; and Allah will soon bestow upon the believers a great reward." },
{ type: "arabic", text: "مَا یَفْعَلُ اللّٰهُ بِعَذَابِكُمْ اِنْ شَكَرْتُمْ وَ اٰمَنْتُمْ ؕ وَ كَانَ اللّٰهُ شَاكِرًا عَلِیْمًا" },
{ type: "text", text: "147] And what will Allah gain by punishing you, if you acknowledge the truth and accept faith? And Allah is Most Appreciative, All Knowing." },
{ type: "arabic", text: "لَا یُحِبُّ اللّٰهُ الْجَهْرَ بِالسُّوْٓءِ مِنَ الْقَوْلِ اِلَّا مَنْ ظُلِمَ ؕ وَ كَانَ اللّٰهُ سَمِیْعًا عَلِیْمًا" },
{ type: "text", text: "148] Allah does not like disclosure of evil matters except by the oppressed; and Allah is All Hearing, All Knowing." },
{ type: "arabic", text: "اِنْ تُبْدُوْا خَیْرًا اَوْ تُخْفُوْهُ اَوْ تَعْفُوْا عَنْ سُوْٓءٍ فَاِنَّ اللّٰهَ كَانَ عَفُوًّا قَدِیْرًا" },
