{ type: "text", text: "149] If you do any good openly or in secret, or pardon someone’s evil - then indeed Allah is Oft Forgiving, Able." },
{ type: "arabic", text: "اِنَّ الَّذِیْنَ یَكْفُرُوْنَ بِاللّٰهِ وَ رُسُلِهٖ وَ یُرِیْدُوْنَ اَنْ یُّفَرِّقُوْا بَیْنَ اللّٰهِ وَ رُسُلِهٖ وَ یَقُوْلُوْنَ نُؤْمِنُ بِبَعْضٍ وَّ نَكْفُرُ بِبَعْضٍ ۙ وَّ یُرِیْدُوْنَ اَنْ یَّتَّخِذُوْا بَیْنَ ذٰلِكَ سَبِیْلًا" },
{ type: "text", text: "150] Those who disbelieve in Allah and His Noble Messengers, and seek to cause division between Allah and His Noble Messengers, and say, “We believe in some and disbelieve in others,” and wish to choose a way between faith and disbelief; -" },
{ type: "arabic", text: "اُولٰٓىِٕكَ هُمُ الْكٰفِرُوْنَ حَقًّا ۚ وَ اَعْتَدْنَا لِلْكٰفِرِیْنَ عَذَابًا مُّهِیْنًا" },
{ type: "text", text: "151] These are the real disbelievers; and for the disbelievers We have kept prepared a disgraceful punishment." },
{ type: "arabic", text: "وَ الَّذِیْنَ اٰمَنُوْا بِاللّٰهِ وَ رُسُلِهٖ وَ لَمْ یُفَرِّقُوْا بَیْنَ اَحَدٍ مِّنْهُمْ اُولٰٓىِٕكَ سَوْفَ یُؤْتِیْهِمْ اُجُوْرَهُمْ ؕ وَ كَانَ اللّٰهُ غَفُوْرًا رَّحِیْمًا" },
{ type: "text", text: "152] And those who believe in Allah and all His Noble Messengers and do not make any distinction in belief between any of them - to them Allah will soon give them their reward; and Allah is Oft Forgiving, Most Merciful." },
{ type: "arabic", text: "یَسْـَٔلُكَ اَهْلُ الْكِتٰبِ اَنْ تُنَزِّلَ عَلَیْهِمْ كِتٰبًا مِّنَ السَّمَآءِ فَقَدْ سَاَلُوْا مُوْسٰۤى اَكْبَرَ مِنْ ذٰلِكَ فَقَالُوْۤا اَرِنَا اللّٰهَ جَهْرَةً فَاَخَذَتْهُمُ الصّٰعِقَةُ بِظُلْمِهِمْ ۚ ثُمَّ اتَّخَذُوا الْعِجْلَ مِنْۢ بَعْدِ مَا جَآءَتْهُمُ الْبَیِّنٰتُ فَعَفَوْنَا عَنْ ذٰلِكَ ۚ وَ اٰتَیْنَا مُوْسٰى سُلْطٰنًا مُّبِیْنًا" },
{ type: "text", text: "153] O dear Prophet (Mohammed - peace and blessings be upon him) the People given the Book(s) ask you, to cause a Book to be sent down on them from heaven - so they had asked something even greater from Moosa, for they said, “Show Allah to us, clearly” - so the thunder seized them on account of their sins; then they chose the calf (for worship) after clear signs had come to them, then We forgave this; and We bestowed Moosa with a clear dominance." },
{ type: "arabic", text: "وَ رَفَعْنَا فَوْقَهُمُ الطُّوْرَ بِمِیْثَاقِهِمْ وَ قُلْنَا لَهُمُ ادْخُلُوا الْبَابَ سُجَّدًا وَّ قُلْنَا لَهُمْ لَا تَعْدُوْا فِی السَّبْتِ وَ اَخَذْنَا مِنْهُمْ مِّیْثَاقًا غَلِیْظًا" },
{ type: "text", text: "154] We then raised the mount (Sinai) above them to take a covenant from them and decreed them that, “Enter the gate while prostrating” and decreed them that, “Do not cross the limits of the Sabbath,” and We took from them a firm covenant." },
{ type: "arabic", text: "فَبِمَا نَقْضِهِمْ مِّیْثَاقَهُمْ وَ كُفْرِهِمْ بِاٰیٰتِ اللّٰهِ وَ قَتْلِهِمُ الْاَنْۢبِیَآءَ بِغَیْرِ حَقٍّ وَّ قَوْلِهِمْ قُلُوْبُنَا غُلْفٌ ؕ بَلْ طَبَعَ اللّٰهُ عَلَیْهَا بِكُفْرِهِمْ فَلَا یُؤْمِنُوْنَ اِلَّا قَلِیْلًا" },
{ type: "text", text: "155] So Allah cursed them because of their constantly breaking their covenant - and they disbelieved in the signs of Allah, and they used to wrongfully martyr the Prophets, and because they said, “Our hearts are covered”; in fact Allah has set a seal upon their hearts due to their disbelief, so that they do not accept faith, except a few." },
{ type: "arabic", text: "وَّ بِكُفْرِهِمْ وَ قَوْلِهِمْ عَلٰى مَرْیَمَ بُهْتَانًا عَظِیْمًا" },
{ type: "text", text: "156] And because they disbelieved and slandered Maryam with a tremendous accusation." },
{ type: "arabic", text: "وَّ قَوْلِهِمْ اِنَّا قَتَلْنَا الْمَسِیْحَ عِیْسَی ابْنَ مَرْیَمَ رَسُوْلَ اللّٰهِ ۚ وَ مَا قَتَلُوْهُ وَ مَا صَلَبُوْهُ وَ لٰكِنْ شُبِّهَ لَهُمْ ؕ وَ اِنَّ الَّذِیْنَ اخْتَلَفُوْا فِیْهِ لَفِیْ شَكٍّ مِّنْهُ ؕ مَا لَهُمْ بِهٖ مِنْ عِلْمٍ اِلَّا اتِّبَاعَ الظَّنِّ ۚ وَ مَا قَتَلُوْهُ یَقِیْنًا" },
{ type: "text", text: "157] And because they said, “We have killed the Messiah, Eisa the son of Maryam, the Messenger of Allah”; they did not slay him nor did they crucify him, but a look-alike was created for them; and those who disagree concerning it are in doubt about it; they know nothing of it, except the following of assumptions; and without doubt, they did not kill him." },
{ type: "arabic", text: "ۢ بَلْ رَّفَعَهُ اللّٰهُ اِلَیْهِ ؕ وَ كَانَ اللّٰهُ عَزِیْزًا حَكِیْمًا" },
{ type: "text", text: "158] In fact Allah raised him towards Himself; and Allah is Almighty, Wise." },
{ type: "arabic", text: "وَ اِنْ مِّنْ اَهْلِ الْكِتٰبِ اِلَّا لَیُؤْمِنَنَّ بِهٖ قَبْلَ مَوْتِهٖ ۚ وَ یَوْمَ الْقِیٰمَةِ یَكُوْنُ عَلَیْهِمْ شَهِیْدًا" },
{ type: "text", text: "159] There is not one of the People given the Book(s), who will not believe in him (Eisa ) before his death; and on the Day of Resurrection he will be a witness against them." },
{ type: "arabic", text: "فَبِظُلْمٍ مِّنَ الَّذِیْنَ هَادُوْا حَرَّمْنَا عَلَیْهِمْ طَیِّبٰتٍ اُحِلَّتْ لَهُمْ وَ بِصَدِّهِمْ عَنْ سَبِیْلِ اللّٰهِ كَثِیْرًا" },
{ type: "text", text: "160] So due to the great injustices committed by the Jews, We forbade them some of the good things which were earlier lawful for them, and because they prevented many people from Allah’s way." },
{ type: "arabic", text: "وَّ اَخْذِهِمُ الرِّبٰوا وَ قَدْ نُهُوْا عَنْهُ وَ اَكْلِهِمْ اَمْوَالَ النَّاسِ بِالْبَاطِلِ ؕ وَ اَعَدْنَا لِلْكٰفِرِیْنَ مِنْهُمْ عَذَابًا اَلِیْمًا" },
{ type: "text", text: "161] And because they used to take usury whereas they were forbidden from it, and they used to wrongfully devour people’s wealth; and for the disbelievers among them, We have kept prepared a painful punishment." },
{ type: "arabic", text: "لٰكِنِ الرّٰسِخُوْنَ فِی الْعِلْمِ مِنْهُمْ وَ الْمُؤْمِنُوْنَ یُؤْمِنُوْنَ بِمَاۤ اُنْزِلَ اِلَیْكَ وَ مَاۤ اُنْزِلَ مِنْ قَبْلِكَ وَ الْمُقِیْمِیْنَ الصَّلٰوةَ وَ الْمُؤْتُوْنَ الزَّكٰوةَ وَ الْمُؤْمِنُوْنَ بِاللّٰهِ وَ الْیَوْمِ الْاٰخِرِ ؕ اُولٰٓىِٕكَ سَنُؤْتِیْهِمْ اَجْرًا عَظِیْمًا" },
{ type: "text", text: "162] But those among them who are firm in knowledge and who have faith, believe in what is sent down upon you (O dear Prophet Mohammed - peace and blessings be upon him), and what was sent down before you, and those who keep the prayer established and those who pay the charity, and those who believe in Allah and the Last Day; to such, We shall soon bestow a great reward." },
{ type: "arabic", text: "اِنَّاۤ اَوْحَیْنَاۤ اِلَیْكَ كَمَاۤ اَوْحَیْنَاۤ اِلٰى نُوْحٍ وَّ النَّبِیّٖنَ مِنْۢ بَعْدِهٖ ۚ وَ اَوْحَیْنَاۤ اِلٰۤى اِبْرٰهِیْمَ وَ اِسْمٰعِیْلَ وَ اِسْحٰقَ وَ یَعْقُوْبَ وَ الْاَسْبَاطِ وَ عِیْسٰى وَ اَیُّوْبَ وَ یُوْنُسَ وَ هٰرُوْنَ وَ سُلَیْمٰنَ ۚ وَ اٰتَیْنَا دَاوٗدَ زَبُوْرًا" },
{ type: "text", text: "163] Indeed We sent a divine revelation to you (Prophet Mohammed - peace and blessing be upon him) as We did send divine revelations to Nooh (Noah) and the Prophets after him; and We sent divine revelations to Ibrahim (Abraham) and Ismael (Ishmael) and Ishaq (Isaac) and Yaqub (Jacob) and their offspring, and Eisa (Jesus) and Ayyub (Job) and Yunus (Jonah) and Haroon (Aaron) and Sulaiman (Solomon), and We bestowed the Zaboor (the Holy Book) upon Dawud (David)." },
{ type: "arabic", text: "وَ رُسُلًا قَدْ قَصَصْنٰهُمْ عَلَیْكَ مِنْ قَبْلُ وَ رُسُلًا لَّمْ نَقْصُصْهُمْ عَلَیْكَ ؕ وَ كَلَّمَ اللّٰهُ مُوْسٰى تَكْلِیْمًا" },
{ type: "text", text: "164] And to the Noble Messengers whom We have mentioned to you before, and to the Noble Messengers We have not mentioned to you; and Allah really did speak to Moosa." },
{ type: "arabic", text: "رُسُلًا مُّبَشِّرِیْنَ وَ مُنْذِرِیْنَ لِئَلَّا یَكُوْنَ لِلنَّاسِ عَلَى اللّٰهِ حُجَّةٌۢ بَعْدَ الرُّسُلِ ؕ وَ كَانَ اللّٰهُ عَزِیْزًا حَكِیْمًا" },
{ type: "text", text: "165] Noble Messengers giving glad tidings and declaring warnings, in order that people may not have any argument against Allah, after the (advent of) Noble Messengers; and Allah is Almighty, Wise." },
{ type: "arabic", text: "لٰكِنِ اللّٰهُ یَشْهَدُ بِمَاۤ اَنْزَلَ اِلَیْكَ اَنْزَلَهٗ بِعِلْمِهٖ ۚ وَ الْمَلٰٓىِٕكَةُ یَشْهَدُوْنَ ؕ وَ كَفٰى بِاللّٰهِ شَهِیْدًا" },
{ type: "text", text: "166] But Allah is the Witness of what He has sent down upon you - He has sent it down by His knowledge; and the angels are witnesses; and sufficient is Allah’s testimony." },
{ type: "arabic", text: "اِنَّ الَّذِیْنَ كَفَرُوْا وَ صَدُّوْا عَنْ سَبِیْلِ اللّٰهِ قَدْ ضَلُّوْا ضَلٰلًۢا بَعِیْدًا" },
{ type: "text", text: "167] Indeed those who disbelieved and prevented (others) from the way of Allah, have undoubtedly wandered far astray." },
{ type: "arabic", text: "اِنَّ الَّذِیْنَ كَفَرُوْا وَ ظَلَمُوْا لَمْ یَكُنِ اللّٰهُ لِیَغْفِرَ لَهُمْ وَ لَا لِیَهْدِیَهُمْ طَرِیْقًا" },
{ type: "text", text: "168] Indeed those who disbelieved and crossed the limits - Allah will never forgive them, nor guide them to a way." },
{ type: "arabic", text: "اِلَّا طَرِیْقَ جَهَنَّمَ خٰلِدِیْنَ فِیْهَاۤ اَبَدًا ؕ وَ كَانَ ذٰلِكَ عَلَى اللّٰهِ یَسِیْرًا" },
{ type: "text", text: "169] Except the path of hell, in which they will remain for ever and ever; and that is easy for Allah." },
{ type: "arabic", text: "یٰۤاَیُّهَا النَّاسُ قَدْ جَآءَكُمُ الرَّسُوْلُ بِالْحَقِّ مِنْ رَّبِّكُمْ فَاٰمِنُوْا خَیْرًا لَّكُمْ ؕ وَ اِنْ تَكْفُرُوْا فَاِنَّ لِلّٰهِ مَا فِی السَّمٰوٰتِ وَ الْاَرْضِ ؕ وَ كَانَ اللّٰهُ عَلِیْمًا حَكِیْمًا" },
{ type: "text", text: "170] O mankind! This Noble Messenger (Prophet Mohammed - peace and blessings be upon him) has come to you with the truth from your Lord, so accept faith for your own good; and if you disbelieve, then undoubtedly to Allah only belongs all whatever is in the heavens and in the earth; and Allah is All Knowing, Wise." },
{ type: "arabic", text: "یٰۤاَهْلَ الْكِتٰبِ لَا تَغْلُوْا فِیْ دِیْنِكُمْ وَ لَا تَقُوْلُوْا عَلَى اللّٰهِ اِلَّا الْحَقَّ ؕ اِنَّمَا الْمَسِیْحُ عِیْسَی ابْنُ مَرْیَمَ رَسُوْلَ اللّٰهِ وَ كَلِمَتُهٗ ۚ اَلْقٰهَاۤ اِلٰى مَرْیَمَ وَ رُوْحٌ مِّنْهُ ۖ فَاٰمِنُوْا بِاللّٰهِ وَ رُسُلِهٖ ۚ وَ لَا تَقُوْلُوْا ثَلٰثَةٌ ؕ اِنْتَهُوْا خَیْرًا لَّكُمْ ؕ اِنَّمَا اللّٰهُ اِلٰهٌ وَّاحِدٌ ؕ سُبْحٰنَهٗۤ اَنْ یَّكُوْنَ لَهٗ وَلَدٌ ۘ لَهٗ مَا فِی السَّمٰوٰتِ وَ مَا فِی الْاَرْضِ ؕ وَ كَفٰى بِاللّٰهِ وَكِیْلًا" },
{ type: "text", text: "171] O People given the Book(s)! Do not exaggerate in your religion nor say anything concerning Allah, but the truth; the Messiah, Eisa the son of Maryam, is purely a Noble Messenger of Allah, and His Word; which He sent towards Maryam, and a Spirit from Him; so believe in Allah and His Noble Messengers; and do not say “Three”; desist, for your own good; undoubtedly Allah is the only One God; Purity is to Him from begetting a child; to Him only belongs all whatever is in the heavens and all whatever is in the earth; and Allah is a Sufficient Trustee (of affairs)." },
{ type: "arabic", text: "لَنْ یَّسْتَنْكِفَ الْمَسِیْحُ اَنْ یَّكُوْنَ عَبْدًا لِّلّٰهِ وَ لَا الْمَلٰٓىِٕكَةُ الْمُقَرَّبُوْنَ ؕ وَ مَنْ یَّسْتَنْكِفْ عَنْ عِبَادَتِهٖ وَ یَسْتَكْبِرْ فَسَیَحْشُرُهُمْ اِلَیْهِ جَمِیْعًا" },
{ type: "text", text: "172] The Messiah does not at all hate being a bondman of Allah, and nor do the close angels; and whoever hates worshipping Him and is conceited - so very soon He will gather them all towards Him." },
{ type: "arabic", text: "فَاَمَّا الَّذِیْنَ اٰمَنُوْا وَ عَمِلُوا الصّٰلِحٰتِ فَیُوَفِّیْهِمْ اُجُوْرَهُمْ وَ یَزِیْدُهُمْ مِّنْ فَضْلِهٖ ۚ وَ اَمَّا الَّذِیْنَ اسْتَنْكَفُوْا وَ اسْتَكْبَرُوْا فَیُعَذِّبُهُمْ عَذَابًا اَلِیْمًا ۙ وَّ لَا یَجِدُوْنَ لَهُمْ مِّنْ دُوْنِ اللّٰهِ وَلِیًّا وَّ لَا نَصِیْرًا" },
{ type: "text", text: "173] Then to those who believed and did good deeds, He will pay their wages in full and by His munificence, give them more; and to those who hated (worshipping Him) and were proud, He will inflict a painful punishment; and they will not find for themselves, other than Allah, any supporter nor any aide." },
{ type: "arabic", text: "یٰۤاَیُّهَا النَّاسُ قَدْ جَآءَكُمْ بُرْهَانٌ مِّنْ رَّبِّكُمْ وَ اَنْزَلْنَاۤ اِلَیْكُمْ نُوْرًا مُّبِیْنًا" },
{ type: "text", text: "174] O mankind! Indeed the clear proof from your Lord has come to you, and We have sent down to you a bright light. (The Holy Prophet is a Clear Proof from Allah.)" },
{ type: "arabic", text: "فَاَمَّا الَّذِیْنَ اٰمَنُوْا بِاللّٰهِ وَ اعْتَصَمُوْا بِهٖ فَسَیُدْخِلُهُمْ فِیْ رَحْمَةٍ مِّنْهُ وَ فَضْلٍ ۙ وَّ یَهْدِیْهِمْ اِلَیْهِ صِرَاطًا مُّسْتَقِیْمًا" },
{ type: "text", text: "175] So those who believed in Allah and held fast to His rope - He will admit them into His mercy and munificence, and will guide them on the Straight Path towards Himself." },
{ type: "arabic", text: "یَسْتَفْتُوْنَكَ ؕ قُلِ اللّٰهُ یُفْتِیْكُمْ فِی الْكَلٰلَةِ ؕ اِنِ امْرُؤٌا هَلَكَ لَیْسَ لَهٗ وَلَدٌ وَّ لَهٗۤ اُخْتٌ فَلَهَا نِصْفُ مَا تَرَكَ ۚ وَ هُوَ یَرِثُهَاۤ اِنْ لَّمْ یَكُنْ لَّهَا وَلَدٌ ؕ فَاِنْ كَانَتَا اثْنَتَیْنِ فَلَهُمَا الثُّلُثٰنِ مِمَّا تَرَكَ ؕ وَ اِنْ كَانُوْۤا اِخْوَةً رِّجَالًا وَّ نِسَآءً فَلِلذَّكَرِ مِثْلُ حَظِّ الْاُنْثَیَیْنِ ؕ یُبَیِّنُ اللّٰهُ لَكُمْ اَنْ تَضِلُّوْا ؕ وَ اللّٰهُ بِكُلِّ شَیْءٍ عَلِیْمٌ" },
{ type: "text", text: "176] O dear Prophet (Mohammed - peace and blessings be upon him), they ask you for a decree; say, “Allah decrees you concerning the solitary person (without parents or children); if a man dies childless and has a sister, for her is half the inheritance; and the man is his sister’s heir if the sister dies childless; and if there are two sisters, for them is two-thirds of the inheritance; so if there are brothers and sisters, both men and women, the male’s share is equal to that of two females; and Allah explains clearly to you, so that you do not go astray; and Allah knows all things.”" }
]
},

content: [
        { "type": "section-title", "text": "YAA-SEEN" },
        { type: 'text', text: '(Revealed at Mecca - contains 83 verses - 36 para)' },
        { type: 'arabic', text: 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ' },
        { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
{ type: 'arabic', text: 'يسٓ' },
                { type: 'text', text: ':1] Yaa-Seen (Alphabets of Arabic language - Allah and to whomever He reveals, know their precise meanings.)' },
                
                { type: 'arabic', text: 'وَٱلْقُرْءَانِ ٱلْحَكِيمِ' },
                { type: 'text', text: ':2] By oath of the wise Qur’an.' },
                
                { type: 'arabic', text: 'إِنَّكَ لَمِنَ ٱلْمُرْسَلِينَ' },
                { type: 'text', text: ':3] You (O dear Prophet Mohammed – peace and blessings be upon him) are indeed one of the Noble Messengers.' },
                
                { type: 'arabic', text: 'عَلَىٰ صِرَٰطٍ مُّسْتَقِيمٍ' },
                { type: 'text', text: ':4] On the Straight Path.' },
                
                { type: 'arabic', text: 'تَنزِيلَ ٱلْعَزِيزِ ٱلرَّحِيمِ' },
                { type: 'text', text: ':5] (The Qur’an is) Sent down by the Almighty, the Most Merciful.' },
                
                { type: 'arabic', text: 'لِتُنذِرَ قَوْمًا مَّآ أُنذِرَ ءَابَآؤُهُمْ فَهُمْ غَٰفِلُونَ' },
                { type: 'text', text: ':6] So that you may warn these people whose ancestors were not warned, they are therefore unaware.' },
                
                { type: 'arabic', text: 'لَقَدْ حَقَّ ٱلْقَوْلُ عَلَىٰٓ أَكْثَرِهِمْ فَهُمْ لَا يُؤْمِنُونَ' },
                { type: 'text', text: ':7] Undoubtedly, it (their disbelief) has proved true for most of them, so they will not believe.' },
                
                { type: 'arabic', text: 'إِنَّا جَعَلْنَا فِىٓ أَعْنَٰقِهِمْ أَغْلَٰلًا فَهِىَ إِلَى ٱلْأَذْقَانِ فَهُم مُّقْمَحُونَ' },
                { type: 'text', text: ':8] We have indeed put shackles around their necks reaching up to the chins, so they remain facing upwards.' },
                
                { type: 'arabic', text: 'وَجَعَلْنَا مِنۢ بَيْنِ أَيْدِيهِمْ سَدًّا وَمِنْ خَلْفِهِمْ سَدًّا فَأَغْشَيْنَٰهُمْ فَهُمْ لَا يُبْصِرُونَ' },
                { type: 'text', text: ':9] And We have set a wall before them and a wall behind them, and covered the top - so they are unable to see anything.' },
                
                { type: 'arabic', text: 'وَسَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ' },
                { type: 'text', text: ':10] And it is the same for them, whether you warn them or do not warn them - they will not believe.' },
                
                { type: 'arabic', text: 'إِنَّمَا تُنذِرُ مَنِ ٱتَّبَعَ ٱلذِّكْرَ وَخَشِىَ ٱلرَّحْمَٰنَ بِٱلْغَيْبِ ۖ فَبَشِّرْهُ بِمَغْفِرَةٍ وَأَجْرٍ كَرِيمٍ' },
                { type: 'text', text: ':11] You warn only him who follows the advice and fears the Most Gracious without seeing; therefore give him glad tidings of forgiveness and an honourable reward.' },
                
                { type: 'arabic', text: 'إِنَّا نَحْنُ نُحْىِ ٱلْمَوْتَىٰ وَنَكْتُبُ مَا قَدَّمُوا۟ وَءَاثَٰرَهُمْ ۚ وَكُلَّ شَىْءٍ أَحْصَيْنَٰهُ فِىٓ إِمَامٍ مُّبِينٍ' },
                { type: 'text', text: ':12] We will surely bring the dead to life and We record what they send ahead and the signs they will leave behind; and We have accounted all things in a clear Book.' },
                
                { type: 'arabic', text: 'وَٱضْرِبْ لَهُم مَّثَلًا أَصْحَٰبَ ٱلْقَرْيَةِ إِذْ جَآءَهَا ٱلْمُرْسَلُونَ' },
                { type: 'text', text: ':13] And relate to them the signs of the people of the city - when two emissaries came to them.' },
                
                { type: 'arabic', text: 'إِذْ أَرْسَلْنَآ إِلَيْهِمُ ٱثْنَيْنِ فَكَذَّبُوهُمَا فَعَزَّزْنَا بِثَالِثٍ فَقَالُوٓا۟ إِنَّآ إِلَيْكُم مُّرْسَلُونَ' },
                { type: 'text', text: ':14] When We had sent two towards them and they denied them both, so We fortified them with a third, and they all said, “Indeed we have been sent to you.”' },
                
                { type: 'arabic', text: 'قَالُوا۟ مَآ أَنتُمْ إِلَّا بَشَرٌ مِّثْلُنَا وَمَآ أَنزَلَ ٱلرَّحْمَٰنُ مِن شَىْءٍ إِنْ أَنتُمْ إِلَّا تَكْذِبُونَ' },
                { type: 'text', text: ':15] They said, “You are nothing but mortals like us; the Most Gracious has not sent down anything - you are nothing but liars.”' },
                
                { type: 'arabic', text: 'قَالُوا۟ رَبُّنَا يَعْلَمُ إِنَّآ إِلَيْكُمْ لَمُرْسَلُونَ' },
                { type: 'text', text: ':16] They answered, “Our Lord knows that surely, without doubt, we have been sent towards you.”' },
                
                { type: 'arabic', text: 'وَمَا عَلَيْنَآ إِلَّا ٱلْبَلَٰغُ ٱلْمُبِينُ' },
                { type: 'text', text: ':17] “And our duty is nothing but to plainly convey (the message).”' },
                
                { type: 'arabic', text: 'قَالُوٓا۟ إِنَّا تَطَيَّرْنَا بِكُمْ ۖ لَئِن لَّمْ تَنتَهُوا۟ لَنَرْجُمَنَّكُمْ وَلَيَمَسَّنَّكُم مِّنَّا عَذَابٌ أَلِيمٌ' },
                { type: 'text', text: ':18] They (the people of the city) said, “We think you are ominous; indeed, if you do not desist, we shall surely stone you to death...”' },
                
                { type: 'arabic', text: 'قَالُوا۟ طَٰٓئِرُكُم مَّعَكُمْ ۚ أَئِن ذُكِّرْتُم ۚ بَلْ أَنتُمْ قَوْمٌ مُّسْرِفُونَ' },
                { type: 'text', text: ':19] They said, “Your evil omens are with you! What! You get annoyed for being advised? In fact you are a people who transgress the limits!”' },
                
                { type: 'arabic', text: 'وَجَآءَ مِنْ أَقْصَا ٱلْمَدِينَةِ رَجُلٌ يَسْعَىٰ قَالَ يَٰقَوْمِ ٱتَّبِعُوا۟ ٱلْمُرْسَلِينَ' },
                { type: 'text', text: ':20] And from the outermost part of the city came a man running; he said, “O my people! Obey those who have been sent.”' },
                
                { type: 'arabic', text: 'ٱتَّبِعُوا۟ مَن لَّا يَسْـَٔلُكُمْ أَجْرًا وَهُم مُّهْتَدُونَ' },
                { type: 'text', text: ':21] “Obey those who do not ask any fee from you, and they are on guidance.”' },
                
                { type: 'arabic', text: 'وَمَا لِىَ لَآ أَعْبُدُ ٱلَّذِى فَطَرَنِى وَإِلَيْهِ تُرْجَعُونَ' },
                { type: 'text', text: ':22] “And what is the matter with me that I should not worship Him Who created me, whereas it is towards Him that you are to return?”' },
                
                { type: 'arabic', text: 'ءَأَتَّخِذُ مِن دُونِهِۦٓ ءَالِهَةً إِن يُرِدْنِ ٱلرَّحْمَٰنُ بِضُرٍّ لَّا تُغْنِ عَنِّى شَفَٰعَتُهُمْ شَيْـًٔا وَلَا يُنقِذُونِ' },
                { type: 'text', text: ':23] “What! Shall I appoint Gods other than Allah? So that if the Most Gracious should wish me any harm, their intercession would be of no use...”' },
                
                { type: 'arabic', text: 'إِنِّىٓ إِذًا لَّفِى ضَلَٰلٍ مُّبِينٍ' },
                { type: 'text', text: ':24] “Undoubtedly, I am then in open error.”' },
                
                { type: 'arabic', text: 'إِنِّىٓ ءَامَنتُ بِرَبِّكُمْ فَٱسْمَعُونِ' },
                { type: 'text', text: ':25] “Indeed I have believed in your Lord, so heed me.”' },
                
                { type: 'arabic', text: 'قِيلَ ٱدْخُلِ ٱلْجَنَّةَ ۖ قَالَ يَٰلَيْتَ قَوْمِى يَعْلَمُونَ' },
                { type: 'text', text: ':26] It was said to him, “Enter Paradise”; he said, “If only my people knew!”' },
                
                { type: 'arabic', text: 'بِمَا غَفَرَ لِى رَبِّى وَجَعَلَنِى مِنَ ٱلْمُكْرَمِينَ' },
                { type: 'text', text: ':27] “The manner in which my Lord has pardoned me and made me of the honoured ones!”' },
                
                { type: 'arabic', text: 'وَمَآ أَنزَلْنَا عَلَىٰ قَوْمِهِۦ مِنۢ بَعْدِهِۦ مِن جُندٍ مِّنَ ٱلسَّمَآءِ وَمَا كُنَّا مُنزِلِينَ' },
                { type: 'text', text: ':28] And after him, We did not send down any army from heaven against his people...' },
                
                { type: 'arabic', text: 'إِن كَانَتْ إِلَّا صَيْحَةً وَٰحِدَةً فَإِذَا هُمْ خَٰمِدُونَ' },
                { type: 'text', text: ':29] It was just one scream, and with it they were extinguished.' },
                
                { type: 'arabic', text: 'يَٰحَسْرَةً عَلَى ٱلْعِبَادِ ۚ مَا يَأْتِيهِم مِّن رَّسُولٍ إِلَّا كَانُوا۟ بِهِۦ يَسْتَهْزِءُونَ' },
                { type: 'text', text: ':30] And it was said, “Woe to those bondmen - whenever a Noble Messenger comes to them, they mock at him!”' },
                
                { type: 'arabic', text: 'أَلَمْ يَرَوْا۟ كَمْ أَهْلَكْنَا قَبْلَهُم مِّنَ ٱلْقُرُونِ أَنَّهُمْ إِلَيْهِمْ لَا يَرْجِعُونَ' },
                { type: 'text', text: ':31] Have they not seen how many generations We destroyed before them, which will not return to them?' },
                
                { type: 'arabic', text: 'وَإِن كُلٌّ لَّمَّا جَمِيعٌ لَّدَيْنَا مُحْضَرُونَ' },
                { type: 'text', text: ':32] And without exception, all of them will be brought forth before Us.' },
                
                { type: 'arabic', text: 'وَءَايَةٌ لَّهُمُ ٱلْأَرْضُ ٱلْمَيْتَةُ أَحْيَيْنَٰهَا وَأَخْرَجْنَا مِنْهَا حَبًّا فَمِنْهُ يَأْكُلُونَ' },
                { type: 'text', text: ':33] And a sign for them is the dead earth; We gave it life and We produced from it grain, so they eat from it.' },
                
                { type: 'arabic', text: 'وَجَعَلْنَا فِيهَا جَنَّٰتٍ مِّن نَّخِيلٍ وَأَعْنَبٍ وَفَجَّرْنَا فِيهَا مِنَ ٱلْعُيُونِ' },
                { type: 'text', text: ':34] And We have placed in it gardens of dates and grapes, and We have made springs of water in it.' },
                
                { type: 'arabic', text: 'لِيَأْكُلُوا۟ مِن ثَمَرِهِۦ وَمَا عَمِلَتْهُ أَيْدِيهِمْ ۖ أَفَلَا يَشْكُرُونَ' },
                { type: 'text', text: ':35] So that they may eat from its fruits, whereas they are not manufactured by their hands! So will they not be grateful?' },
                
                { type: 'arabic', text: 'سُبْحَٰنَ ٱلَّذِى خَلَقَ ٱلْأَزْوَٰجَ كُلَّهَا مِمَّا تُنۢبِتُ ٱلْأَرْضُ وَمِنْ أَنفُسِهِمْ وَمِمَّا لَا يَعْلَمُونَ' },
                { type: 'text', text: ':36] Purity is to Him Who created all pairs, from what the earth grows, and of themselves, and from the things they do not know.' },
                
                { type: 'arabic', text: 'وَءَايَةٌ لَّهُمُ ٱلَّيْلُ نَسْلَخُ مِنْهُ ٱلنَّهَارَ فَإِذَا هُم مُّظْلِمُونَ' },
                { type: 'text', text: ':37] And a sign for them is the night; We strip the day out of it, thereupon they are in darkness.' },
                
                { type: 'arabic', text: 'وَٱلشَّمْسُ تَجْرِى لِمُسْتَقَرٍّ لَّهَا ۚ ذَٰلِكَ تَقْدِيرُ ٱلْعَزِيزِ ٱلْعَلِيمِ' },
                { type: 'text', text: ':38] And the sun runs its course for its final destination; this is a command of the Almighty, the All Knowing.' },
                
                { type: 'arabic', text: 'وَٱلْقَمَرَ قَدَّرْنَٰهُ مَنَازِلَ حَتَّىٰ عَادَ كَٱلْعُرْجُونِ ٱلْقَدِيمِ' },
                { type: 'text', text: ':39] And We have appointed positions for the moon till it returns like an old branch of the date palm.' },
                
                { type: 'arabic', text: 'لَا ٱلشَّمْسُ يَنۢبَغِى لَهَآ أَن تُدْرِكَ ٱلْقَمَرَ وَلَا ٱلَّيْلُ سَابِقُ ٱلنَّهَارِ ۚ وَكُلٌّ فِى فَلَكٍ يَسْبَحُونَ' },
                { type: 'text', text: ':40] It is not for the sun to catch up with the moon, nor does the night surpass the day; and each one of them floats in its orbit.' },
                
                { type: 'arabic', text: 'وَءَايَةٌ لَّهُمْ أَنَّا حَمَلْنَا ذُرِّيَّتَهُمْ فِى ٱلْفُلْكِ ٱلْمَشْحُونِ' },
                { type: 'text', text: ':41] And a sign for them is that We lodged them in a laden ship, while they were in their forefathers backs.' },
                
                { type: 'arabic', text: 'وَخَلَقْنَا لَهُم مِّن مِّثْلِهِۦ مَا يَرْكَبُونَ' },
                { type: 'text', text: ':42] And We have created for them similar ships, in which they now ride.' },
                
                { type: 'arabic', text: 'وَإِن نَّشَأْ نُغْرِقْهُمْ فَلَا صَرِيخَ لَهُمْ وَلَا هُمْ يُنقَذُونَ' },
                { type: 'text', text: ':43] And if We will, We can drown them, so there would be no help in their distress, nor would they be saved.' },
                
                { type: 'arabic', text: 'إِلَّا رَحْمَةً مِّنَّا وَمَتَٰعًا إِلَىٰ حِينٍ' },
                { type: 'text', text: ':44] Unless by mercy from Us, and as a comfort for a while.' },
                
                { type: 'arabic', text: 'وَإِذَا قِيلَ لَهُمُ ٱتَّقُوا۟ مَا بَيْنَ أَيْدِيكُمْ وَمَا خَلْفَكُمْ لَعَلَّكُمْ تُرْحَمُونَ' },
                { type: 'text', text: ':45] And when it is said to them, “Beware of what is before you and what is behind you...”' },
                
                { type: 'arabic', text: 'وَمَا تَأْتِيهِم مِّنْ ءَايَةٍ مِّنْ ءَايَٰتِ رَبِّهِمْ إِلَّا كَانُوا۟ عَنْهَا مُعْرِضِينَ' },
                { type: 'text', text: ':46] And whenever a sign comes to them from the signs of their Lord, they always turn away from it!' },
                
                { type: 'arabic', text: 'وَإِذَا قِيلَ لَهُمْ أَنفِقُوا۟ مِمَّا رَزَقَكُمُ ٱللَّهُ قَالَ ٱلَّذِينَ كَفَرُوا۟ لِلَّذِينَ ءَامَنُوٓا۟ أَنُطْعِمُ مَن لَّو يَّشَآءُ ٱللَّهُ أَطْعَمَهُۥٓ إِنْ أَنتُمْ إِلَّا فِى ضَلَٰلٍ مُّبِينٍ' },
                { type: 'text', text: ':47] And when it is said to them, “Spend in Allah’s cause...” the disbelievers say... “Shall we feed these, whom if Allah willed, would have fed?”' },
                
                { type: 'arabic', text: 'وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلْوَعْدُ إِن كُنتُمْ صَٰدِقِينَ' },
                { type: 'text', text: ':48] And they say, “When will this promise be fulfilled, if you are truthful?”' },
                
                { type: 'arabic', text: 'مَا يَنظُرُونَ إِلَّا صَيْحَةً وَٰحِدَةً تَأْخُذُهُمْ وَهُمْ يَخِصِّمُونَ' },
                { type: 'text', text: ':49] They await just one scream, which will overcome them while they are involved in worldly disputes.' },
                
                { type: 'arabic', text: 'فَلَا يَسْتَطِيعُونَ تَوْصِيَةً وَلَآ إِلَىٰٓ أَهْلِهِمْ يَرْجِعُونَ' },
                { type: 'text', text: ':50] Therefore neither able to make a will, nor returning to their homes.' },
                
                { type: 'arabic', text: 'وَنُفِخَ فِى ٱلصُّورِ فَإِذَا هُم مِّنَ ٱلْأَجْدَاثِ إِلَىٰ رَبِّهِمْ يَنسِلُونَ' },
                { type: 'text', text: ':51] And the Trumpet will be blown - so they will come forth from the graves, running towards their Lord.' },
                
                { type: 'arabic', text: 'قَالُوا۟ يَٰوَيْلَنَا مَنۢ بَعَثَنَا مِن مَّرْقَدِنَا ۜ ۗ هَٰذَا مَا وَعَدَ ٱلرَّحْمَٰنُ وَصَدَقَ ٱلْمُرْسَلُونَ' },
                { type: 'text', text: ':52] Saying, “O our misfortune! Who has raised us from our sleep? This is what the Most Gracious had promised...”' },
                
                { type: 'arabic', text: 'إِن كَانَتْ إِلَّا صَيْحَةً وَٰحِدَةً فَإِذَا هُمْ جَمِيعٌ لَّدَيْنَا مُحْضَرُونَ' },
                { type: 'text', text: ':53] It is just one scream, and every one of them will be brought together before Us!' },
                
                { type: 'arabic', text: 'فَٱلْيَوْمَ لَا تُظْلَمُ نَفْسٌ شَيْـًٔا وَلَا تُجْزَوْنَ إِلَّا مَا كُنتُمْ تَعْمَلُونَ' },
                { type: 'text', text: ':54] So this day no soul will be wronged in the least; and you will not be compensated except for your deeds.' },
                
                { type: 'arabic', text: 'إِنَّ أَصْحَٰبَ ٱلْجَنَّةِ ٱلْيَوْمَ فِى شُغُلٍ فَٰكِهُونَ' },
                { type: 'text', text: ':55] Indeed this day the dwellers of Paradise are in comfort, with blissful hearts.' },
                
                { type: 'arabic', text: 'هُمْ وَأَزْوَٰجُهُمْ فِى ظِلَٰلٍ عَلَى ٱلْأَرَآئِكِ مُتَّكِـُٔونَ' },
                { type: 'text', text: ':56] They and their wives are in shades, reclining on thrones.' },
                
                { type: 'arabic', text: 'لَهُمْ فِيهَا فَٰكِهَةٌ وَلَهُم مَّا يَدَّعُونَ' },
                { type: 'text', text: ':57] In it (paradise) are fruits for them and whatever they ask for.' },
                
                { type: 'arabic', text: 'سَلَٰمٌ قَوْلًا مِّن رَّبٍّ رَّحِيمٍ' },
                { type: 'text', text: ':58] Upon them will be “Peace” - a Word from their Merciful Lord!' },
                
                { type: 'arabic', text: 'وَٱمْتَٰزُوا۟ ٱلْيَوْمَ أَيُّهَا ٱلْمُجْرِمُونَ' },
                { type: 'text', text: ':59] “And be separated (from others) this day, O you criminals!”' },
                
                { type: 'arabic', text: 'أَلَمْ أَعْهَدْ إِلَيْكُمْ يَٰبَنِىٓ ءَادَمَ أَن لَّا تَعْبُدُوا۟ ٱلشَّيْطَٰنَ ۖ إِنَّهُۥ لَكُمْ عَدُوٌّ مُّبِينٌ' },
                { type: 'text', text: ':60] “O Descendants of Adam! Did I not take a covenant from you that you shall not worship the devil? Undoubtedly, he is your open enemy.”' },
                
                { type: 'arabic', text: 'وَأَنِ ٱعْبُدُونِى ۚ هَٰذَا صِرَٰطٌ مُّسْتَقِيمٌ' },
                { type: 'text', text: ':61] “And that you shall worship Me? This is the Straight Path.”' },
                
                { type: 'arabic', text: 'وَلَقَدْ أَضَلَّ مِنكُمْ جِبِلًّا كَثِيرًا ۖ أَفَلَمْ تَكُونُوا۟ تَعْقِلُونَ' },
                { type: 'text', text: ':62] “And he has indeed led a large number of you astray; so did you not have sense?”' },
                
                { type: 'arabic', text: 'هَٰذِهِۦ جَهَنَّمُ ٱلَّتِى كُنتُمْ تُوعَدُونَ' },
                { type: 'text', text: ':63] “This is hell, which you were promised.”' },
                
                { type: 'arabic', text: 'ٱصْلَوْهَا ٱلْيَوْمَ بِمَا كُنتُمْ تَكْفُرُونَ' },
                { type: 'text', text: ':64] “Enter it this day - the recompense of your disbelief.”' },
                
                { type: 'arabic', text: 'ٱلْيَوْمَ نَخْتِمُ عَلَىٰٓ أَفْوَٰهِهِمْ وَتُكَلِّمُنَآ أَيْدِيهِمْ وَتَشْهَدُ أَرْجُلُهُم بِمَا كَانُوا۟ يَكْسِبُونَ' },
                { type: 'text', text: ':65] This day We will set a seal on their mouths, and their hands will speak out to Us and their feet will bear witness to their deeds.' },
                
                { type: 'arabic', text: 'وَلَوْ نَشَآءُ لَطَمَسْنَا عَلَىٰٓ أَعْيُنِهِمْ فَٱسْتَبَقُوا۟ ٱلصِّرَٰطَ فَأَنَّىٰ يُبْصِرُونَ' },
                { type: 'text', text: ':66] And had We willed, We could have quenched their eyes so they would rush towards the path, unable to see a thing.' },
                
                { type: 'arabic', text: 'وَلَوْ نَشَآءُ لَمَسَخْنَٰهُمْ عَلَىٰ مَكَانَتِهِمْ فَمَا ٱسْتَطَٰعُوا۟ مُضِيًّا وَلَا يَرْجِعُونَ' },
                { type: 'text', text: ':67] And had We willed, We could have disfigured their faces while they were in their homes, therefore unable to go forward or turn back.' },
                
                
                { type: 'arabic', text: 'وَمَن نُّعَمِّرْهُ نُنَكِّسْهُ فِى ٱلْخَلْقِ ۖ أَفَلَا يَعْقِلُونَ' },
                { type: 'text', text: ':68] And whomever We bring to an old age, We reverse him in creation; so do they not understand?' },
                
                { type: 'arabic', text: 'وَمَا عَلَّمْنَٰهُ ٱلشِّعْرَ وَمَا يَنۢبَغِى لَهُۥٓ ۚ إِنْ هُوَ إِلَّا ذِكْرٌ وَقُرْءَانٌ مُّبِينٌ' },
                { type: 'text', text: ':69] And We have not taught him to recite poetry, nor does it befit him; it is nothing but an advice and the bright Qur’an.' },
                
                { type: 'arabic', text: 'لِّيُنذِرَ مَن كَانَ حَيًّا وَيَحِقَّ ٱلْقَوْلُ عَلَى ٱلْكَٰفِرِينَ' },
                { type: 'text', text: ':70] To warn the living *, and to prove the Word against disbelievers.' },
                
                { type: 'arabic', text: 'أَوَلَمْ يَرَوْا۟ أَنَّا خَلَقْنَا لَهُم مِّمَّا عَمِلَتْ أَيْدِينَآ أَنْعَٰمًا فَهُمْ لَهَا مَٰلِكُونَ' },
                { type: 'text', text: ':71] Did they not see that We have created animals for them from Our handiwork, so they are their owners?' },
                
                { type: 'arabic', text: 'وَذَلَّلْنَٰهَا لَهُمْ فَمِنْهَا رَكُوبُهُمْ وَمِنْهَا يَأْكُلُونَ' },
                { type: 'text', text: ':72] And have subjected the animals for them, so they ride some animals and eat some?' },
                
                { type: 'arabic', text: 'وَلَهُمْ فِيهَا مَنَٰفِعُ وَمَشَارِبُ ۖ أَفَلَا يَشْكُرُونَ' },
                { type: 'text', text: ':73] And for them in the animals are numerous different benefits and drinks; so will they not be grateful?' },
                
                { type: 'arabic', text: 'وَٱتَّخَذُوا۟ مِن دُونِ ٱللَّهِ ءَالِهَةً لَّعَلَّهُمْ يُنصَرُونَ' },
                { type: 'text', text: ':74] And they have appointed Gods other than Allah, that perhaps they may be helped!' },
                
                { type: 'arabic', text: 'لَا يَسْتَطِيعُونَ نَصْرَهُمْ وَهُمْ لَهُمْ جُندٌ مُّحْضَرُونَ' },
                { type: 'text', text: ':75] They (the appointed Gods) cannot help them; and they and their armies will come (to Us), as captives.' },
                
                { type: 'arabic', text: 'فَلَا يَحْزُنكَ قَوْلُهُمْ ۘ إِنَّا نَعْلَمُ مَا يُسِرُّونَ وَمَا يُعْلِنُونَ' },
                { type: 'text', text: ':76] Therefore (O dear Prophet Mohammed) do not grieve because of what they say; indeed We know what they conceal and what they disclose.' },
                
                { type: 'arabic', text: 'أَوَلَمْ يَرَ ٱلْإِنسَٰنُ أَنَّا خَلَقْنَٰهُ مِن نُّطْفَةٍ فَإِذَا هُوَ خَصِيمٌ مُّبِينٌ' },
                { type: 'text', text: ':77] And did not man see that We have created him from a drop of semen? Yet he is an open quarreller!' },
                
                { type: 'arabic', text: 'وَضَرَبَ لَنَا مَثَلًا وَنَسِىَ خَلْقَهُۥ ۖ قَالَ مَن يُحْىِ ٱلْعِظَٰمَ وَهِىَ رَمِيمٌ' },
                { type: 'text', text: ':78] And he invents an example for Us, while forgetting his own creation, saying, “Who is such that can revive the bones when they have completely rotted away?”' },
                
                { type: 'arabic', text: 'قُلْ يُحْيِيهَا ٱلَّذِىٓ أَنشَأَهَآ أَوَّلَ مَرَّةٍ ۖ وَهُوَ بِكُلِّ خَلْقٍ عَلِيمٌ' },
                { type: 'text', text: ':79] Proclaim, “They will be revived by the One Who created them the first time; and He is the All Knowing of every creation.”' },
                
                { type: 'arabic', text: 'ٱلَّذِى جَعَلَ لَكُم مِّنَ ٱلشَّجَرِ ٱلْأَخْضَرِ نَارًا فَإِذَآ أَنتُم مِّنْهُ تُوقِدُونَ' },
                { type: 'text', text: ':80] “The One Who has created for you fire from the green tree, so you kindle from it.”' },
                
                { type: 'arabic', text: 'أَوَلَيْسَ ٱلَّذِى خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضَ بِقَٰدِرٍ عَلَىٰٓ أَن يَخْلُقَ مِثْلَهُم ۚ بَلَىٰ وَهُوَ ٱلْخَلَّٰقُ ٱلْعَلِيمُ' },
                { type: 'text', text: ':81] And is it not possible for the One Who created the heavens and the earth to create the likes of them? It is surely possible, why not?' },
                
                { type: 'arabic', text: 'إِنَّمَآ أَمْرُهُۥٓ إِذَآ أَرَادَ شَيْـًٔا أَن يَقُولَ لَهُۥ كُن فَيَكُونُ' },
                { type: 'text', text: ':82] And His only task when He intends a thing is to command it, “Be” - and it thereupon happens!' },
                
         { 
  type: 'text',
  text: ':83] Therefore Purity is to Him in Whose Hand is the control over all things and it is towards Him that you will be returned.' 
}
    ]
  },
  {
    audio1: 'https://server8.mp3quran.net/afs/048.mp3',

    content: [
      {

        text: 'AL FATH (THE VICTORY)'
      },
      {
        type: 'text',
  text: '(Revealed at Medinah - contains 29 verses - Para 48)'
},
{
  type: 'arabic',
  text: 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ'
},
{
  type: 'text',
  text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful'
},
                { type: 'arabic', text: 'إِنَّا فَتَحْنَا لَكَ فَتْحًا مُّبِينًا' },
                { type: 'text', text: '1] We have indeed, for your sake (O dear Prophet Mohammed - peace and blessings be upon him), bestowed a clear victory.' },
                { type: 'arabic', text: 'لِّيَغْفِرَ لَكَ اللَّهُ مَا تَقَدَّمَ مِن ذَنبِكَ وَمَا تَأَخَّرَ وَيُتِمَّ نِعْمَتَهُ عَلَيْكَ وَيَهْدِيَكَ صِرَاطًا مُّسْتَقِيمًا' },
                { type: 'text', text: '2] So that Allah may forgive, for your sake, the sins of those before you and those after you, and complete His favours upon you, and to show you the Straight Path.' },
                { type: 'arabic', text: 'وَيَنصُرَكَ اللَّهُ نَصْرًا عَزِيزًا' },
                { type: 'text', text: '3] And so that Allah may provide you a great help.' },
                { type: 'arabic', text: 'هُوَ الَّذِي أَنزَلَ السَّكِينَةَ فِي قُلُوبِ الْمُؤْمِنِينَ لِيَزْدَادُوا إِيمَانًا مَّعَ إِيمَانِهِمْ ۖ وَلِلَّهِ جُنُودُ السَّمَاوَاتِ وَالْأَرْضِ ۚ وَكَانَ اللَّهُ عَلِيمًا حَكِيمًا' },
                { type: 'text', text: '4] It is He Who instilled peace in the hearts of the believers, so that it may increase their strength of conviction; and to Allah only belong the armies of the heavens and the earth; and Allah is All Knowing, Wise.' },
                { type: 'arabic', text: 'لِّيُدْخِلَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ خَالِدِينَ فِيهَا وَيُكَفِّرَ عَنْهُمْ سَيِّئَاتِهِمْ ۚ وَكَانَ ذَٰلِكَ عِندَ اللَّهِ فَوْزًا عَظِيمًا' },
                { type: 'text', text: '5] In order to admit the believing men and believing women into Gardens beneath which rivers flow, in which they will abide, and to relieve them of their misdeeds; and this, in Allah’s sight, is the greatest success.' },
                { type: 'arabic', text: 'وَيُعَذِّبَ الْمُنَافِقِينَ وَالْمُنَافِقَاتِ وَالْمُشْرِكِينَ وَالْمُشْرِكَاتِ الظَّانِّينَ بِاللَّهِ ظَنَّ السَّوْءِ ۚ عَلَيْهِمْ دَائِرَةُ السَّوْءِ ۖ وَغَضِبَ اللَّهُ عَلَيْهِمْ وَلَعَنَهُمْ وَأَعَدَّ لَهُمْ جَهَنَّمَ ۖ وَسَاءَتْ مَصِيرًا' },
                { type: 'text', text: '6] And to punish the hypocrite men and hypocrite women, and the polytheist men and polytheist women, who think evilly about Allah; upon them only is the evil cycle of misfortune; and Allah has wreaked anger upon them, and has cursed them, and has prepared hell for them; and what an evil destination.' },
                { type: 'arabic', text: 'وَلِلَّهِ جُنُودُ السَّمَاوَاتِ وَالْأَرْضِ ۚ وَكَانَ اللَّهُ عَزِيزًا حَكِيمًا' },
                { type: 'text', text: '7] And to Allah only belong the armies of the heavens and the earth; and Allah is Most Honourable, Wise.' },
                { type: 'arabic', text: 'إِنَّا أَرْسَلْنَاكَ شَاهِدًا وَمُبَشِّرًا وَنَذِيرًا' },
                { type: 'text', text: '8] We have indeed sent you (O dear Prophet Mohammed - peace and blessings be upon him) as a present witness and a Herald of glad tidings and warnings. (The Holy Prophet is a witness from Allah.)' },
                { type: 'arabic', text: 'لِّتُؤْمِنُوا بِاللَّهِ وَرَسُولِهِ وَتُعَزِّرُوهُ وَتُوَقِّرُوهُ وَتُسَبِّحُوهُ بُكْرَةً وَأَصِيلًا' },
                { type: 'text', text: '9] In order that you, O people, may accept faith in Allah and His Noble Messenger, and honour and revere the Noble Messenger; and may say the Purity of Allah, morning and evening. (To honour the Holy Prophet – peace and blessings be upon him – is part of faith. To disrespect him is blasphemy.)' },
                { type: 'arabic', text: 'إِنَّ الَّذِينَ يُبَايِعُونَكَ إِنَّمَا يُبَايِعُونَ اللَّهَ يَدُ اللَّهِ فَوْقَ أَيْدِيهِمْ ۚ فَمَن نَّكَثَ فَإِنَّمَا يَنكُثُ عَلَىٰ نَفْسِهِ ۖ وَمَنْ أَوْفَىٰ بِمَا عَاهَدَ عَلَيْهُ اللَّهَ فَسَيُؤْتِيهِ أَجْرًا عَظِيمًا' },
                { type: 'text', text: "10] Those who swear allegiance to you (O dear Prophet Mohammed - peace and blessings be upon him), do indeed in fact swear allegiance to Allah; Allah's Hand* of Power is above their hands; so whoever breaches his oath, has breached his own greater promise; and whoever fulfils the covenant he has with Allah - so very soon Allah will bestow upon him a great reward. (Used as a metaphor.)" },
                { type: 'hr' },
                { type: 'arabic', text: 'سَيَقُولُ لَكَ الْمُخَلَّفُونَ مِنَ الْأَعْرَابِ شَغَلَتْنَا أَمْوَالُنَا وَأَهْلُونَا فَاسْتَغْفِرْ لَنَا ۚ يَقُولُونَ بِأَلْسِنَتِهِم مَّا لَيْسَ فِي قُلُوبِهِمْ ۚ قُلْ فَمَن يَمْلِكُ لَكُم مِّنَ اللَّهِ شَيْئًا إِنْ أَرَادَ بِكُمْ ضَرًّا أَوْ أَرَادَ بِكُمْ نَفْعًا ۚ بَلْ كَانَ اللَّهُ بِمَا تَعْمَلُونَ خَبِيرًا' },
                { type: 'text', text: '11] The ignorant ones who had stayed behind will now say to you, “Our wealth and our families prevented us from going by keeping us pre-occupied, therefore seek forgiveness for us”; they utter with their tongues what is not in their hearts; say, “So does anyone have any control over you against Allah, if He wills to harm you or provide you benefit? In fact Allah is Aware of what you do.”' },
                { type: 'arabic', text: 'بَلْ ظَنَنتُمْ أَن لَّن يَنقَلِبَ الرَّسُولُ وَالْمُؤْمِنُونَ إِلَىٰ أَهْلِيهِمْ أَبَدًا وَزُيِّنَ ذَٰلِكَ فِي قُلُوبِكُمْ وَظَنَنتُمْ ظَنَّ السَّوْءِ وَكُنتُمْ قَوْمًا بُورًا' },
                { type: 'text', text: '12] “Rather you had assumed that the Noble Messenger and the Muslims will never return to their homes, and you thought this as good within your hearts, whereas you had thought evilly; and you were a people about to be ruined.”' },
                { type: 'arabic', text: 'وَمَن لَّمْ يُؤْمِن بِاللَّهِ وَرَسُولِهِ فَإِنَّا أَعْتَدْنَا لِلْكَافِرِينَ سَعِيرًا' },
                { type: 'text', text: '13] And whoever does not accept faith in Allah and His Noble Messenger - We have indeed kept prepared a blazing fire for disbelievers.' },
                { type: 'arabic', text: 'وَلِلَّهِ مُلْكُ السَّمَاوَاتِ وَالْأَرْضِ ۚ يَغْفِرُ لِمَن يَشَاءُ وَيُعَذِّبُ مَن يَشَاءُ ۚ وَكَانَ اللَّهُ غَفُورًا رَّحِيمًا' },
                { type: 'text', text: '14] And for Allah only is the kingship of the heavens and the earth; He may forgive whomever He wills, and punish whomever He wills; and Allah is Oft Forgiving, Most Merciful.' },
                { type: 'arabic', text: 'سَيَقُولُ الْمُخَلَّفُونَ إِذَا انطَلَقْتُمْ إِلَىٰ مَغَانِمَ لِتَأْخُذُوهَا ذَرُونَا نَتَّبِعْكُمْ ۖ يُرِيدُونَ أَن يُبَدِّلُوا كَلَامَ اللَّهِ ۚ قُل لَّن تَتَّبِعُونَا كَذَٰلِكُمْ قَالَ اللَّهُ مِن قَبْلُ ۖ فَسَيَقُولُونَ بَلْ تَحْسُدُونَا ۚ بَلْ كَانُوا لَا يَفْقَهُونَ إِلَّا قَلِيلًا' },
                { type: 'text', text: '15] Those who had stayed behind will now say, “When you go to receive the war booty, let us also go with you”; they wish to change the Words of Allah; say “You shall never come with us - this is already decreed by Allah”; so they will now say, “But rather you envy us”; in fact they never understood except a little.' },
                { type: 'arabic', text: 'قُل لِّلْمُخَلَّفِينَ مِنَ الْأَعْرَابِ سَتُدْعَوْنَ إِلَىٰ قَوْمٍ أُولِي بَأْسٍ شَدِيدٍ تُقَاتِلُونَهُمْ أَوْ يُسْلِمُونَ ۖ فَإِن تُطِيعُوا يُؤْتِكُمُ اللَّهُ أَجْرًا حَسَنًا ۖ وَإِن تَتَوَلَّوْا كَمَا تَوَلَّيْتُم مِّن قَبْلُ يُعَذِّبْكُمْ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '16] Say to the ignorant who stayed behind, “You will soon be called against a nation of great military strength - to fight against them or that they become Muslims; so if you obey, Allah will give you an excellent reward; and if you turn away, the way you had turned away before, He will mete out a painful punishment to you.”' },
                { type: 'arabic', text: 'لَّيْسَ عَلَى الْأَعْمَىٰ حَرَجٌ وَلَا عَلَى الْأَعْرَجِ حَرَجٌ وَلَا عَلَى الْمَرِيضِ حَرَجٌ ۗ وَمَن يُطِعِ اللَّهَ وَرَسُولَهُ يُدْخِلْهُ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ ۖ وَمَن يَتَوَلَّ يُعَذِّبْهُ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '17] There is no reproach upon the blind, nor reproach against the lame, nor reproach upon the sick; and whoever obeys Allah and His Noble Messenger - Allah will admit him into Gardens beneath which rivers flow; and whoever turns away - He will mete out a painful punishment to him.' },
                { type: 'hr' },
                { type: 'arabic', text: 'لَّقَدْ رَضِيَ اللَّهُ عَنِ الْمُؤْمِنِينَ إِذْ يُبَايِعُونَكَ تَحْتَ الشَّجَرَةِ فَعَلِمَ مَا فِي قُلُوبِهِمْ فَأَنزَلَ السَّكِينَةَ عَلَيْهِمْ وَأَثَابَهُمْ فَتْحًا قَرِيبًا' },
                { type: 'text', text: '18] Indeed Allah was truly pleased with the believers when they swore allegiance to you beneath the tree - so He knew what was in their hearts - He therefore sent down peace upon them, and rewarded them with an imminent victory.' },
                { type: 'arabic', text: 'وَمَغَانِمَ كَثِيرَةً يَأْخُذُونَهَا ۗ وَكَانَ اللَّهُ عَزِيزًا حَكِيمًا' },
                { type: 'text', text: '19] And plenty of war booty, to take; and Allah is Most Honourable, Wise.' },
                { type: 'arabic', text: 'وَعَدَكُمُ اللَّهُ مَغَانِمَ كَثِيرَةً تَأْخُذُونَهَا فَعَجَّلَ لَكُمْ هَٰذِهِ وَكَفَّ أَيْدِيَ النَّاسِ عَنكُمْ وَلِتَكُونَ آيَةً لِّلْمُؤْمِنِينَ وَيَهْدِيَكُمْ صِرَاطًا مُّسْتَقِيمًا' },
                { type: 'text', text: '20] Allah has promised you plenty of booty which you will take, and has bestowed this to you quickly, and restrained peoples’ hands from you; and in order that it may be a sign for the believers, and to guide you on the Straight Path.' },
                { type: 'arabic', text: 'وَأُخْرَىٰ لَمْ تَقْدِرُوا عَلَيْهَا قَدْ أَحَاطَ اللَّهُ بِهَا ۚ وَكَانَ اللَّهُ عَلَىٰ كُلِّ شَيْءٍ قَدِيرًا' },
                { type: 'text', text: '21] And one more, not within your capacity, is within Allah’s hold; and Allah is Able to do all things.' },
                { type: 'arabic', text: 'وَلَوْ قَاتَلَكُمُ الَّذِينَ كَفَرُوا لَوَلَّوُا الْأَدْبَارَ ثُمَّ لَا يَجِدُونَ وَلِيًّا وَلَا نَصِيرًا' },
                { type: 'text', text: '22] And if the disbelievers were to fight you, they will turn away and flee, and then they will not find any supporter nor any aide.' },
                { type: 'arabic', text: 'سُنَّةَ اللَّهِ الَّتِي قَدْ خَلَتْ مِن قَبْلُ ۖ وَلَن تَجِدَ لِسُنَّةِ اللَّهِ تَبْدِيلاً' },
                { type: 'text', text: '23] The tradition of Allah, ongoing since before; and you will not find the tradition of Allah changing.' },
                { type: 'arabic', text: 'وَهُوَ الَّذِي كَفَّ أَيْدِيَهُمْ عَنكُمْ وَأَيْدِيَكُمْ عَنْهُم بِبَطْنِ مَكَّةَ مِن بَعْدِ أَنْ أَظْفَرَكُمْ عَلَيْهِمْ ۚ وَكَانَ اللَّهُ بِمَا تَعْمَلُونَ بَصِيرًا' },
                { type: 'text', text: '24] And it is He Who restrained their hands from you, and your hands from them in the valley of Mecca, after having given you control over them; and Allah sees all what you do.' },
                { type: 'arabic', text: 'هُمُ الَّذِينَ كَفَرُوا وَصَدُّوكُمْ عَنِ الْمَسْجِدِ الْحَرَامِ وَالْهَدْيَ مَعْكُوفًا أَن يَبْلُغَ مَحِلَّهُ ۚ وَلَوْلَا رِجَالٌ مُّؤْمِنُونَ وَنِسَاءٌ مُّؤْمِنَاتٌ لَّمْ تَعْلَمُوهُمْ أَن تَطَؤُوهُمْ فَتُصِيبَكُم مِّنْهُم مَّعَرَّةٌ بِغَيْرِ عِلْمٍ ۖ لِّيُدْخِلَ اللَّهُ فِي رَحْمَتِهِ مَن يَشَاءُ ۚ لَوْ تَزَيَّلُوا لَعَذَّبْنَا الَّذِينَ كَفَرُوا مِنْهُمْ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '25] It was these who disbelieved and prevented you from the Sacred Mosque, and stopped the sacrificial animals from reaching their place; and were it not for some Muslim men and Muslim women, whom you do not know - lest you may crush them and unintentionally incur some violation due to them - Allah would have permitted you to slay them; this relief for them, is so that Allah may admit into His mercy whomever He wills; and had they been separated, We would have indeed punished the disbelievers among them with a painful punishment.' },
                { type: 'hr' },
                { type: 'arabic', text: 'إِذْ جَعَلَ الَّذِينَ كَفَرُوا فِي قُلُوبِهِمُ الْحَمِيَّةَ حَمِيَّةَ الْجَاهِلِيَّةِ فَأَنزَلَ اللَّهُ سَكِينَتَهُ عَلَىٰ رَسُولِهِ وَعَلَى الْمُؤْمِنِينَ وَأَلْزَمَهُمْ كَلِمَةَ التَّقْوَىٰ وَكَانُوا أَحَقَّ بِهَا وَأَهْلَهَا ۚ وَكَانَ اللَّهُ بِكُلِّ شَيْءٍ عَلِيمًا' },
                { type: 'text', text: '26] Whereas the disbelievers had set up in their hearts an obstinacy - the same obstacy of the days of ignorance - so Allah sent down His solace upon His Noble Messenger and upon the believers, and decreed upon them the words of piety, and they were more deserving and suitable for it; and Allah is the All Knowing.' },
                { type: 'arabic', text: 'لَّقَدْ صَدَقَ اللَّهُ رَسُولَهُ الرُّؤْيَا بِالْحَقِّ ۖ لَتَدْخُلُنَّ الْمَسْجِدَ الْحَرَامَ إِن شَاءَ اللَّهُ آمِنِينَ مُحَلِّقِينَ رُءُوسَكُمْ وَمُقَصِّرِينَ لَا تَخَافُونَ ۖ فَعَلِمَ مَا لَمْ تَعْلَمُوا فَجَعَلَ مِن دُونِ ذَٰلِكَ فَتْحًا قَرِيبًا' },
                { type: 'text', text: '27] Allah has indeed made the truthful dream of His Noble Messenger, come true; indeed you will all enter the Sacred Mosque, if Allah wills, in safety - with your heads shaven or hair cut short - without fear; so He knows what you do not know, and has therefore ordained another imminent victory before this.' },
                { type: 'arabic', text: 'هُوَ الَّذِي أَرْسَلَ رَسُولَهُ بِالْهُدَىٰ وَدِينِ الْحَقِّ لِيُظْهِرَهُ عَلَى الدِّينِ كُلِّهِ ۚ وَكَفَىٰ بِاللَّهِ شَهِيدًا' },
                { type: 'text', text: '28] It is He Who has sent His Noble Messenger with the guidance and the true religion, in order to make it prevail over all other religions; and Allah is sufficient as a Witness. (The Holy Prophet is a light from Allah.)' },
                { type: 'arabic', text: 'مُّحَمَّدٌ رَّسُولُ اللَّهِ ۚ وَالَّذِينَ مَعَهُ أَشِدَّاءُ عَلَى الْكُفَّارِ رُحَمَاءُ بَيْنَهُمْ ۖ تَرَاهُمْ رُكَّعًا سُجَّدًا يَبْتَغُونَ فَضْلًا مِّنَ اللَّهِ وَرِضْوَانًا ۖ سِيمَاهُمْ فِي وُجُوهِهِم مِّنْ أَثَرِ السُّجُودِ ۚ ذَٰلِكَ مَثَلُهُمْ فِي التَّوْرَاةِ ۚ وَمَثَلُهُمْ فِي الْإِنجِيلِ كَزَرْعٍ أَخْرَجَ شَطْأَهُ فَآزَرَهُ فَاسْتَغْلَظَ فَاسْتَوَىٰ عَلَىٰ سُوقِهِ يُعْجِبُ الزُّرَّاعَ لِيَغِيظَ بِهِمُ الْكُفَّارَ ۗ وَعَدَ اللَّهُ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ مِنْهُم مَّغْفِرَةً وَأَجْرًا عَظِيمًا' },
                { type: 'text', text: '29] Mohammed (peace and blessings be upon him) is the Noble Messenger of Allah; and his companions are stern with the disbelievers and merciful among themselves - you will see them bowing and falling in prostration, seeking Allah’s munificence and His pleasure; their signs are on their faces, from the effects of prostrations; this trait of theirs is mentioned in the Taurat; and their trait is mentioned in the Injeel; like a cultivation that sprouted its shoot, then strengthened it, then thickened and then stood firm upon its stem, pleasing the farmer - in order to enrage the disbelievers with them; Allah has promised forgiveness and a great reward to those among them who have faith and do good deeds.' }
              ]

                { "type": "text", "text": "2] A just Book, to warn of Allah’s severe punishment, and to give glad tidings to the believers who do good deeds, that for them is an excellent reward." },
