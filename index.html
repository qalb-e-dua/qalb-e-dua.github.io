                { "type": "text", "text": "5] They do not have any knowledge of it - nor did their forefathers; profound is the word that comes out of their mouths; they only speak a lie." },
                { "type": "arabic", "text": "فَلَعَلَّكَ بَاخِعٌ نَّفْسَكَ عَلٰۤی اٰثَارِهِمْ اِنْ لَّمْ يُؤْمِنُوْا بِهٰذَا الْحَدِيْثِ اَسَفًا" },
                { "type": "text", "text": "6] Possibly you may risk your life by grieving (O dear Prophet Mohammed - peace and blessings be upon him)for them if they do not believe in this narration." },
                { "type": "arabic", "text": "اِنَّا جَعَلْنَا مَا عَلَى الْاَرْضِ زِيْنَةً لَّهَا لِنَبْلُوَهُمْ اَيُّهُمْ اَحْسَنُ عَمَلًا ۙ" },
                { "type": "text", "text": "7] We have indeed placed all that is on the earth as its adornment in order that We may test them, who among them has the best deeds." },
                { "type": "arabic", "text": "وَاِنَّا لَجَاعِلُوْنَ مَا عَلَيْهَا صَعِيْدًا جُرُزًا" },
                { "type": "text", "text": "8] And indeed We shall one day make all that is on it a barren plain." },
                { "type": "arabic", "text": "اَمْ حَسِبْتَ اَنَّ اَصْحٰبَ الْكَهْفِ وَالرَّقِيْمِ كَانُوْا مِنْ اٰيٰتِنَا عَجَبًا" },
                { "type": "text", "text": "9] Did you know that the People of the Cave and People close to the Woods, were Our exceptional signs?" },
                { "type": "arabic", "text": "اِذْ اَوَى الْفِتْيَةُ اِلَى الْكَهْفِ فَقَالُوْا رَبَّنَاۤ اٰتِنَا مِنْ لَّدُنْكَ رَحْمَةً وَّهَيِّئْ لَنَا مِنْ اَمْرِنَا رَشَدًا" },
                { "type": "text", "text": "10] When the young men took refuge in the Cave - then said, “Our Lord! Give us mercy from Yourself, and arrange guidance for us in our affair.”" },
                { "type": "arabic", "text": "فَضَرَبْنَا عَلٰۤی اٰذَانِهِمْ فِی الْكَهْفِ سِنِیْنَ عَدَدًا ۙ" },
                { "type": "text", "text": "11] We then thumped upon their ears in the Cave for a number of years. (* Put them to sleep.)" },
                { "type": "arabic", "text": "ثُمَّ بَعَثْنٰهُمْ لِنَعْلَمَ اَيُّ الْحِزْبَيْنِ اَحْصٰى لِمَا لَبِثُوْۤا اَمَدًا" },
                { "type": "text", "text": "12] We then awakened them to see which of the two groups more accurately tells the period they had stayed." },
                { "type": "arabic", "text": "نَحْنُ نَقُصُّ عَلَيْكَ نَبَاَهُمْ بِالْحَقِّ ؕ اِنَّهُمْ فِتْيَةٌ اٰمَنُوْا بِرَبِّهِمْ وَزِدْنٰهُمْ هُدًی ۙ" },
                { "type": "text", "text": "13] We shall narrate their account to you accurately; they were young men who believed in their Lord, and We increased the guidance for them." },
                { "type": "arabic", "text": "وَّرَبَطْنَا عَلٰی قُلُوْبِهِمْ اِذْ قَامُوْا فَقَالُوْا رَبُّنَا رَبُّ السَّمٰوٰتِ وَالْاَرْضِ لَنْ نَّدْعُوَا۟ مِنْ دُوْنِهٖۤ اِلٰهًا ؕ لَقَدْ قُلْنَاۤ اِذًا شَطَطًا" },
                { "type": "text", "text": "14] And We made their hearts steadfast when they stood up and said, “Our Lord is the Lord of the heavens and the earth - we shall not worship any other deity except Him - if it were, we have then said something excessive.”" },
                { "type": "arabic", "text": "هٰۤؤُلَآءِ قَوْمُنَا اتَّخَذُوْا مِنْ دُوْنِهٖۤ اٰلِهَةً ؕ لَوْلَا يَاْتُوْنَ عَلَيْهِمْ بِسُلْطٰنٍۢ بَيِّنٍ ؕ فَمَنْ اَظْلَمُ مِمَّنِ افْتَرٰی عَلَى اللّٰهِ كَذِبًا" },
                { "type": "text", "text": "15] “These - the people of ours - have set up Gods besides Allah; why do they not bring a clear proof regarding them? And who is more unjust than one who fabricates a lie against Allah?”" },
                { "type": "arabic", "text": "وَاِذِ اعْتَزَلْتُمُوْهُمْ وَمَا يَعْبُدُوْنَ اِلَّا اللّٰهَ فَاْوُوْاۤ اِلَى الْكَهْفِ يَنْشُرْ لَكُمْ رَبُّكُمْ مِّنْ رَّحْمَتِهٖ وَيُهَيِّئْ لَكُمْ مِّنْ اَمْرِكُمْ مِّرْفَقًا" },
                { "type": "text", "text": "16] “And when you have disassociated yourself from them and all what they worship besides Allah - so take refuge in the Cave - your Lord will spread His mercy for you and arrange ease for you in your affairs.”" },
                { "type": "arabic", "text": "وَتَرَى الشَّمْسَ اِذَا طَلَعَتْ تَّزٰوَرُ عَنْ كَهْفِهِمْ ذَاتَ الْيَمِيْنِ وَاِذَا غَرَبَتْ تَّقْرِضُهُمْ ذَاتَ الشِّمَالِ وَهُمْ فِیْ فِجْوَةٍ مِّنْهُ ؕ ذٰلِكَ مِنْ اٰيٰتِ اللّٰهِ ؕ مَنْ يَّهْدِ اللّٰهُ فَاِذًا هُوَ الْمُهْتَدِ ۚ وَمَنْ يُّضْلِلْ فَلَنْ تَجِدَ لَهٗ وَلِیًّا مُّرْشِدًا" },
                { "type": "text", "text": "17] And O dear Prophet (Mohammed - peace and blessings be upon him) you will see the sun that when it rises it shifts away to the right of their cave, and when it sets it shifts away to their left, and they are in the open ground of that cave; this is from among the signs of Allah; whomever Allah guides - only he is therefore guided; and whomever He sends astray - you will never find for him a friend who guides." },
                { "type": "arabic", "text": "وَتَحْسَبُهُمْ اَيْقَاظًا وَّهُمْ رُقُوْدٌ ۙ وَّنُقَلِّبُهُمْ ذَاتَ الْيَمِيْنِ وَذَاتَ الشِّمَالِ ۪ وَكَلْبُهُمْ بَاسِطٌ ذِرَاعَيْهِ بِالْوَصِيْدِ ؕ لَوِ اطَّلَعْتَ عَلَيْهِمْ لَوَلَّيْتَ مِنْهُمْ فِرَارًا وَّلَمُلِئْتَ مِنْهُمْ رُعْبًا" },
                { "type": "text", "text": "18] And you may think they are awake, whereas they are asleep; and We turn them over to the right and the left - and their dog is on the threshold of the cave, with its paws outstretched; O listener, were you to look at them closely, you would turn back running away from them, and be filled with their dread." },
                { "type": "arabic", "text": "وَكَذٰلِكَ بَعَثْنٰهُمْ لِيَتَسَآءَلُوْا بَيْنَهُمْ ؕ قَالَ قَآئِلٌ مِّنْهُمْ كَمْ لَبِثْتُمْ ؕ قَالُوْا لَبِثْنَا يَوْمًا اَوْ بَعْضَ يَوْمٍ ؕ قَالُوْا رَبُّكُمْ اَعْلَمُ بِمَا لَبِثْتُمْ فَا بْعَثُوْۤا اَحَدَكُمْ بِوَرِقِكُمْ هٰذِهٖۤ اِلَى الْمَدِيْنَةِ فَلْيَنْظُرْ اَيُّهَاۤ اَزْكٰى طَعَامًا فَلْيَاْتِكُمْ بِرِزْقٍ مِّنْهُ وَلْيَتَلَطَّفْ وَلَا يُشْعِرَنَّ بِكُمْ اَحَدًا" },
                { "type": "text", "text": "19] And similarly We awakened them so that they may enquire about each other; a speaker among them said, “How long have you stayed here?” Some among them said, “We have stayed a day or part of a day”; the others said, “Your Lord well knows how long you have stayed; therefore send one of you to the city with this silver coin - he may then check which food available there is purer, in order to bring some of it for you to eat - and he must be courtesy and not inform anyone about you.”" },
                { "type": "arabic", "text": "اِنَّهُمْ اِنْ يَّظْهَرُوْا عَلَيْكُمْ يَرْجُمُوْكُمْ اَوْ يُعِيْدُوْكُمْ فِیْ مِلَّتِهِمْ وَلَنْ تُفْلِحُوْۤا اِذًا اَبَدًا" },
                { "type": "text", "text": "20] “Indeed if they come to know about you, they will stone you or turn you back to their religion - and if so, you will never prosper.”" },
                { "type": "arabic", "text": "وَكَذٰلِكَ اَعْثَرْنَا عَلَيْهِمْ لِيَعْلَمُوْۤا اَنَّ وَعْدَ اللّٰهِ حَقٌّ وَّاَنَّ السَّاعَةَ لَا رَيْبَ فِیْهَا ؕ اِذْ يَتَنَازَعُوْنَ بَيْنَهُمْ اَمْرَهُمْ فَقَالُوا ابْنُوْا عَلَيْهِمْ بُنْيَانًا ۚ رَبُّهُمْ اَعْلَمُ بِهِم ؕ قَالَ الَّذِیْنَ غَلَبُوْا عَلٰۤی اَمْرِهِمْ لَنَتَّخِذَنَّ عَلَيْهِمْ مَّسْجِدًا" },
                { "type": "text", "text": "21] And this is how We made them known for people to know that the promise of Allah is true and that there is no doubt concerning the Last Day; when the people began disputing among themselves regarding them, they said, “Construct a building over their cave”; their Lord well knows them; those who dominated in this matter said, “We promise we will build a mosque over them.”" },
                { "type": "arabic", "text": "سَيَقُوْلُوْنَ ثَلٰثَةٌ رَّابِعُهُمْ كَلْبُهُمْ ۚ وَيَقُوْلُوْنَ خَمْسَةٌ سَادِسُهُمْ كَلْبُهُمْ رَجْمًۢا بِالْغَيْبِ ۚ وَيَقُوْلُوْنَ سَبْعَةٌ وَّثَامِنُهُمْ كَلْبُهُمْ ؕ قُلْ رَّبِّیْۤ اَعْلَمُ بِعِدَّتِهِمْ مَّا يَعْلَمُهُمْ اِلَّا قَلِيْلٌ ۫ فَلَا تُمَارِ فِیْهِمْ اِلَّا مِرَآءً ظَاهِرًا ۪ وَلَا تَسْتَفْتِ فِیْهِمْ مِّنْهُمْ اَحَدًا" },
                { "type": "text", "text": "22] So the people will now say, “They are three, their dog is the fourth”; and some will say, “They are five, their dog is the sixth” - just blind guesses; and some will say, “They are seven, and their dog is the eighth”; proclaim (O dear Prophet Mohammed - peace and blessings be upon him), “My Lord well knows their number - no one knows them except a few”; therefore do not debate concerning them except what has occurred, and do not ask any of the People of the Book(s) anything concerning them." },
                { "type": "arabic", "text": "وَلَا تَقُوْلَنَّ لِشَایْءٍ اِنِّیْ فَا عِلٌ ذٰلِكَ غَدًا ۙ" },
                { "type": "text", "text": "23] And never say about anything that, “I will do this tomorrow.”" },
                { "type": "arabic", "text": "اِلَّاۤ اَنْ يَّشَآءَ اللّٰهُ ۫ وَاذْكُرْ رَّبَّكَ اِذَا نَسِیْتَ وَقُلْ عَسٰۤی اَنْ يَّهْدِيَنِ رَبِّیْ لِاَقربَ مِنْ هٰذَا رَشَدًا" },
                { "type": "text", "text": "24] Except “If Allah wills”; and remember your Lord when you forget, and say, “It is likely that my Lord will guide me to a more accurate way of virtue than this.”" },
                { "type": "arabic", "text": "وَلَبِثُوْا فِیْ كَهْفِهِمْ ثَلٰثَ مِائَةٍ سِنِيْنَ وَازْدَادُوْا تِسْعًا" },
                { "type": "text", "text": "25] And they stayed in their Cave for three hundred years and nine more." },
                { "type": "arabic", "text": "قُلِ اللّٰهُ اَعْلَمُ بِمَا لَبِثُوْا ۚ لَهٗ غَيْبُ السَّمٰوٰتِ وَالْاَرْضِ ؕ اَبْصِرْ بِهٖ وَاَسْمِعْ ؕ مَا لَهُمْ مِّنْ دُوْنِهٖ مِنْ وَّلِیٍّ وَّلَا يُشْرِكُ فِیْۤ اَمْرِهٖۤ اَحَدًا" },
                { "type": "text", "text": "26] Say, “Allah well knows how long they stayed; for Him only are the hidden of the heavens and the earth; how well He sees and hears! They do not have any supporter besides Him; and He does not associate anyone in His command.”" },
                { "type": "arabic", "text": "وَاتْلُ مَاۤ اُوْحِیَ اِلَيْكَ مِنْ كِتٰبِ رَبِّكَ ؕ لَا مُبَدِّلَ لِكَلِمٰتِهٖ ۫ وَلَنْ تَجِدَ مِنْ دُوْنِهٖ مُلْتَحَدًا" },
                { "type": "text", "text": "27] And recite the Book of your Lord which has been divinely revealed to you; there is none who can change His Words; and you will never find a refuge besides Him." },
                { "type": "arabic", "text": "وَاصْبِرْ نَفْسَكَ مَعَ الَّذِیْنَ يَدْعُوْنَ رَبَّهُمْ بِالْغَدٰوةِ وَالْعَشِیِّ يُرِيْدُوْنَ وَجْهَهٗ وَلَا تَعْدُ عَيْنٰكَ عَنْهُمْ ۚ تُرِيْدُ زِيْنَةَ الْحَيٰوةِ الدُّنْيَا ۚ وَلَا تُطِعْ مَنْ اَغْفَلْنَا قَلْبَهٗ عَنْ ذِكْرِنَا وَاتَّبَعَ هَوٰهُ وَكَانَ اَمْرُهٗ فُرُطًا" },
                { "type": "text", "text": "28] And restrain yourself along with those who pray to their Lord morning and evening, seeking His pleasure; and may not your sight fall on anything besides them; would you desire the adornment of the life of this world? And do not follow him whose heart We have made neglectful of Our remembrance – the one who has followed his own desires and his matter has crossed the limits." },
                { "type": "arabic", "text": "وَقُلِ الْحَقُّ مِنْ رَّبِّكُمْ فَمَنْ شَآءَ فَلْيُؤْمِنْ وَّمَنْ شَآءَ فَلْيَكْفُرْ ۙ اِنَّاۤ اَعْتَدْنَا لِلظّٰلِمِیْنَ نَارًا ۙ اَحَاطَ بِهِمْ سُرَادِقُهَا ؕ وَاِنْ يَّسْتَغِیْثُوْا يُغَاثُوْا بِمَآءٍ كَالْمُهْلِ يَشْوِی الْوُجُوْهَ ؕ بِئْسَ الشَّرَابُ ؕ وَسَآءَتْ مُرْتَفَقًا" },
                { "type": "text", "text": "29] And proclaim, “The Truth is from your Lord”; so whoever wills may accept faith, and whoever wills may disbelieve - We have indeed prepared for the disbelievers a fire the walls of which will surround them; if they plead for water, their plea will be answered with water like molten metal which shall scald their faces; what an evil drink it is; and what an evil destination is hell!" },
{ "type": "arabic", "text": "اِنَّ الَّذِیْنَ اٰمَنُوْا وَعَمِلُوا الصّٰلِحٰتِ اِنَّا لَا نُضِیْعُ اَجْرَ مَنْ اَحْسَنَ عَمَلًا ۚ" },
    { "type": "text", "text": "30] Indeed those who believed and did good deeds - We do not waste the reward of those whose deeds are good." },
    { "type": "arabic", "text": "اُولٰٓئِكَ لَهُمْ جَنّٰتُ عَدْنٍ تَجْرِیْ مِنْ تَحْتِهِمُ الْاَنْهٰرُ يُحَلَّوْنَ فِیْهَا مِنْ اَسَاوِرَ مِنْ ذَهَبٍ وَّيَلْبَسُوْنَ ثِيَابًا خُضْرًا مِّنْ سُنْدُسٍ وَّاِسْتَبْرَقٍ مُّتَّكِئِیْنَ فِیْهَا عَلَى الْاَرْآئِكِ ؕ نِعْمَ الثَّوَابُ ؕ وَحَسُنَتْ مُرْتَفَقًا" },
    { "type": "text", "text": "31] For them are everlasting Gardens of Eden, beneath which rivers flow - in it they will be given bracelets of gold to adorn, and shall wear green clothes made of fine silk and gold embroidery, reclining upon thrones in it; what an excellent reward; and what an excellent abode is Paradise!" },
    { "type": "arabic", "text": "وَاضْرِبْ لَهُمْ مَّثَلًا رَّجُلَيْنِ جَعَلْنَا لِاَحَدِهِمَا جَنَّتَيْنِ مِنْ اَعْنَابٍ وَّحَفَفْنٰهُمَا بِنَخْلٍ وَّجَعَلْنَا بَيْنَهُمَا زَرْعًا" },
    { "type": "text", "text": "32] And relate to them the account of the two men - to one We gave two gardens of grapes, and covered them with date-palms and kept farms between them." },
    { "type": "arabic", "text": "كِلْتَا الْجَنَّتَيْنِ اٰتَتْ اُكُلَهَا وَلَمْ تَظْلِمْ مِنْهُ شَایْئًا وَّفَجَّرْنَا خِلٰلَهُمَا نَهَرًا ۙ" },
    { "type": "text", "text": "33] Both the gardens gave yields and gave no shortfall in it - and We made a river to flow between the two." },
    { "type": "arabic", "text": "وَكَانَ لَهٗ ثَمَرٌ ۘ فَقَالَ لِصَاحِبِهٖ وَهُوَ يُحَاوِرُهٗۤ اَنَا اَكْثَرُ مِنْكَ مَالًا وَّاَعَزُّ نَفَرًا" },
    { "type": "text", "text": "34] And he had fruit; he therefore said to his companion - and he used to debate with him - “I exceed you in wealth, and am more powerful in respect of men.”" },
    { "type": "arabic", "text": "وَدَخَلَ جَنَّتَهٗ وَهُوَ ظَالِمٌ لِّنَفْسِهٖ قَالَ مَاۤ اَظُنُّ اَنْ تَبِیْدَ هٰذِهٖۤ اَبَدًا ۙ" },
    { "type": "text", "text": "35] He went into his garden and wronging himself said, “I do not think that this will ever perish.”" },
    { "type": "arabic", "text": "وَّمَاۤ اَظُنُّ السَّاعَةَ قَآئِمَةً وَّلَئِنْ رُّدِدْتُّ اِلٰی رَبِّیْ لَاَجِدَنَّ خَيْرًا مِّنْهَا مُنْقَلَبًا" },
    { "type": "text", "text": "36] “I do not think that the Last Day will ever be established - and even if I return to my Lord I will surely find a haven better than this garden.”" },
    { "type": "arabic", "text": "قَالَ لَهٗ صَاحِبُهٗ وَهُوَ يُحَاوِرُهٗۤ اَكَفَرْتَ بِالَّذِیْ خَلَقَكَ مِنْ تُرَابٍ ثُمَّ مِنْ نُّطْفَةٍ ثُمَّ سَوّٰىكَ رَجُلًا ؕ" },
    { "type": "text", "text": "37] His companion debating with him answered, “What! You disbelieve in Him Who has created you from dust, then from a drop of liquid, and then created you as a complete man?”" },
    { "type": "arabic", "text": "لٰكِنَّا۠ هُوَ اللّٰهُ رَبِّیْ وَلَاۤ اُشْرِكُ بِرَبِّیْۤ اَدًا" },
    { "type": "text", "text": "38] “But I just say that only Allah is my Lord, and I do not ascribe anyone as a partner to my Lord.”" },
    { "type": "arabic", "text": "وَلَوْلَاۤ اِذْ دَخَلْتَ جَنَّتَكَ قُلْتَ مَا شَآءَ اللّٰهُ لَا قُوَّةَ اِلَّا بِاللّٰهِ ۚ اِنْ تَرَنِ اَنَا۠ اَقَلَّ مِنْكَ مَالًا وَّوَلَدًا ۚ" },
    { "type": "text", "text": "39] “And why was it not that you would have said when you entered your garden, ‘Whatever Allah wills - we do not have any strength except with the help of Allah’ - if you had observed me lesser than you in wealth and children?”" },
    { "type": "arabic", "text": "فَعَسٰۤی رَبِّیْۤ اَنْ يُّؤْتِيَنِ خَيْرًا مِّنْ جَنَّتِكَ وَيُرْسِلَ عَلَيْهَا حُسْبَانًا مِّنَ السَّمَآءِ فَتُصْبِحَ صَعِيْدًا زَلَقًا ۙ" },
    { "type": "text", "text": "40] “So it is likely that my Lord will give me a garden better than yours, and send bolts of lightning from the skies on your garden - it therefore turns into a barren plain.”" },
    { "type": "arabic", "text": "اَوْ يُصْبِحَ مَآؤُهَا غَوْرًا فَلَنْ تَسْتَطِيْعَ لَهٗ طَلَبًا" },
    { "type": "text", "text": "41] “Or its water may sink into the earth, so you may never be able to find it.”" },
    { "type": "arabic", "text": "وَاُحِیْطَ بِثَمَرِهٖ فَاَصْبَحَ يُقَلِّبُ كَفَّيْهِ عَلٰی مَاۤ اَنْفَقَ فِیْهَا وَهِیَ خَاوِيَةٌ عَلٰی عُرُوْشِهَا وَيَقُوْلُ يٰلَيْتَنِیْ لَمْ اُشْرِكْ بِرَبِّیْۤ اَدًا" },
    { "type": "text", "text": "42] And his fruits were surrounded - he therefore remained helplessly wringing his hands upon all that he had spent on it - and it lay fallen on its canopy - and he says, “If only I had not ascribed any partner to my Lord!”" },
    { "type": "arabic", "text": "وَلَمْ تَكُنْ لَّهٗ فِئَةٌ يَّنْصُرُوْنَهٗ مِنْ دُوْنِ اللّٰهِ وَمَا كَانَ مُنْتَصِرًا" },
    { "type": "text", "text": "43] And he had no group to help him against Allah, nor was he capable of taking revenge." },
    { "type": "arabic", "text": "هُنَالِكَ الْوَلَايَةُ لِلّٰهِ الْحَقِّ ؕ هُوَ خَيْرٌ ثَوَابًا وَّخَيْرٌ عُقْبًا" },
    { "type": "text", "text": "44] Here brought to light is that the authority is only for Allah, the True; the reward He bestows is the best, and believing in Him has the best outcome." },
    { "type": "arabic", "text": "وَاضْرِبْ لَهُمْ مَّثَلَ الْحَيٰوةِ الدُّنْيَا كَمَآءٍ اَنْزَلْنٰهُ مِنَ السَّمَآءِ فَاخْتَلَطَ بِهٖ نَبَاتُ الْاَرْضِ فَاَصْبَحَ هَشِيْمًا تَذْرُوْهُ الرِّيٰحُ ؕ وَكَانَ اللّٰهُ عَلٰی كُلِّ شَیْءٍ مُّقْتَدِرًا" },
    { "type": "text", "text": "45] And relate to them the example of the life of this world - like water which We sent down from the sky, therefore vegetation of the earth grew forth in abundance with it to become dry hay which the winds scatter; and Allah is the Controller of all things." },
    { "type": "arabic", "text": "اَلْمَالُ وَالْبَنُوْنَ زِيْنَةُ الْحَيٰوةِ الدُّنْيَا ۚ وَالْبٰقِیٰتُ الصّٰلِحٰتُ خَيْرٌ عِنْدَ رَبِّكَ ثَوَابًا وَّخَيْرٌ اَمَلًا" },
    { "type": "text", "text": "46] Wealth and sons are ornaments of the life of this world; and good deeds that last - their reward is better before your Lord, and are better in respect of hope." },
    { "type": "arabic", "text": "وَيَوْمَ نُسَيِّرُ الْجِبَالَ وَتَرَى الْاَرْضَ بَارِزَةً وَّحَشَرْنٰهُمْ فَلَمْ نُغَادِرْ مِنْهُمْ اَحَدًا" },
    { "type": "text", "text": "47] And the Day when We move the hills and you see the earth flattened plain, and We shall raise all of them together - so not leaving out any one of them." },
    { "type": "arabic", "text": "وَعُرِضُوْا عَلٰی رَبِّكَ صَفًّا ؕ لَقَدْ جِئْتُمُوْنَا كَمَا خَلَقْنٰكُمْ اَوَّلَ مَرَّةٍ ۫ بَلْ زَعَمْتُمْ اَلَّنْ نَّجْعَلَ لَكُمْ مَّوْعِدًا" },
    { "type": "text", "text": "48] And everyone shall be presented before your Lord in rows; “Indeed you have come to Us exactly as We had created you for the first time - in fact you thought that We shall never appoint a promised time for you!”" },
    { "type": "arabic", "text": "وَوُضِعَ الْكِتٰبُ فَتَرَى الْمُجْرِمِیْنَ مُشْفِقِیْنَ مِمَّا فِیْهِ وَيَقُوْلُوْنَ يٰوَيْلَتَنَا مَا لِهٰذَا الْكِتٰبِ لَا يُغَادِرُ صَغِيْرَةً وَّلَا كَبِيْرَةً اِلَّاۤ اَحْصٰهَا ۚ وَوَجَدُوْا مَا عَمِلُوْا حَاضِرًا ؕ وَلَا يَظْلِمُ رَبُّكَ اَحَدًا" },
    { "type": "text", "text": "49] And the Book shall be placed - and you will see the guilty dreading what is written in it and saying, “Woe to us - what sort of a Book is this that it has not left out any small sin nor a great one, which it has not included!” And they found all that they did confronting them; and your Lord does not wrong any one." },
    { "type": "arabic", "text": "وَاِذْ قُلْنَا لِلْمَلٰٓئِكَةِ اسْجُدُوْا لِاٰدَمَ فَسَجَدُوْۤا اِلَّاۤ اِبْلِیْسَ ؕ كَانَ مِنَ الْجِنِّ فَفَسَقَ عَنْ اَمْرِ رَبِّهٖ ؕ اَفَتَتَّخِذُوْنَهٗ وَذُرِّيَّتَهٗۤ اَوْلِيَآءَ مِنْ دُوْنِیْ وَهُمْ لَكُمْ عَدُوٌّ ؕ بِئْسَ لِلظّٰلِمِیْنَ بَدَلًا" },
    { "type": "text", "text": "50] And recall when We commanded the angels that, “Prostrate before Adam” - so they all prostrated, except Iblis; he was of the jinn, he therefore rebelled against his Lord’s command; “What! You choose him and his offspring as your friends instead of Me, whereas they are your enemies?” And what an evil alternative did the unjust get." },
    { "type": "arabic", "text": "مَاۤ اَشْهَدْتُّهُمْ خَلْقَ السَّمٰوٰتِ وَالْاَرْضِ وَلَا خَلْقَ اَنْفُسِهِمْ ۫ وَمَا كُنْتُ مُتَّخِذَ الْمُضِلِّیْنَ عَضُدًا" },
    { "type": "text", "text": "51] Neither did I make them witness the creations of the heavens and the earth, nor witness their own creation; nor does it befit My Majesty to choose misleaders as aides." },
    { "type": "arabic", "text": "وَيَوْمَ يَقُوْلُ نَادُوْا شُرَكَآءِیَ الَّذِیْنَ زَعَمْتُمْ فَدَعَوْهُمْ فَلَمْ يَسْتَجِیْبُوْا لَهُمْ وَجَعَلْنَا بَيْنَهُمْ مَّمَوْبِقًا" },
    { "type": "text", "text": "52] And the Day when He will proclaim, “Call those partners of Mine whom you had assumed” - so they will call out to them - they will not answer them, and We shall create a field of destruction between them." },
    { "type": "arabic", "text": "وَرَاَ الْمُجْرِمُوْنَ النَّارَ فَظَنُّوْۤا اَنَّهمْ مُّوَاقِعُوْهَا وَلَمْ يَجِدُوْا عَنْهَا مَصْرِفًا" },
    { "type": "text", "text": "53] And when the guilty see hell, they will be certain of falling into it, and will find no place to escape from it." },
    { "type": "arabic", "text": "وَلَقَدْ صَرَّفْنَا فِیْ هٰذَا الْقُرْاٰنِ لِلنَّاسِ مِنْ كُلِّ مَثَلٍ ؕ وَكَانَ الْاِنْسَانُ اَكْثَرَ شَیْءٍ جَدَلًا" },
    { "type": "text", "text": "54] And We have indeed illustrated all kinds of examples for mankind in this Qur’an; and man is the most quarrelsome of all." },
    { "type": "arabic", "text": "وَمَا مَنَعَ النَّاسَ اَنْ يُّؤْمِنُوْۤا اِذْ جَآءَهُمُ الْهُدٰى وَيَسْتَغْفِرُوْا رَبَّهُمْ اِلَّاۤ اَنْ تَاْتِيَهُمْ سُنَّةُ الْاَوَّلِیْنَ اَوْ يَاْتِيَهُمُ الْعَذَابُ قُبُلًا" },
    { "type": "text", "text": "55] And what prevented men from accepting faith when guidance came to them, and from asking forgiveness from their Lord except that the tradition of the former nations come upon them or that they confront various kinds of punishments?" },
    { "type": "arabic", "text": "وَمَا نُرْسِلُ الْمُرْسَلِیْنَ اِلَّا مُبَشِّرِیْنَ وَمُنْذِرِیْنَ ۚ وَيُجَادِلُ الَّذِیْنَ كَفَرُوْا بِالْبَاطِلِ لِیُدْحِضُوْا بِهِ الْحَقَّ وَاتَّخَذُوْۤا اٰيٰتِیْ وَمَاۤ اُنْذِرُوْا هُزُوًا" },
    { "type": "text", "text": "56] And We do not send the Noble Messengers except as Heralds of glad tidings and warnings; and the disbelievers debate by means of falsehood to drive away the Truth with it, and they took My signs and warnings they were given, as a mockery!" },
    { "type": "arabic", "text": "وَمَنْ اَظْلَمُ مِمَّنْ ذُكِّرَ بِاٰيٰتِ رَبِّهٖ فَاَعْرَضَ عَنْهَا وَنَسِیَ مَا قَدَّمَتْ يَدَاهُ ؕ اِنَّا جَعَلْنَا عَلٰی قُلُوْبِهِمْ اكِنَّةً اَنْ يَّفْقَهُوْهُ وَفِیْۤ اٰذَانِهِمْ وَقْرًا ؕ وَاِنْ تَدْعُهُمْ اِلَى الْهُدٰى فَلَنْ يَّهْتَدُوْۤا اِذًا اَبَدًا" },
    { "type": "text", "text": "57] And who is more unjust than one who, when reminded of the signs of his Lord, turns away from them and forgets what his hands have sent forward? We have put covers on their hearts so as not to understand the Qur’an, and deafness in their ears; and even if you call them to guidance, they will never attain the right path." },
    { "type": "arabic", "text": "وَرَبُّكَ الْغَفُوْرُ ذُو الرَّحْمَةِ ؕ لَوْ يُؤَاخِذُهُمْ بِمَا كَسَبُوْا لَعَجَّلَ لَهُمُ الْعَذَابَ ؕ بَلْ لَّهُمْ مَّوْعِدٌ لَّنْ يَّجِدُوْا مِنْ دُوْنِهٖ مَوْیِٔلًا" },
    { "type": "text", "text": "58] And your Lord is the Oft Forgiver, the Merciful; if He seized them for their deeds, He would soon send the punishment upon them; but for them is an appointed time from which they will not find any refuge." },
    { "type": "arabic", "text": "وَتِلْكَ الْقُرٰۤى اَهْلَكْنٰهُمْ لَمَّا ظَلَمُوْا وَجَعَلْنَا لِمَهْلِكِهِمْ مَّوْعِدًا" },
    { "type": "text", "text": "59] And these towns - We destroyed them when they committed injustice, and We had set an appointed time for their destruction." },
    { "type": "arabic", "text": "وَاِذْ قَالَ مُوْسٰی لِفَتٰىهُ لَاۤ اَبْرَحُ حَتّٰۤی اَبْلُغَ مَجْمَعَ الْبَحْرَيْنِ اَوْ اَمْضِیَ حُقُبًا" },
    { "type": "text", "text": "60] And recall when Moosa said to his assistant, “I will not give up until I reach the place where the two seas meet or until I have progressed for ages.”" },
    { "type": "arabic", "text": "فَلَمَّا بَلَغَا مَجْمَعَ بَيْنِهِمَا نَسِيَا حُوْتَهُمَا فَاتَّخَذَ سَبِيْلَهٗ فِی الْبَحْرِ سَرَبًا" },
    { "type": "text", "text": "61] And when they reached the place where the two seas meet, they forgot about their fish, and it took its way into the sea, making a tunnel. (The dead fish came alive and went into the water.)" },
    { "type": "arabic", "text": "فَلَمَّا جَاوَزَا قَالَ لِفَتٰىهُ اٰتِنَا غَدَآءَنَا لَقَدْ لَقِیْنَا مِنْ سَفَرِنَا هٰذَا نَصَبًا" },
    { "type": "text", "text": "62] So when they had gone beyond that place, Moosa said to his assistant, “Bring our breakfast - we have indeed faced great exertion in this journey of ours.”" },
    { "type": "arabic", "text": "قَالَ اَرَاَيْتَ اِذْ اَوَيْنَآ اِلَى الصَّخْرَةِ فَاِنِّیْ نَسِیْتُ الْحُوْتَ ۫ وَمَاۤ اَنْسٰىنِیْهُ اِلَّا الشَّيْطٰنُ اَنْ اَذْكُرَهٗ ۚ وَاتَّخَذَ سَبِيْلَهٗ فِی الْبَحْرِ عَجَبًا" },
    { "type": "text", "text": "63] He said, “Just imagine - when we had taken shelter near the rock, so indeed I forgot the fish; and none but Satan caused me to forget to mention it; and the fish took its way into the sea - its amazing!”" },
    { "type": "arabic", "text": "قَالَ ذٰلِكَ مَا كُنَّا نَبْغِ ۫ فَارْتَدَّا عَلٰۤی اٰثَارِهِمَا قَصَصًا" },
    { "type": "text", "text": "64] Said Moosa, “This is exactly what we wanted”; so they came back retracing their steps." },
    { "type": "arabic", "text": "فَوَجَدَا عَبْدًا مِّنْ عِبَادِنَاۤ اٰتَيْنٰهُ رَحْمَةً مِّنْ عِنْدِنَا وَعَلَّمْنٰهُ مِنْ لَّدُنَّا عِلْمًا" },
    { "type": "text", "text": "65] So they found a bondman from amongst Our (chosen) bondmen, to whom We had given mercy from Us, and had bestowed the inspired knowledge from Ourselves. (* Hazrat Khidr - peace be upon him.)" },
    { "type": "arabic", "text": "قَالَ لَهٗ مُوْسٰی هَلْ اَتَّبِعُكَ عَلٰۤی اَنْ تُعَلِّمَنِ مِمَّا عُلِّمْتَ رُشْدًا" },
    { "type": "text", "text": "66] Moosa said to him, “May I stay with you upon the condition that you will teach me the righteousness that you have been taught?”" },
    { "type": "arabic", "text": "قَالَ اِنَّكَ لَنْ تَسْتَطِيْعَ مَعِیَ صَبْرًا" },
    { "type": "text", "text": "67] He said, “You will never be able to patiently stay with me.”" },
    { "type": "arabic", "text": "وَكَيْفَ تَصْبِرُ عَلٰی مَا لَمْ تُحِطْ بِهٖ خُبْرًا" },
    { "type": "text", "text": "68] “And how will you bear something which your knowledge does not encompass?”" },
    { "type": "arabic", "text": "قَالَ سَتَجِدُنِیْۤ اِنْ شَآءَ اللّٰهُ صَابِرًا وَّلَاۤ اَعْصِیْ لَكَ اَمْرًا" },
    { "type": "text", "text": "69] Said Moosa, “Allah willing, you will soon find me patient and I will not do anything against your instructions.”" },
    { "type": "arabic", "text": "قَالَ فَاِنِ اتَّبَعْتَنِیْ فَلَا تَسْئَلْنِیْ عَنْ شَیْءٍ حَتّٰۤی اُحْدِثَ لَكَ مِنْهُ ذِكْرًا" },
    { "type": "text", "text": "70] He said, “Therefore if you stay with me, do not ask me about anything until I myself mention it to you.”" },
    { "type": "arabic", "text": "فَانْطَلَقَا ؕ حَتّٰۤی اِذَا رَكِبَا فِی السَّفِیْنَةِ خَرَقَهَا ؕ قَالَ اَخَرَقْتَهَا لِتُغْرِقَ اَهْلَهَا ۚ لَقَدْ جِئْتَ شَيْئًا اِمْرًا" },
    { "type": "text", "text": "71] So they both set out; until when they had boarded the boat, the chosen bondman ruptured the boat; said Moosa, “Did you make a hole in the boat in order to drown its passengers? You have indeed done an evil thing.”" },
    { "type": "arabic", "text": "قَالَ اَلَمْ اَقُلْ اِنَّكَ لَنْ تَسْتَطِيْعَ مَعِیَ صَبْرًا" },
    { "type": "text", "text": "72] He said, “Did I not say that you will never be able to patiently stay with me?”" },
    { "type": "arabic", "text": "قَالَ لَا تُؤَاخِذْنِیْ بِمَا نَسِیْتُ وَلَا تُرْهِقْنِیْ مِنْ اَمْرِیْ عُسْرًا" },
    { "type": "text", "text": "73] Said Moosa, “Do not apprehend me upon my forgetting, and do not impose difficulty on me in my task.”" },
    { "type": "arabic", "text": "فَانْطَلَقَا ؕ حَتّٰۤی اِذَا لَقِیَا غُلٰمًا فَقَتَلَهٗ ۙ قَالَ اَقَتَلْتَ نَفْسًا زَكِيَّةً بِغَيْرِ نَفْسٍ ۙ لَقَدْ جِئْتَ شَيْئًا نُّكْرًا" },
    { "type": "text", "text": "74] So they set out again; until when they met a boy, the chosen bondman slew him - Moosa said, “Did you slay an innocent soul not in retribution for another? You have indeed done an extremely evil thing.”" },
    { "type": "arabic", "text": "قَالَ اَلَمْ اَقُلْ لَّكَ اِنَّكَ لَنْ تَسْتَطِيْعَ مَعِیَ صَبْرًا" },
    { "type": "text", "text": "75] He said, “Did I not tell you that you will never be able to patiently stay with me?”" },
    { "type": "arabic", "text": "قَالَ اِنْ سَاَلْتُكَ عَنْ شَیْءٍ بَعْدَهَا فَلَا تُصٰحِبْنِیْ ۚ قَدْ بَلَغْتَ مِنْ لَّدُنِّیْ عُذْرًا" },
    { "type": "text", "text": "76] Said Moosa, “If I ask you anything after this, do not stay with me; indeed your condition from me is fulfilled.”" },
    { "type": "arabic", "text": "فَانْطَلَقَا ؕ حَتّٰۤی اِذَاۤ اَتَيَاۤ اَهْلَ قَرْيَةٍ اسْتَطْعَمَاۤ اَهْلَهَا فَاَبَوْا اَنْ يُّضَيِّفُوْهُمَا فَوَجَدَا فِیْهَا جِدَارًا يُّرِیْدُ اَنْ يَّنْقَضَّ فَاَقَامَهٗ ؕ قَالَ لَوْ شِئْتَ لَتَّخَذْتَ عَلَيْهِ اَجْرًا" },
    { "type": "text", "text": "77] So they both set out again; until they came to the people of a dwelling – they asked its people for food - they refused to invite them – then in the village they both found a wall about to collapse, and the chosen bondman straightened it; said Moosa, “If you wished, you could have taken some wages for it!”" },
    { "type": "arabic", "text": "قَالَ هٰذَا فِرَاقُ بَيْنِیْ وَبَيْنِكَ ۚ سَاُنَبِّئُكَ بِتَاْوِیْلِ مَا لَمْ تَسْتَطِعْ عَلَيْهِ صَبْرًا" },
    { "type": "text", "text": "78] He said, “This is the parting between you and me; I shall now tell you the interpretation of the matters you could not patiently bear.”" },
    { "type": "arabic", "text": "اَمَّا السَّفِیْنَةُ فَكَانَتْ لِمَسٰكِیْنَ يَعْمَلُوْنَ فِی الْبَحْرِ فَاَرَدْتُّ اَنْ اَعِیْبَهَا وَكَانَ وَرَآءَهُمْ مَّلِكٌ يَّاْخُذُ كُلَّ سَفِیْنَةٍ غَصْبًا" },
    { "type": "text", "text": "79] “In respect of the boat - it belonged to the poor people who worked on the river, so I wished to flaw it - and behind them was a king who would capture every sound ship.”" },
    { "type": "arabic", "text": "وَاَمَّا الْغُلٰمُ فَكَانَ اَبَوَاهُ مُؤْمِنَيْنِ فَخَشِیْنَآ اَنْ يُّرْهِقَهُمَا طُغْيَانًا وَّكُفْرًا" },
    { "type": "text", "text": "80] “And in respect of the boy - his parents were Muslims and we feared that he may incite them to rebellion and disbelief.”" },
{ "type": "arabic", "text": "فَاَرَدْنَآ اَنْ يُّبْدِلَهُمَا رَبُّهُمَا خَيْرًا مِّنْهُ زَكَوةً وَّاَقْرَبَ رُحْمًا" },
    { "type": "text", "text": "81] “So we wished that their Lord may bestow them a child - better, purer and nearer to mercy.”" },
    { "type": "arabic", "text": "وَاَمَّا الْجِدَارُ فَكَانَ لِغُلٰمَيْنِ يَتِیْمَيْنِ فِی الْمَدِيْنَةِ وَكَانَ تَحْتَهٗ كَنْزٌ لَّهُمَا وَكَانَ اَبُوْهُمَا صَالِحًا ۚ فَاَرَادَ رَبُّكَ اَنْ يَّبْلُغَاۤ اَشُدَّهُمَا وَيَسْتَخْرِجَا كَنْزَهُمَا رَحْمَةً مِّن alignment رَّبِّكَ ۚ وَمَا فَعَلْتُهٗ عَنْ اَمْرِیْ ؕ ذٰلِكَ تَاْوِیْلُ مَا لَمْ تَسْطِعْ عَلَيْهِ صَبْرًا" },
    { "type": "text", "text": "82] “And in respect of the wall - it belonged to two orphan boys of the city, and beneath it was their treasure, and their father was a virtuous man; therefore your Lord willed that they should reach their maturity and remove their treasure; by the mercy of your Lord; and I have not done this at my own command; this is the interpretation of the matters you could not patiently bear.” (* Hazrat Khidr was given the knowledge of the hidden - as in all three explanations he gave)." },
    { "type": "arabic", "text": "وَيَسْئَلُوْنَكَ عَنْ ذِی الْقَرْنَيْنِ ؕ قُلْ سَاَتْلُوْا عَلَيْكُمْ مِّنْهُ ذِكْرًا" },
    { "type": "text", "text": "83] And they ask you regarding Zul-Qarnain; say, “I shall recite his story to you.”" },
    { "type": "arabic", "text": "اِنَّا مَكَّنَّا لَهٗ فِی الْاَرْضِ وَاٰتَيْنٰهُ مِنْ كُلِّ شَیْءٍ سَبَبًا ۙ" },
    { "type": "text", "text": "84] Indeed We gave him authority in the land and bestowed him the means of everything." },
    { "type": "arabic", "text": "فَاَتْبَعَ سَبَبًا" },
    { "type": "text", "text": "85] He therefore pursued a purpose." },
    { "type": "arabic", "text": "حَتّٰۤی اِذَا بَلَغَ مَغْرِبَ الشَّمْسِ وَجَدَهَا تَغْرُبُ فِیْ عَيْنٍ حَمِئَةٍ وَّوَجَدَ عِنْدَهَا قَوْمًا ؕ قُلْنَا يٰذَا الْقَرْنَيْنِ اِمَّاۤ اَنْ تُعَذِّبَ وَاِمَّاۤ اَنْ تَتَّخِذَ فِیْهِمْ حُسْنًا" },
    { "type": "text", "text": "86] To the extent that when he reached the setting-place of the sun, he found it setting in a muddy spring, and found a nation there; We said, “O Zul-Qarnain – either punish them or choose kindness for them.”" },
    { "type": "arabic", "text": "قَالَ اَمَّا مَنْ ظَلَمَ فَسَوْفَ نُعَذِّبُهٗ ثُمَّ يُرَدُّ اِلٰی رَبِّهٖ فَيُعَذِّبُهٗ عَذَابًا نُّكْرًا" },
    { "type": "text", "text": "87] He submitted, “Regarding one who has done injustice, we shall soon punish him – he will then be brought back to his Lord, Who will punish him severely.”" },
    { "type": "arabic", "text": "وَاَمَّا مَنْ اٰمَنَ وَعَمِلَ صَالِحًا فَلَهٗ جَزَآءَ الْحُسْنٰی ۚ وَسَنَقُوْلُ لَهٗ مِنْ اَمْرِنَا یُسْرًا" },
    { "type": "text", "text": "88] “And regarding one who believed and did good deeds – so his reward is goodness; and we shall soon give him an easy command.”" },
    { "type": "arabic", "text": "ثُمَّ اَتْبَعَ سَبَبًا" },
    { "type": "text", "text": "89] He again pursued a purpose." },
    { "type": "arabic", "text": "حَتّٰۤی اِذَا بَلَغَ مَطْلِعَ الشَّمْسِ وَجَدَهَا تَطْلُعُ عَلٰی قَوْمٍ لَّمْ نَجْعَلْ لَّهُمْ مِّنْ دُوْنِهَا سِتْرًا" },
    { "type": "text", "text": "90] To the extent that when he reached the rising-place of the sun, he found it rising upon a nation for which We had not kept any shelter from it." },
    { "type": "arabic", "text": "كَذٰلِكَ ؕ وَقَدْ اَحَطْنَا بِمَا لَدَيْهِ خُبْرًا" },
    { "type": "text", "text": "91] So it is; and Our knowledge encompasses all that he possessed." },
    { "type": "arabic", "text": "ثُمَّ اَتْبَعَ سَبَبًا" },
    { "type": "text", "text": "92] He again pursued a purpose." },
    { "type": "arabic", "text": "حَتّٰۤی اِذَا بَلَغَ بَيْنَ السَّدَّيْنِ وَجَدَ مِنْ دُوْنِهِمَا قَوْمًا لَّا يَكَادُوْنَ يَفْقَهُوْنَ قَوْلًا" },
    { "type": "text", "text": "93] Until, when he came between two mountains, he found before them a nation that did not appear to understand any speech." },
    { "type": "arabic", "text": "قَالُوْا يٰذَا الْقَرْنَيْنِ اِنَّ يَاْجُوْجَ وَمَاْجُوْجَ مُفْسِدُوْنَ فِی الْاَرْضِ فَهَلْ نَجْعَلُ لَكَ خَرْجًا عَلٰۤی اَنْ تَجْعَلَ بَيْنَنَا وَبَيْنَهُمْ سَدًّا" },
    { "type": "text", "text": "94] They said, “O Zul-Qarnain - indeed Yajuj and Majuj are spreading chaos in the land – so shall we assign for you a consideration upon the condition that you set up a wall between us and them?” (* Gog and Magog.)" },
    { "type": "arabic", "text": "قَالَ مَا مَكَّنِّیْ فِیْهِ رَبِّیْ خَيْرٌ فَاَعِیْنُوْنِیْ بِقُوَّةٍ اَجْعَلْ بَيْنَكُمْ وَبَيْنَهُمْ رَدْمًا ۙ" },
    { "type": "text", "text": "95] He said, “That which my Lord has given me control over is better, therefore help me with strength - I shall set up a barrier between you and them.”" },
    { "type": "arabic", "text": "اٰتُوْنِیْ زُبَرَ الْحَدِيْدِ ؕ حَتّٰۤی اِذَا سَاوٰى بَيْنَ الصَّدَفَيْنِ قَالَ انْفُخُوْا ؕ حَتّٰۤی اِذَا جَعَلَهٗ نَارًا قَالَ اٰتُوْنِیْۤ اُفْرِغْ عَلَيْهِ قِطْرًا" },
    { "type": "text", "text": "96] “Give me sheets of iron”; until when he had raised the wall equal to the edge of the two mountains, he said, “Blow”; to the extent that he made it ablaze - he said, “Bring me molten copper to pour upon it.”" },
    { "type": "arabic", "text": "فَمَا اسْطَاعُوْۤا اَنْ يَّظْهَرُوْهُ وَمَا اسْتَطَاعُوْا لَهٗ نَقْبًا" },
    { "type": "text", "text": "97] Therefore Yajuj and Majuj were neither able to surmount it, nor could they pierce it." },
    { "type": "arabic", "text": "قَالَ هٰذَا رَحْمَةٌ مِّنْ رَّبِّیْ ۚ فَاِذَا جَآءَ وَعْدُ رَبِّیْ جَعَلَهٗ دَكَّآءَ ۚ وَكَانَ وَعْدُ رَبِّیْ حَقًّا" },
    { "type": "text", "text": "98] He said, “This is the mercy of my Lord; then when the promise of my Lord arrives, He will blow it to bits; and my Lord’s promise is true.”" },
    { "type": "arabic", "text": "وَتَرَكْنَا بَعْضَهُمْ يَوْمَئِذٍ يَّمُوْجُ فِیْ بَعْضٍ وَّنُفِخَ فِی الصُّوْرِ فَجَمَعْنٰهُمْ جَمْعًا ۙ" },
    { "type": "text", "text": "99] And on that day We shall release them in groups surging like waves one after another, and the Trumpet will be blown – so We shall gather them all together. (* Gog and Magog will come out during the time of Eisa (Jesus) and cause great destruction in the land.)" },
    { "type": "arabic", "text": "وَّعَرَضْنَا جَهَنَّمَ يَوْمَئِذٍ لِّلْكٰفِرِیْنَ عَرْضًا ۙ" },
    { "type": "text", "text": "100] And We shall bring hell in front of the disbelievers." },
    { "type": "arabic", "text": "اَلَّذِیْنَ كَانَتْ اَعْيُنُهُمْ فِیْ غِطَآءٍ عَنْ ذِكْرِیْ وَكَانُوْا لَا يَسْتَطِیْعُوْنَ سَمْعًا" },
    { "type": "text", "text": "101] The ones whose eyes were covered from My remembrance, and who could not bear to hear Truth." },
    { "type": "arabic", "text": "اَفَحَسِبَ الَّذِیْنَ كَفَرُوْۤا اَنْ يَّتَّخِذُوْا عِبَادِیْ مِنْ دُوْنِیْۤ اَوْلِيَآءَ ؕ اِنَّاۤ اَعْتَدْنَا جَهَنَّمَ لِلْكٰفِرِیْنَ نُزُلًا" },
    { "type": "text", "text": "102] Do the disbelievers assume that they will be able to choose My bondmen as supporters other than Me? Indeed We have prepared hell to welcome the disbelievers." },
    { "type": "arabic", "text": "قُلْ هَلْ نُنَبِّئُكُمْ بِالْاَخْسَرِیْنَ اَعْمَالًا ۚ" },
    { "type": "text", "text": "103] Say (O dear Prophet Mohammed – peace and blessings be upon him), “Shall we inform you whose are the most failed works?”" },
    { "type": "arabic", "text": "اَلَّذِیْنَ ضَلَّ سَعْيُهُمْ فِی الْحَيٰوةِ الدُّنْيَا وَهُمْ يَحْسَبُوْنَ اَنَّهُمْ يُحْسِنُوْنَ صُنْعًا" },
    { "type": "text", "text": "104] “Of those whose efforts are lost in (pursuit of) the life of this world, and they think that they are doing good deeds.”" },
    { "type": "arabic", "text": "اُولٰٓئِكَ الَّذِیْنَ كَفَرُوْا بِاٰيٰتِ رَبِّهِمْ وَلِقَآئِهٖ فَحَبِطَتْ اَعْمَالُهُمْ فَلَا نُقِیْمُ لَهُمْ يَوْمَ الْقِیٰمَةِ وَزْنًا" },
    { "type": "text", "text": "105] The people who disbelieved in the signs of their Lord and in the meeting with Him, therefore all their deeds are in vain –We shall therefore not establish any weighing for them on the Day of Resurrection." },
    { "type": "arabic", "text": "ذٰلِكَ جَزَآؤُهُمْ جَهَنَّمُ بِمَا كَفَرُوْا وَاتَّخَذُوْۤا اٰيٰتِیْ وَرُسُلِیْ هُزُوًا" },
    { "type": "text", "text": "106] This is their reward – hell - because they disbelieved, and made a mockery of My verses and My Noble Messengers." },
    { "type": "arabic", "text": "اِنَّ الَّذِیْنَ اٰمَنُوْا وَعَمِلُوا الصّٰلِحٰتِ كَانَتْ لَهُمْ جَنّٰتُ الْفِرْدَوْسِ نُزُلًا ۙ" },
    { "type": "text", "text": "107] Indeed those who believed and did good deeds – their welcome are the Gardens of Paradise." },
    { "type": "arabic", "text": "خٰلِدِیْنَ فِیْهَا لَا يَبْغُوْنَ عَنْهَا حِوَلًا" },
    { "type": "text", "text": "108] They will abide in it for ever, never wanting to shift from it." },
    { "type": "arabic", "text": "قُلْ لَّوْ كَانَ الْبَحْرُ مِدَادًا لِّكَلِمٰتِ رَبِّیْ لَنَفِدَ الْبَحْرُ قَبْلَ اَنْ تَنْفَدَ كَلِمٰتُ رَبِّیْ وَلَوْ جِئْنَا بِمِثْلِهٖ مَدَدًا" },
    { "type": "text", "text": "109] Proclaim, “If the sea became ink for the Words of my Lord, the sea would indeed be used up and the Words of my Lord would never - even if we bring another like it for help.”" },
    { "type": "arabic", "text": "قُلْ اِنَّمَاۤ اَنَا بَشَرٌ مِّثْلُكُمْ يُوْحٰۤى اِلَيَّ اَنَّمَاۤ اِلٰهُكُمْ اِلٰهٌ وَّاحِدٌ ۚ فَمَنْ كَانَ يَرْجُو لِقَاۤءَ رَبِّهٖ فَلْيَعْمَلْ عَمَلًا صَالِحًا وَّلَا يُشْرِكْ بِعِبَادَةِ رَبِّهٖۤ اَحَدًا" },
    { "type": "text", "text": "110] Proclaim, “Physically I am a human * like you - my Lord sends divine revelations to me - that your God is only One God; so whoever expects to the meet his Lord must perform good deeds and not ascribe anyone as a partner in the worship of his Lord.” (* Human but not equal to you, in fact the greatest in spiritual status.)" }
  ]

                { type: 'arabic', text: 'أَلَّا تَطْغَوْا فِي الْمِيزَانِ' },
                { type: 'text', text: '8] In order that you may not corrupt the balance.' },
                { type: 'arabic', text: 'وَأَقِيمُوا الْوَزْنَ بِالْقِسْطِ وَلَا تُخْسِرُوا الْمِيزَانَ' },
                { type: 'text', text: '9] And establish the measures justly, nor decrease the due weight.' },
                { type: 'arabic', text: 'وَالْأَرْضَ وَضَعَهَا لِلْأَنَامِ' },
                { type: 'text', text: '10] And He appointed the earth for the creatures.' },
                { type: 'arabic', text: 'فِيهَا فَاكِهَةٌ وَالنَّخْلُ ذَاتُ الْأَكْمَامِ' },
                { type: 'text', text: '11] In which are fruits, and covered dates.' },
                { type: 'arabic', text: 'وَالْحَبُّ ذُو الْعَصْفِ وَالرَّيْحَانُ' },
                { type: 'text', text: '12] And grain covered with husk, and fragrant flowers.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '13] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'خَلَقَ الْإِنسَانَ مِن صَلْصَالٍ كَالْفَخَّارِ' },
                { type: 'text', text: '14] He created man from clay like that of earthenware.' },
                { type: 'arabic', text: 'وَخَلَقَ الْجَانَّ مِن مَّارِجٍ مِّن نَّارٍ' },
                { type: 'text', text: '15] And created jinn from the flame of fire.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '16] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'رَبُّ الْمَشْرِقَيْنِ وَرَبُّ الْمَغْرِبَيْنِ' },
                { type: 'text', text: '17] Lord of both the Easts, and Lord of both the Wests!' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '18] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'مَرَجَ الْبَحْرَيْنِ يَلْتَقِيَانِ' },
                { type: 'text', text: '19] He has set flowing two seas that appear to meet.' },
                { type: 'arabic', text: 'بَيْنَهُمَا بَرْزَخٌ لَّا يَبْغِيَانِ' },
                { type: 'text', text: '20] Whereas there is a barrier between them so they cannot encroach upon one another.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '21] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'يَخْرُجُ مِنْهُمَا اللُّؤْلُؤُ وَالْمَرْجَانُ' },
                { type: 'text', text: '22] Pearls and coral-stone come forth from them.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '23] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'وَلَهُ الْجَوَارِ الْمُنشَآتُ فِي الْبَحْرِ كَالْأَعْلَامِ' },
                { type: 'text', text: '24] To Him only belong the sailing ships, raised above the sea like hills.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '25] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'hr' },
                { type: 'arabic', text: 'كُلُّ مَنْ عَلَيْهَا فَانٍ' },
                { type: 'text', text: '26] For everything on the earth is extinction.' },
                { type: 'arabic', text: 'وَيَبْقَىٰ وَجْهُ رَبِّكَ ذُو الْجَلَالِ وَالْإِكْرَامِ' },
                { type: 'text', text: '27] And everlasting is the Entity of your Lord, the Most Majestic and the Most Honourable.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '28] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'يَسْأَلُهُ مَن فِي السَّمَاوَاتِ وَالْأَرْضِ ۚ كُلَّ يَوْمٍ هُوَ فِي شَأْنٍ' },
                { type: 'text', text: '29] All those who are in the heavens and the earth seek only from Him; every day is an enterprise for Him.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '30] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'سَنَفْرُغُ لَكُمْ أَيُّهَ الثَّقَلَانِ' },
                { type: 'text', text: '31] Disposing all works quickly We tend towards your account, O you two large groups!' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '32] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'يَا مَعْشَرَ الْجِنِّ وَالْإِنسِ إِنِ اسْتَطَعْتُمْ أَن تَنفُذُوا مِنْ أَقْطَارِ السَّمَاوَاتِ وَالْأَرْضِ فَانفُذُوا ۚ لَا تَنفُذُونَ إِلَّا بِسُلْطَانٍ' },
                { type: 'text', text: '33] O the groups of jinns and men, if you can cross the boundaries of the heavens and the earth, then cross them; wherever you may go, His is the kingdom!' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '34] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'يُرْسَلُ عَلَيْكُمَا شُوَاظٌ مِّن نَّارٍ وَنُحَاسٌ فَلَا تَنتَصِرَانِ' },
                { type: 'text', text: '35] Flames of smokeless fire and black smoke without flames, will be let loose on you, so you will not be able to retaliate.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '36] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فَإِذَا انشَقَّتِ السَّمَاءُ فَكَانَتْ وَرْدَةً كَالدِّهَانِ' },
                { type: 'text', text: '37] And when the heaven will split, it will appear like a rose painted red.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '38] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فَيَوْمَئِذٍ لَّا يُسْأَلُ عَن ذَنبِهِ إِنسٌ وَلَا جَانٌّ' },
                { type: 'text', text: '39] On that day no sinner will be questioned about his sins, from men or from jinns.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '40] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'يُعْرَفُ الْمُجْرِمُونَ بِسِيمَاهُمْ فَيُؤْخَذُ بِالنَّوَاصِي وَالْأَقْدَامِ' },
                { type: 'text', text: '41] The criminals will be recognised from their faces, so will be caught by their forelocks and feet, and thrown into hell.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '42] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'هَٰذِهِ جَهَنَّمُ الَّتِي يُكَذِّبُ بِهَا الْمُجْرِمُونَ' },
                { type: 'text', text: '43] This is hell, which the criminals deny.' },
                { type: 'arabic', text: 'يَطُوفُونَ بَيْنَهَا وَبَيْنَ حَمِيمٍ آنٍ' },
                { type: 'text', text: '44] They shall keep going back and forth between it and the extremely hot boiling water.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '45] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'hr' },
                { type: 'arabic', text: 'وَلِمَنْ خَافَ مَقَامَ رَبِّهِ جَنَّتَانِ' },
                { type: 'text', text: '46] And for one who fears to stand before his Lord, are two Gardens.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '47] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'ذَوَاتَا أَفْنَانٍ' },
                { type: 'text', text: '48] Having numerous branches.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '49] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فِيهِمَا عَيْنَانِ تَجْرِيَانِ' },
                { type: 'text', text: '50] In the two Gardens flow two springs.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '51] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فِيهِمَا مِن كُلِّ فَاكِهَةٍ زَوْجَانِ' },
                { type: 'text', text: '52] In which are fruits of all kinds, each of two varieties.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '53] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'مُتَّكِئِينَ عَلَىٰ فُرُشٍ بَطَائِنُهَا مِنْ إِسْتَبْرَقٍ ۚ وَجَنَى الْجَنَّتَيْنِ دَانٍ' },
                { type: 'text', text: '54] Reclining upon thrones that are lined with brocade, with the fruit of both Gardens close enough to be picked from under.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '55] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فِيهِنَّ قَاصِرَاتُ الطَّرْفِ لَمْ يَطْمِثْهُنَّ إِنسٌ قَبْلَهُمْ وَلَا جَانٌّ' },
                { type: 'text', text: '56] Upon thrones are the women who do not gaze at men except their husbands, and before them, are untouched by any man or jinn.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '57] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'كَأَنَّهُنَّ الْيَاقُوتُ وَالْمَرْجَانُ' },
                { type: 'text', text: '58] They are like rubies and coral-stone.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '59] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'هَلْ جَزَاءُ الْإِحْسَانِ إِلَّا الْإِحْسَانُ' },
                { type: 'text', text: '60] What is the reward of virtue except virtue (in return)?' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '61] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'وَمِن دُونِهِمَا جَنَّتَانِ' },
                { type: 'text', text: '62] And besides them, there are two more Gardens.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '63] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'مُدْهَامَّتَانِ' },
                { type: 'text', text: '64] Densely covered with foliage, appearing dark.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '65] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فِيهِمَا عَيْنَانِ نَضَّاخَتَانِ' },
                { type: 'text', text: '66] In the Gardens are two springs, overflowing with abundance.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '67] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فِيهِمَا فَاكِهَةٌ وَنَخْلٌ وَرُمَّانٌ' },
                { type: 'text', text: '68] In them are fruits (of all kinds), and dates and pomegranate.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '69] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'فِيهِنَّ خَيْرَاتٌ حِسَانٌ' },
                { type: 'text', text: '70] In them are women of good behaviour and gorgeous faces.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '71] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'حُورٌ مَّقْصُورَاتٌ فِي الْخِيَامِ' },
                { type: 'text', text: '72] They are houris (maidens of Paradise), hidden from view, in pavilions.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '73] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'لَمْ يَطْمِثْهُنَّ إِنسٌ قَبْلَهُمْ وَلَا جَانٌّ' },
                { type: 'text', text: '74] Untouched by any man or jinn, before them.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '75] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'مُتَّكِئِينَ عَلَىٰ رَفْرَفٍ خُضْرٍ وَعَبْقَرِيٍّ حِسَانٍ' },
                { type: 'text', text: '76] Reclining on green cushions and beautiful decorated carpets.' },
                { type: 'arabic', text: 'فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ' },
                { type: 'text', text: '77] So O men and jinns! Which favour of your Lord will you deny?' },
                { type: 'arabic', text: 'تَبَارَكَ اسْمُ رَبِّكَ ذِي الْجَلَالِ وَالْإِكْرَامِ' },
                { type: 'text', text: '78] Most Auspicious is the name of your Lord, the Most Majestic and the Most Honourable.' }
              ]
            },
            {
              audio1: 'https://server8.mp3quran.net/afs/056.mp3', // Alafasy
audio2: 'https://server10.mp3quran.net/minsh/056.mp3', // Minshawi
content: [ { type: 'section-title', text: 'AL WAQIA`H (THE EVENT)' }, 
                { type: 'text', text: '(Revealed at Mecca - contains 96 verses-Para 56)' },
                { type: 'arabic', text: 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ' },
                { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
                { type: 'arabic', text: 'إِذَا وَقَعَتِ الْوَاقِعَةُ' },
                { type: 'text', text: '[1] When the forthcoming event does occur.' },
                { type: 'arabic', text: 'لَيْسَ لِوَقْعَتِهَا كَاذِبَةٌ' },
                { type: 'text', text: '[2] Then none will be able to deny its occurrence.' },
                { type: 'arabic', text: 'خَافِضَةٌ رَّافِعَةٌ' },
                { type: 'text', text: '[3] The event will be abasing some, and exalting some.' },
                { type: 'arabic', text: 'إِذَا رُجَّتِ الْأَرْضُ رَجًّا' },
                { type: 'text', text: '[4] When the earth will tremble, shivering.' },
                { type: 'arabic', text: 'وَبُسَّتِ الْجِبَالُ بَسًّا' },
                { type: 'text', text: '[5] And the mountains will be crushed, blown to bits.' },
                { type: 'arabic', text: 'فَكَانَتْ هَبَاءً مُّنبَثًّا' },
                { type: 'text', text: '[6] So they will become like fine dust, scattered in a shaft of light.' },
                { type: 'arabic', text: 'وَكُنتُمْ أَزْوَاجًا ثَلَاثَةً' },
                { type: 'text', text: '[7] And you will become divided into three categories.' },
                { type: 'arabic', text: 'فَأَصْحَابُ الْمَيْمَنَةِ مَا أَصْحَابُ الْمَيْمَنَةِ' },
                { type: 'text', text: '[8] So those on the right – how (fortunate) are those on the right!' },
                { type: 'arabic', text: 'وَأَصْحَابُ الْمَشْأَمَةِ مَا أَصْحَابُ الْمَشْأَمَةِ' },
                { type: 'text', text: '[9] And those on the left – how (wretched) are those on the left!' },
                { type: 'arabic', text: 'وَالسَّابِقُونَ السَّابِقُونَ' },
                { type: 'text', text: '[10] And those who surpassed have indeed excelled.' },
                { type: 'arabic', text: 'أُولَٰئِكَ الْمُقَرَّبُونَ' },
                { type: 'text', text: '[11] It is they who are the close ones.' },
                { type: 'arabic', text: 'فِي جَنَّاتِ النَّعِيمِ' },
                { type: 'text', text: '[12] They are in Gardens of peace.' },
                { type: 'arabic', text: 'ثُلَّةٌ مِّنَ الْأَوَّلِينَ' },
                { type: 'text', text: '[13] A large group from the earlier generations.' },
                { type: 'arabic', text: 'وَقَلِيلٌ مِّنَ الْآخِرِينَ' },
                { type: 'text', text: '[14] And a few from the latter.' },
                { type: 'arabic', text: 'عَلَىٰ سُرُرٍ مَّوْضُونَةٍ' },
                { type: 'text', text: '[15] On studded thrones.' },
                { type: 'arabic', text: 'مُّتَّكِئِينَ عَلَيْهَا مُتَقَابِلِينَ' },
                { type: 'text', text: '[16] Reclining on them, facing each other.' },
                { type: 'arabic', text: 'يَطُوفُ عَلَيْهِمْ وِلْدَانٌ مُّخَلَّدُونَ' },
                { type: 'text', text: '[17] Surrounded by immortal boys.' },
                { type: 'arabic', text: 'بِأَكْوَابٍ وَأَبَارِيقَ وَكَأْسٍ مِّن مَّعِينٍ' },
                { type: 'text', text: '[18] Carrying bowls and pitchers – and cups filled with wine flowing before them.' },
                { type: 'arabic', text: 'لَّا يُصَدَّعُونَ عَنْهَا وَلَا يُنزِفُونَ' },
                { type: 'text', text: '[19] Their heads shall not ache with it, nor shall they lose their senses.' },
                { type: 'arabic', text: 'وَفَاكِهَةٍ مِّمَّا يَتَخَيَّرُونَ' },
                { type: 'text', text: '[20] And fruits that they may like.' },
                { type: 'arabic', text: 'وَلَحْمِ طَيْرٍ مِّمَّا يَشْتَهُونَ' },
                { type: 'text', text: '[21] And meat of birds that they may wish.' },
                { type: 'arabic', text: 'وَحُورٌ عِينٌ' },
                { type: 'text', text: '[22] And gorgeous eyed fair maidens.' },
                { type: 'arabic', text: 'كَأَمْثَالِ اللُّؤْلُؤِ الْمَكْنُونِ' },
                { type: 'text', text: '[23] Like pearls safely hidden.' },
                { type: 'arabic', text: 'جَزَاءً بِمَا كَانُوا يَعْمَلُونَ' },
                { type: 'text', text: '[24] The reward for what they did.' },
                { type: 'arabic', text: 'لَا يَسْمَعُونَ فِيهَا لَغْوًا وَلَا تَأْثِيمًا' },
                { type: 'text', text: '[25] They will not hear any useless speech in it, or any sin.' },
                { type: 'arabic', text: 'إِلَّا قِيلًا سَلَامًا سَلَامًا' },
                { type: 'text', text: '[26] Except the saying, “Peace, peace.”' },
                { type: 'arabic', text: 'وَأَصْحَابُ الْيَمِينِ مَا أَصْحَابُ الْيَمِينِ' },
                { type: 'text', text: '[27] And those on the right - how (fortunate) are those on the right!' },
                { type: 'arabic', text: 'فِي سِدْرٍ مَّخْضُودٍ' },
                { type: 'text', text: '[28] Among thorn-less lote-trees.' },
                { type: 'arabic', text: 'وَطَلْحٍ مَّنضُودٍ' },
                { type: 'text', text: '[29] And clusters of banana plants.' },
                { type: 'arabic', text: 'وَظِلٍّ مَّمْدُودٍ' },
                { type: 'text', text: '[30] And in everlasting shade.' },
                { type: 'arabic', text: 'وَمَاءٍ مَّسْكُوبٍ' },
                { type: 'text', text: '[31] And in perpetually flowing water.' },
                { type: 'arabic', text: 'وَفَاكِهَةٍ كَثِيرَةٍ' },
                { type: 'text', text: '[32] And plenty of fruits.' },
                { type: 'arabic', text: 'لَّا مَقْطُوعَةٍ وَلَا مَمْنُوعَةٍ' },
                { type: 'text', text: '[33] That will neither finish, nor ever be stopped.' },
                { type: 'arabic', text: 'وَفُرُشٍ مَّرْفُوعَةٍ' },
                { type: 'text', text: '[34] And raised couches.' },
                { type: 'arabic', text: 'إِنَّا أَنشَأْنَاهُنَّ إِنشَاءً' },
                { type: 'text', text: '[35] We have indeed developed these women with an excellent development.' },
                { type: 'arabic', text: 'فَجَعَلْنَاهُنَّ أَبْكَارًا' },
                { type: 'text', text: '[36] So made them as maidens.' },
                { type: 'arabic', text: 'عُرُبًا أَتْرَابًا' },
                { type: 'text', text: '[37] The beloved of their husbands, attractive, of single age.' },
                { type: 'arabic', text: 'لِّأَصْحَابِ الْيَمِينِ' },
                { type: 'text', text: '[38] For those on the right.' },
                { type: 'hr' },
                { type: 'arabic', text: 'ثُلَّةٌ مِّنَ الْأَوَّلِينَ' },
                { type: 'text', text: '[39] A large group from the earlier generations.' },
                { type: 'arabic', text: 'وَثُلَّةٌ مِّنَ الْآخِرِينَ' },
                { type: 'text', text: '[40] And a large group from the latter.' },
                { type: 'arabic', text: 'وَأَصْحَابُ الشِّمَالِ مَا أَصْحَابُ الشِّمَالِ' },
                { type: 'text', text: '[41] And those on the left – how (wretched) are those on the left!' },
                { type: 'arabic', text: 'فِي سَمُومٍ وَحَمِيمٍ' },
                { type: 'text', text: '[42] In scorching wind and boiling hot water.' },
                { type: 'arabic', text: 'وَظِلٍّ مِّن يَحْمُومٍ' },
                { type: 'text', text: '[43] And in the shadow of a burning smoke.' },
                { type: 'arabic', text: 'لَّا بَارِدٍ وَلَا كَرِيمٍ' },
                { type: 'text', text: '[44] Which is neither cool nor is for respect.' },
                { type: 'arabic', text: 'إِنَّهُمْ كَانُوا قَبْلَ ذَٰلِكَ مُتْرَفِينَ' },
                { type: 'text', text: '[45] Indeed they were among favours before this.' },
                { type: 'arabic', text: 'وَكَانُوا يُصِرُّونَ عَلَى الْحِنثِ الْعَظِيمِ' },
                { type: 'text', text: '[46] And were stubborn upon the great sin (of disbelief).' },
                { type: 'arabic', text: 'وَكَانُوا يَقُولُونَ أَئِذَا مِتْنَا وَكُنَّا تُرَابًا وَعِظَامًا أَئِنَّا لَمَبْعُوثُونَ' },
                { type: 'text', text: '[47] And they used to say, “When we are dead and have turned into dust and bones, will we surely be raised again?”' },
                { type: 'arabic', text: 'أَوَآبَاؤُنَا الْأَوَّلُونَ' },
                { type: 'text', text: '[48] “And also our forefathers?”' },
                { type: 'arabic', text: 'قُلْ إِنَّ الْأَوَّلِينَ وَالْآخِرِينَ' },
                { type: 'text', text: '[49] Proclaim, “Without doubt all – the former and the latter.”' },
                { type: 'arabic', text: 'لَمَجْمُوعُونَ إِلَىٰ مِيقَاتِ يَوْمٍ مَّعْلُومٍ' },
                { type: 'text', text: '[50] “They will all be gathered together – on the appointed time of the known day.”' },
                { type: 'arabic', text: 'ثُمَّ إِنَّكُمْ أَيُّهَا الضَّالُّونَ الْمُكَذِّبُونَ' },
                { type: 'text', text: '[51] Then indeed you, the astray, the deniers -' },
                { type: 'arabic', text: 'لَآكِلُونَ مِن شَجَرٍ مِّن زَقُّومٍ' },
                { type: 'text', text: '[52] You will indeed eat from the Zaqqum tree.' },
                { type: 'arabic', text: 'فَمَالِئُونَ مِنْهَا الْبُطُونَ' },
                { type: 'text', text: '[53] Then will fill your bellies with it.' },
                { type: 'arabic', text: 'فَشَارِبُونَ عَلَيْهِ مِنَ الْحَمِيمِ' },
                { type: 'text', text: '[54] And upon it, you will drink the hot boiling water.' },
                { type: 'arabic', text: 'فَشَارِبُونَ شُرْبَ الْهِيمِ' },
                { type: 'text', text: '[55] Drinking the way thirsty camels drink.' },
                { type: 'arabic', text: 'هَٰذَا نُزُلُهُمْ يَوْمَ الدِّينِ' },
                { type: 'text', text: '[56] This is their reception on the Day of Justice.' },
                { type: 'arabic', text: 'نَحْنُ خَلَقْنَاكُمْ فَلَوْلَا تُصَدِّقُونَ' },
                { type: 'text', text: '[57] It is We Who created you, so why do you not accept the truth?' },
                { type: 'arabic', text: 'أَفَرَأَيْتُم مَّا تُمْنُونَ' },
                { type: 'text', text: '[58] So what is your opinion regarding the semen you discharge?' },
                { type: 'arabic', text: 'أَأَنتُمْ تَخْلُقُونَهُ أَمْ نَحْنُ الْخَالِقُونَ' },
                { type: 'text', text: '[59] Do you make a human out of it, or is it We Who create?' },
                { type: 'arabic', text: 'نَحْنُ قَدَّرْنَا بَيْنَكُمُ الْمَوْتَ وَمَا نَحْنُ بِمَسْبُوقِينَ' },
                { type: 'text', text: '[60] It is We Who have ordained death among you, and We have not been beaten -' },
                { type: 'arabic', text: 'عَلَىٰ أَن نُّبَدِّلَ أَمْثَالَكُمْ وَنُشِئَكُمْ فِي مَا لَا تَعْلَمُونَ' },
                { type: 'text', text: '[61] In the matter of exchanging you for others, and to transform you into what you do not know.' },
                { type: 'arabic', text: 'وَلَقَدْ عَلِمْتُمُ النَّشْأَةَ الْأُولَىٰ فَلَوْلَا تَذَكَّرُونَ' },
                { type: 'text', text: '[62] And you have indeed learnt about the first creation, so why do you not ponder?' },
                { type: 'arabic', text: 'أَفَرَأَيْتُم مَّا تَحْرُثُونَ' },
                { type: 'text', text: '[63] So what is your opinion regarding what you sow?' },
                { type: 'arabic', text: 'أَأَنتُمْ تَزْرَعُونَهُ أَمْ نَحْنُ الزَّارِعُونَ' },
                { type: 'text', text: '[64] Is it you who cultivate it, or is it We Who develop it?' },
                { type: 'arabic', text: 'لَوْ نَشَاءُ لَجَعَلْنَاهُ حُطَامًا فَظَلْتُمْ تَفَكَّهُونَ' },
                { type: 'text', text: '[65] If We will We can make it like dry trampled hay, so you would keep crying out.' },
                { type: 'arabic', text: 'إِنَّا لَمُغْرَمُونَ' },
                { type: 'text', text: '[66] That, “We have indeed been penalised!”' },
                { type: 'arabic', text: 'بَلْ نَحْنُ مَحْرُومُونَ' },
                { type: 'text', text: '[67] “In fact, we were unfortunate!”' },
                { type: 'arabic', text: 'أَفَرَأَيْتُمُ الْمَاءَ الَّذِي تَشْرَبُونَ' },
                { type: 'text', text: '[68] So what is your opinion regarding the water that you drink?' },
                { type: 'arabic', text: 'أَأَنتُمْ أَنزَلْتُمُوهُ مِنَ الْمُزْنِ أَمْ نَحْنُ الْمُنزِلُونَ' },
                { type: 'text', text: '[69] Is it you who caused it to descend from the cloud, or is it We Who cause it to descend?' },
                { type: 'arabic', text: 'لَوْ نَشَاءُ جَعَلْنَاهُ أُجَاجًا فَلَوْلَا تَشْكُرُونَ' },
                { type: 'text', text: '[70] If We will We can make it bitter, so why do you not give thanks?' },
                { type: 'arabic', text: 'أَفَرَأَيْتُمُ النَّارَ الَّتِي تُورُونَ' },
                { type: 'text', text: '[71] So what is your opinion regarding the fire which you kindle?' },
                { type: 'arabic', text: 'أَأَنتُمْ أَنشَأْتُمْ شَجَرَتَهَا أَمْ نَحْنُ الْمُنشِئُونَ' },
                { type: 'text', text: '[72] Is it you who grew its tree, or is it We Who create?' },
                { type: 'arabic', text: 'نَحْنُ جَعَلْنَاهَا تَذْكِرَةً وَمَتَاعًا لِّلْمُقْوِينَ' },
                { type: 'text', text: '[73] We have made it as a reminder of hell and as a utility for travellers in the jungle.' },
                { type: 'hr' },
                { type: 'arabic', text: 'فَسَبِّحْ بِاسْمِ رَبِّكَ الْعَظِيمِ' },
                { type: 'text', text: '[74] Therefore (O dear Prophet Mohammed - peace and blessings be upon him) proclaim the Purity of the name of your Lord, the Greatest.' },
                { type: 'arabic', text: 'فَلَا أُقْسِمُ بِمَوَاقِعِ النُّجُومِ' },
                { type: 'text', text: '[75] So I swear by the setting places of the stars.' },
                { type: 'arabic', text: 'وَإِنَّهُ لَقَسَمٌ لَّوْ تَعْلَمُونَ عَظِيمٌ' },
                { type: 'text', text: '[76] And that is indeed a tremendous oath, if you understand.' },
                { type: 'arabic', text: 'إِنَّهُ لَقُرْآنٌ كَرِيمٌ' },
                { type: 'text', text: '[77] This is indeed the noble Qur’an.' },
                { type: 'arabic', text: 'فِي كِتَابٍ مَّكْنُونٍ' },
                { type: 'text', text: '[78] Kept in a secure Book.' },
                { type: 'arabic', text: 'لَّا يَمَسُّهُ إِلَّا الْمُطَهَّرُونَ' },
                { type: 'text', text: '[79] None may touch it, except with ablution.' },
                { type: 'arabic', text: 'تَنزِيلٌ مِّن رَّبِّ الْعَالَمِينَ' },
                { type: 'text', text: '[80] Sent down by the Lord Of The Creation.' },
                { type: 'arabic', text: 'أَفَبِهَٰذَا الْحَدِيثِ أَنتُم مُّدْهِنُونَ' },
                { type: 'text', text: '[81] So is this the matter regarding which you laze?' },
                { type: 'arabic', text: 'وَتَجْعَلُونَ رِزْقَكُمْ أَنَّكُمْ تُكَذِّبُونَ' },
                { type: 'text', text: '[82] And you make its denial your share?' },
                { type: 'arabic', text: 'فَلَوْلَا إِذَا بَلَغَتِ الْحُلْقُومَ' },
                { type: 'text', text: '[83] So why was it not, when the soul reaches up to the throat, -' },
                { type: 'arabic', text: 'وَأَنتُمْ حِينَئِذٍ تَنظُرُونَ' },
                { type: 'text', text: '[84] Whereas you watch at that moment!' },
                { type: 'arabic', text: 'وَنَحْنُ أَقْرَبُ إِلَيْهِ مِنكُمْ وَلَٰكِن لَّا تُبْصِرُونَ' },
                { type: 'text', text: '[85] And We are nearer to him than you are, but you cannot see.' },
                { type: 'arabic', text: 'فَلَوْلَا إِن كُنتُمْ غَيْرَ مَدِينِينَ' },
                { type: 'text', text: '[86] So why is it not, that if you are not to be repaid, -' },
                { type: 'arabic', text: 'تَرْجِعُونَهَا إِن كُنتُمْ صَادِقِينَ' },
                { type: 'text', text: '[87] That you bring it back, if you are truthful?' },
                { type: 'arabic', text: 'فَأَمَّا إِن كَانَ مِنَ الْمُقَرَّبِينَ' },
                { type: 'text', text: '[88] Then if the dying one is of those having proximity, -' },
                { type: 'arabic', text: 'فَرَوْحٌ وَرَيْحَانٌ وَجَنَّتُ نَعِيمٍ' },
                { type: 'text', text: '[89] Then is relief, and flowers – and Gardens of peace.' },
                { type: 'arabic', text: 'وَأَمَّا إِن كَانَ مِنْ أَصْحَابِ الْيَمِينِ' },
                { type: 'text', text: '[90] And if he is of those on the right, -' },
                { type: 'arabic', text: 'فَسَلَامٌ لَّكَ مِنْ أَصْحَابِ الْيَمِينِ' },
                { type: 'text', text: '[91] Then upon you is the greetings of peace (O dear Prophet Mohammed – peace and blessings be upon him), from those on the right.' },
                { type: 'arabic', text: 'وَأَمَّا إِن كَانَ مِنَ الْمُكَذِّبِينَ الضَّالِّينَ' },
                { type: 'text', text: '[92] And if he is from the deniers, the astray, -' },
                { type: 'arabic', text: 'فَنُزُلٌ مِّنْ حَمِيمٍ' },
                { type: 'text', text: '[93] Then his reception is the hot boiling water.' },
                { type: 'arabic', text: 'وَتَصْلِيَةُ جَحِيمٍ' },
                { type: 'text', text: '[94] And a casting into the blazing fire.' },
                { type: 'arabic', text: 'إِنَّ هَٰذَا لَهُوَ حَقُّ الْيَقِينِ' },
                { type: 'text', text: '[95] This is indeed an utmost certainty.' },
                { type: 'arabic', text: 'فَسَبِّحْ بِاسْمِ رَبِّكَ الْعَظِيمِ' },
                { type: 'text', text: '[96] Therefore (O dear Prophet Mohammed - peace and blessings be upon him) proclaim the Purity of the name of your Lord, the Greatest' }
               ]
            },
            {
              audio1: 'https://server8.mp3quran.net/afs/067.mp3', // Alafasy
audio2: 'https://server10.mp3quran.net/minsh/067.mp3', // Minshawi
content: [ { type: 'section-title', text: 'AL MULK (THE KINGSHIP)' }, 
                { type: 'text', text: '(Revealed at Mecca - contains 30 verses-Para 67)' },
                { type: 'arabic', text: 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ' },
                { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
                { type: 'arabic', text: 'تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ' },
                { type: 'text', text: '1] Most Auspicious is He in Whose control is the entire kingship; and He is Able to do all things.' },
                { type: 'arabic', text: 'الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا ۚ وَهُوَ الْعَزِيزُ الْغَفُورُ' },
                { type: 'text', text: '2] The One Who created death and life to test you - who among you has the better deeds; and He only is the Most Honourable, the Oft Forgiving.' },
                { type: 'arabic', text: 'الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا ۖ مَّا تَرَىٰ فِي خَلْقِ الرَّحْمَٰنِ مِن تَفَاوُتٍ ۖ فَارْجِعِ الْبَصَرَ هَلْ تَرَىٰ مِن فُطُورٍ' },
                { type: 'text', text: '3] The One Who created the seven heavens atop each other; do you see any discrepancy in the creation of the Most Gracious? Therefore lift your gaze – do you see any cracks?' },
                { type: 'arabic', text: 'ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ يَنقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ' },
                { type: 'text', text: '4] Then lift your gaze again, your gaze will return towards you, unsuccessful and weak.' },
                { type: 'arabic', text: 'وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِّلشَّيَاطِينِ ۖ وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ' },
